    if (d.main_member_patient_id && d.main_member_name) {
      const parts = d.main_member_name.trim().split(/\s+/);
      setMaPick({ id: d.main_member_patient_id, first_name: parts[0] || '', last_name: parts.slice(1).join(' ') || '', medical_aid_name: d.medical_aid_name || null });
    } else {
      setMaPick(null);
    }
    setMaForm({
      has_medical_aid:        d.has_medical_aid        || false,
      medical_aid_name:       d.medical_aid_name       || '',
      medical_aid_number:     d.medical_aid_number     || '',
      medical_aid_plan:       d.medical_aid_plan       || '',
      relationship_to_member: d.relationship_to_member || 'main_member',
      dependant_code:         d.dependant_code         || '',
      main_member_name:       d.main_member_name       || '',
      main_member_id_number:  d.main_member_id_number  || '',
      main_member_dob:        d.main_member_dob        || '',
      main_member_patient_id: d.main_member_patient_id || '',
    });
    setMaSaveErr('');
    setEditingMa(true);
  };

  const saveMaEdit = async () => {
    setMaSaving(true); setMaSaveErr('');
    try {
      const payload = {
        has_medical_aid:        maForm.has_medical_aid,
        medical_aid_name:       maForm.has_medical_aid ? (maForm.medical_aid_name       || null) : null,
        medical_aid_number:     maForm.has_medical_aid ? (maForm.medical_aid_number     || null) : null,
        medical_aid_plan:       maForm.has_medical_aid ? (maForm.medical_aid_plan       || null) : null,
        relationship_to_member: maForm.has_medical_aid ? (maForm.relationship_to_member || null) : null,
        dependant_code:         maForm.has_medical_aid ? (maForm.dependant_code         || null) : null,
        main_member_name:       maForm.has_medical_aid ? (maForm.main_member_name       || null) : null,
        main_member_id_number:  maForm.has_medical_aid ? (maForm.main_member_id_number  || null) : null,
        main_member_dob:        maForm.has_medical_aid ? (maForm.main_member_dob        || null) : null,
        main_member_patient_id: maForm.has_medical_aid ? (maForm.main_member_patient_id || null) : null,
      };
      await api(`/api/patients?id=${patient.id}`, { method: 'PATCH', body: JSON.stringify(payload) });
      const merged = { ...detail, ...payload };
      setDetail(merged);
      onUpdate(merged);
      setEditingMa(false);
      showToast('Medical aid updated');
    } catch(e) { setMaSaveErr(e.message || 'Could not save. Please try again.'); }
    finally { setMaSaving(false); }
  };

  const del = async () => {
    setDeleting(true);
    try {
      await api(`/api/patients?id=${patient.id}`, { method: 'DELETE' });
      onDelete(patient.id);
    } catch(e) { alert(e.message || 'Could not delete.'); setDeleting(false); setConfirmDel(false); }
  };

  const d = detail;
  const editDependent = editForm.has_medical_aid && editForm.relationship_to_member && editForm.relationship_to_member !== 'main_member';
  const maDep = maForm.has_medical_aid && maForm.relationship_to_member && maForm.relationship_to_member !== 'main_member';

  /* ── render helpers ── */
  const PtField = ({ label, value, wide }) => (
    <div className="pt-field" style={wide ? {gridColumn:'1/-1'} : {}}>
      <div className="pt-label">{label}</div>
      <div className="pt-value">{value || '—'}</div>
    </div>
  );

  const headerBadges = d ? (
    <div style={{display:'flex',gap:6,flexWrap:'wrap',marginTop:8}}>
      <span className="tag">{d.patient_type === 'new' ? 'New patient' : d.patient_type === 'returning' ? 'Returning patient' : d.patient_type || 'New patient'}</span>
      {d.medical_aid_name && (
        <span className="tag" style={{background:'rgba(14,116,144,0.08)',color:'var(--teal)',borderColor:'rgba(14,116,144,0.22)'}}>
          {d.medical_aid_name}
        </span>
      )}
      {d.relationship_to_member && (
        <span className="tag" style={{background:'rgba(21,128,61,0.08)',color:'var(--green)',borderColor:'rgba(21,128,61,0.22)'}}>
          {REL_LABEL[d.relationship_to_member] || d.relationship_to_member}
        </span>
      )}
    </div>
  ) : null;

  return (
    <>
      <div className="pt-overlay" onClick={onClose} />
      <div className="pt-drawer">

        {/* ── Header ── */}
        <div className="pt-head">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
            {editing
              ? <span style={{fontSize:12,color:'var(--muted)',fontStyle:'italic'}}>Editing patient record</span>
              : <span />}
            <button className="btn btn-ghost btn-sm" style={{fontSize:11}} onClick={onClose}>✕ Close</button>
          </div>

          {(d || patient) && (
            <div className="pt-head-row">
              <div className="pt-avatar-lg">
                {initials(d?.first_name || patient.first_name, d?.last_name || patient.last_name)}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div className="pt-name">{d?.first_name || patient.first_name} {d?.last_name || patient.last_name}</div>
                <div className="pt-contact">
                  {(d?.phone || patient.phone) && (
                    <a href={`https://wa.me/${(d?.phone || patient.phone).replace(/\D/g,'')}`}
                      target="_blank" rel="noopener noreferrer"
                      style={{color:'var(--muted)',textDecoration:'none',display:'flex',alignItems:'center',gap:4}}
                      title="Open WhatsApp">
                      📞 {d?.phone || patient.phone}
                      <span style={{fontSize:10,background:'#25D366',color:'#fff',borderRadius:4,padding:'0 4px',lineHeight:'16px',fontWeight:600}}>WA</span>
                    </a>
                  )}
                  {(d?.email || patient.email) && <span>✉ {d?.email || patient.email}</span>}
                  {d?.date_of_birth && <span>🎂 {fmtDate(d.date_of_birth)}</span>}
                </div>
                {headerBadges}
              </div>
            </div>
          )}

          {!editing && (
            <div className="pt-tabs">
              {TABS.map(t => (
                <div key={t} className={`pt-tab${tab===t?' on':''}`} onClick={()=>setTab(t)}>{t}</div>
              ))}
            </div>
          )}
        </div>

        {/* ── Scrollable body ── */}
        <div className="pt-body">

          {detailLoad && (
            <><div className="skel" style={{marginBottom:10}} /><div className="skel" style={{width:'70%',marginBottom:10}} /><div className="skel" style={{width:'85%'}} /></>
          )}

          {/* ── Profile tab ── */}
          {!detailLoad && d && !editing && tab === 'Profile' && (
            <>
              <div className="pt-section">
                <div className="pt-section-head">
                  <div className="pt-section-title">Personal information</div>
                  <button className="btn btn-ghost btn-sm" style={{fontSize:11}} onClick={startEdit}>Edit</button>
                </div>
                <div className="pt-grid">
                  <PtField label="Date of birth"  value={fmtDate(d.date_of_birth)} />
                  <PtField label="Gender"          value={GENDER_LABEL[d.gender] || d.gender} />
                  <PtField label="Phone"           value={d.phone} />
                  <PtField label="Email"           value={d.email} />
                  <PtField label="ID number"       value={d.id_number} />
                  <PtField label="Street address"   value={d.home_address} wide />
                  <PtField label="Suburb"          value={d.suburb} />
                  <PtField label="City"            value={d.city} />
                  <PtField label="Postal code"     value={d.postal_code} />
                  <PtField label="Province"        value={d.province} />
                  <PtField label="Registered"      value={fmtDate(d.created_at)} />
                </div>
              </div>
              <div className="pt-section">
                <div className="pt-section-title" style={{marginBottom:12}}>Referral</div>
                <div className="pt-grid">
                  <PtField label="Source" value={d.referral_source?.replace(/_/g,' ')} />
                  <PtField label="Detail" value={d.referral_detail} />
                </div>
              </div>
            </>
          )}

          {/* ── Medical Aid tab ── */}
          {!detailLoad && d && !editing && tab === 'Medical Aid' && (
            <>
              {editingMa ? (
                /* ── Inline MA edit ── */
                <div className="pt-section">
                  <div className="pt-section-title" style={{marginBottom:14}}>Edit medical aid</div>
                  <div style={{display:'flex',gap:8,marginBottom:16}}>
                    {[false,true].map(v => (
                      <button key={String(v)} type="button"
                        className={`btn btn-sm ${maForm.has_medical_aid===v ? 'btn-primary' : 'btn-ghost'}`}
                        onClick={() => {
                          if (!v) { setMaForm(f => ({...f, has_medical_aid:false, medical_aid_name:'', medical_aid_number:'', medical_aid_plan:'', relationship_to_member:'main_member', dependant_code:'', main_member_name:'', main_member_id_number:'', main_member_dob:'', main_member_patient_id:''})); setMaPick(null); }
                          else setMaForm(f => ({...f, has_medical_aid:true}));
                        }}
                      >{v ? 'Has medical aid' : 'Self-pay / no MA'}</button>
                    ))}
                  </div>
                  {maForm.has_medical_aid && (
                    <>
                      <div className="pt-grid">
                        <div className="field"><label>Scheme name</label><input value={maForm.medical_aid_name} onChange={e=>setMaForm(f=>({...f,medical_aid_name:e.target.value}))} placeholder="e.g. Discovery Health" /></div>
                        <div className="field"><label>Membership number</label><input value={maForm.medical_aid_number} onChange={e=>setMaForm(f=>({...f,medical_aid_number:e.target.value}))} placeholder="e.g. 12345678" /></div>
                        <div className="field"><label>Plan / option</label><input value={maForm.medical_aid_plan} onChange={e=>setMaForm(f=>({...f,medical_aid_plan:e.target.value}))} placeholder="e.g. Classic Comprehensive" /></div>
                        <div className="field">
                          <label>Role on policy</label>
                          <select value={maForm.relationship_to_member} onChange={e => {
                            const val = e.target.value;
                            if (!val || val === 'main_member') { setMaForm(f => ({...f, relationship_to_member:val, main_member_patient_id:'', dependant_code:''})); setMaPick(null); }
                            else setMaForm(f => ({...f, relationship_to_member:val}));
                          }}>
                            <option value="main_member">Main member</option>
                            <option value="spouse">Spouse / partner</option>
                            <option value="child">Child</option>
                            <option value="parent">Parent</option>
                            <option value="other">Other dependant</option>
                          </select>
                        </div>
                        {maDep && (
                          <div className="field" style={{maxWidth:120}}>
                            <label>Dependant code</label>
                            <input type="text" inputMode="numeric" value={maForm.dependant_code} onChange={e=>setMaForm(f=>({...f,dependant_code:e.target.value}))} placeholder="02, 03…" />
                          </div>
                        )}
                      </div>
                      {maDep && (
                        <div style={{marginTop:14}}>
                          <MainMemberSearch
                            picked={maPick}
                            onSelect={p => {
                              if (p.relationship_to_member && p.relationship_to_member !== 'main_member') { showToast(`${p.first_name} ${p.last_name} is also a dependant — select the actual main member.`, 'error'); return; }
                              setMaPick(p);
                              setMaForm(f => ({...f, main_member_patient_id:p.id, main_member_name:`${p.first_name} ${p.last_name}`, medical_aid_name:f.medical_aid_name||p.medical_aid_name||'', medical_aid_number:f.medical_aid_number||p.medical_aid_number||'', medical_aid_plan:f.medical_aid_plan||p.medical_aid_plan||''}));
                            }}
                            onClear={() => { setMaPick(null); setMaForm(f => ({...f, main_member_patient_id:'', main_member_name:''})); }}
                          />
                        </div>
                      )}
                    </>
                  )}
                  {maSaveErr && <div className="alert alert-error" style={{marginTop:12}}>{maSaveErr}</div>}
                  <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:20}}>
                    <button className="btn btn-ghost btn-sm" onClick={() => { setEditingMa(false); setMaSaveErr(''); }}>Cancel</button>
                    <button className="btn btn-primary btn-sm" disabled={maSaving} onClick={saveMaEdit}>{maSaving ? 'Saving…' : 'Save'}</button>
                  </div>
                </div>
              ) : (
                /* ── Read-only MA display ── */
                <>
                  <div className="pt-section">
                    <div className="pt-section-head">
                      <div className="pt-section-title">Medical aid</div>
                      <button className="btn btn-ghost btn-sm" style={{fontSize:11}} onClick={startEditMa}>Edit</button>
                    </div>
                    {!d.has_medical_aid ? (
                      <div style={{color:'var(--muted)',fontSize:13,padding:'8px 0'}}>No medical aid on file — self-pay patient.</div>
                    ) : (
                      <>
                        <div className="pt-grid">
                          <PtField label="Scheme"         value={d.medical_aid_name} />
                          <PtField label="Membership no." value={d.medical_aid_number} />
                          <PtField label="Plan / option"  value={d.medical_aid_plan} />
                          <PtField label="Role on policy" value={REL_LABEL[d.relationship_to_member]} />
                          {d.dependant_code && <PtField label="Dependant code" value={d.dependant_code} />}
                        </div>
                        {d.relationship_to_member && d.relationship_to_member !== 'main_member' && (
                          <div className="pt-inset" style={{marginTop:14}}>
                            <div className="pt-section-title" style={{marginBottom:12}}>Main member — on file</div>
                            <div className="pt-grid">
                              <PtField label="Name"          value={d.main_member_name} />
                              <PtField label="ID number"     value={mmRecord?.id_number || d.main_member_id_number} />
                              <PtField label="Date of birth" value={fmtDate(mmRecord?.date_of_birth || d.main_member_dob)} />
                            </div>
                          </div>
                        )}
                      </>
                    )}
                  </div>

                  {/* Navigate to linked main member record */}
                  {d.main_member_patient_id && (
                    <div className="pt-section" style={{borderTop:'1px solid var(--border)',paddingTop:20}}>
                      <div className="pt-section-title" style={{marginBottom:12}}>Main member — patient record</div>
                      {(() => {
                        const parts = (d.main_member_name || '').trim().split(/\s+/);
                        const mmFirst = parts[0] || 'M';
                        const mmLast  = parts.slice(1).join(' ') || 'M';
                        return (
                          <div style={{display:'flex',alignItems:'center',gap:12,padding:'12px 14px',background:'var(--bg-3)',borderRadius:10,cursor:'pointer',border:'1px solid var(--border)',transition:'border-color .15s'}}
                            onClick={() => onNavigate && onNavigate({ id: d.main_member_patient_id, first_name: mmFirst, last_name: mmLast })}
                            onMouseEnter={e=>e.currentTarget.style.borderColor='var(--sage)'}
                            onMouseLeave={e=>e.currentTarget.style.borderColor='var(--border)'}>
                            <div className="user-avatar" style={{width:38,height:38,fontSize:14,flexShrink:0}}>{initials(mmFirst, mmLast)}</div>
                            <div style={{flex:1,minWidth:0}}>
                              <div style={{fontSize:13,fontWeight:500}}>{d.main_member_name || 'Main member'}</div>
                              <div style={{fontSize:11,color:'var(--muted)'}}>Main member · tap to open record</div>
                            </div>
                            <span style={{fontSize:16,color:'var(--muted)'}}>›</span>
                          </div>
                        );
                      })()}
                    </div>
                  )}

                  {/* Add dependant — shown only for main members */}
                  {d.has_medical_aid && (!d.relationship_to_member || d.relationship_to_member === 'main_member') && (
                    <div className="pt-section" style={{borderTop:'1px solid var(--border)',paddingTop:20}}>
                      <button
                        className="btn btn-ghost btn-sm"
                        style={{width:'100%',justifyContent:'center',gap:6,color:'var(--sage)',borderColor:'var(--border-2)'}}
                        onClick={() => setAddDependantOpen(true)}
                      >
                        + Add dependant on this policy
                      </button>
                    </div>
                  )}

                  {/* Policy dependants */}
                  {dependants.length > 0 && (
                    <div className="pt-section" style={{borderTop:'1px solid var(--border)',paddingTop:20}}>
                      <div className="pt-section-title" style={{marginBottom:12}}>Policy dependants ({dependants.length})</div>
                      {dependants.map(dep => (
                        <div key={dep.id}
                          style={{display:'flex',alignItems:'center',gap:12,padding:'12px 14px',background:'var(--bg-3)',borderRadius:10,cursor:'pointer',border:'1px solid var(--border)',marginBottom:8,transition:'border-color .15s'}}
                          onClick={() => onNavigate && onNavigate(dep)}
                          onMouseEnter={e=>e.currentTarget.style.borderColor='var(--sage)'}
                          onMouseLeave={e=>e.currentTarget.style.borderColor='var(--border)'}>
                          <div className="user-avatar" style={{width:38,height:38,fontSize:14,flexShrink:0}}>{initials(dep.first_name, dep.last_name)}</div>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{fontSize:13,fontWeight:500}}>{dep.first_name} {dep.last_name}</div>
                            <div style={{fontSize:11,color:'var(--muted)'}}>
                              {REL_LABEL[dep.relationship_to_member] || 'Dependant'}
                              {dep.dependant_code ? ` · code ${dep.dependant_code}` : ''}
                              {dep.email ? ` · ${dep.email}` : dep.phone ? ` · ${dep.phone}` : ''}
                            </div>
                          </div>
                          <span style={{fontSize:16,color:'var(--muted)'}}>›</span>
                        </div>
                      ))}
                    </div>
                  )}
                </>
              )}
            </>
          )}

          {/* ── Health tab ── */}
          {!detailLoad && d && !editing && tab === 'Health' && (
            <>
              <div className="pt-section">
                <div className="pt-section-head">
                  <div className="pt-section-title">Medical notes</div>
                  <button className="btn btn-ghost btn-sm" style={{fontSize:11}} onClick={startEdit}>Edit</button>
                </div>
                {d.allergies?.length > 0 && (
                  <div style={{marginBottom:16}}>
                    <div className="pt-label" style={{marginBottom:8}}>Allergies</div>
                    <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                      {d.allergies.map(a => (
                        <span key={a} style={{background:'rgba(220,38,38,0.08)',color:'var(--danger)',border:'1px solid rgba(220,38,38,0.22)',borderRadius:20,padding:'2px 10px',fontSize:12}}>{a}</span>
                      ))}
                    </div>
                  </div>
                )}
                {d.medications?.length > 0 && (
                  <div style={{marginBottom:14}}>
                    <div className="pt-label" style={{marginBottom:4}}>Medications</div>
                    <div style={{fontSize:13}}>{d.medications.join(', ')}</div>
                  </div>
                )}
                {d.medical_conditions?.length > 0 && (
                  <div style={{marginBottom:14}}>
                    <div className="pt-label" style={{marginBottom:4}}>Medical conditions</div>
                    <div style={{fontSize:13}}>{d.medical_conditions.join(', ')}</div>
                  </div>
                )}
                {d.dental_anxiety && (
                  <div style={{marginBottom:14}}>
                    <div className="pt-label" style={{marginBottom:4}}>Dental anxiety</div>
                    <div style={{fontSize:13}}>{d.dental_anxiety}</div>
                  </div>
                )}
                {d.intake_notes && (
                  <div>
                    <div className="pt-label" style={{marginBottom:4}}>Clinical notes</div>
                    <div style={{fontSize:13,lineHeight:1.6,color:'var(--ink-soft)'}}>{d.intake_notes}</div>
                  </div>
                )}
                {!d.allergies?.length && !d.medications?.length && !d.medical_conditions?.length && !d.dental_anxiety && !d.intake_notes && (
                  <div style={{color:'var(--muted)',fontSize:13,padding:'8px 0'}}>No health notes recorded.</div>
                )}
              </div>

              <div className="pt-section">
                <div className="pt-section-title" style={{marginBottom:12}}>Consent</div>
                {[
                  ['Treatment consent', d.consent_signed, d.consent_date],
                  ['POPIA consent',     d.popia_consent,  d.popia_consent_date],
                  ['Marketing',         d.marketing_consent, null],
                ].map(([label, ok, date]) => (
                  <div key={label} style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
                    <div style={{
                      width:18,height:18,borderRadius:4,display:'flex',alignItems:'center',justifyContent:'center',
                      background: ok ? 'rgba(21,128,61,0.12)' : 'var(--bg-3)',
                      border: `1px solid ${ok ? 'rgba(21,128,61,0.3)' : 'var(--border)'}`,
                      fontSize:11, color: ok ? 'var(--green)' : 'var(--muted)', flexShrink:0,
                    }}>{ok ? '✓' : ''}</div>
                    <span style={{fontSize:13,flex:1}}>{label}</span>
                    {date && <span style={{fontSize:11,color:'var(--muted)'}}>{fmtDate(date)}</span>}
                  </div>
                ))}
              </div>

              {/* ── Signed documents ── */}
              <ConsentDocs patient={d} onUpdate={refreshPatient} />
            </>
          )}

          {/* ── Appointments tab ── */}
          {!detailLoad && d && !editing && tab === 'Appointments' && (
            <div className="pt-section">
              <div className="pt-section-head">
                <div className="pt-section-title">Appointment history ({d.appointments?.length || 0})</div>
              </div>
              {!d.appointments?.length ? (
                <div style={{color:'var(--muted)',fontSize:13,padding:'8px 0'}}>No appointments on record.</div>
              ) : d.appointments.map(a => (
                <div
                  key={a.id}
                  className="pt-appt-card"
                  style={{flexDirection:'column', alignItems:'stretch', cursor:'pointer'}}
                  onClick={() => setExpandedAppt(p => p === a.id ? null : a.id)}
                >
                  <div style={{display:'flex', alignItems:'center', gap:12}}>
                    <div style={{flex:1, minWidth:0}}>
                      <div style={{fontWeight:500, fontSize:13}}>{a.services?.name || 'Appointment'}</div>
                      <div style={{fontSize:11, color:'var(--muted)', marginTop:2}}>
                        {fmtDateShort(a.appointment_date)}{a.appointment_time ? ` at ${a.appointment_time.slice(0,5)}` : ''}
                      </div>
                    </div>
                    <StatusBadge status={a.status} />
                    <span style={{
                      color:'var(--muted)', fontSize:14, flexShrink:0,
                      display:'inline-block', transition:'transform .2s',
                      transform: expandedAppt === a.id ? 'rotate(180deg)' : 'rotate(0deg)',
                    }}>▾</span>
                  </div>
                  {expandedAppt === a.id && (
                    <div style={{marginTop:10, paddingTop:10, borderTop:'1px solid var(--border)'}}>
                      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'8px 20px'}}>
                        {a.services?.name && (
                          <div>
                            <div className="pt-label">Procedure</div>
                            <div className="pt-value">{a.services.name}</div>
                          </div>
                        )}
                        {a.services?.category && (
                          <div>
                            <div className="pt-label">Category</div>
                            <div className="pt-value" style={{textTransform:'capitalize'}}>{a.services.category.replace(/_/g,' ')}</div>
                          </div>
                        )}
                        {a.duration_minutes ? (
                          <div>
                            <div className="pt-label">Duration</div>
                            <div className="pt-value">{a.duration_minutes} min</div>
                          </div>
                        ) : null}
                        {a.services?.price_from != null ? (
                          <div>
                            <div className="pt-label">Price from</div>
                            <div className="pt-value">{fmtMoney(a.services.price_from)}</div>
                          </div>
                        ) : null}
                        {a.patient_notes ? (
                          <div style={{gridColumn:'1/-1'}}>
                            <div className="pt-label">Patient notes</div>
                            <div className="pt-value" style={{whiteSpace:'pre-wrap'}}>{a.patient_notes}</div>
                          </div>
                        ) : null}
                        {a.internal_notes ? (

                const pct      = plan.total_sessions > 0 ? Math.round(plan.sessions_done / plan.total_sessions * 100) : 0;
                const isOpen   = expandedPlan === plan.id;
                const planSess = ptSessions[plan.id];
                const loading  = ptSessLoad[plan.id];

                // Compute payment summary from cached sessions
                const charged = (planSess || []).reduce((s,x) => s + (parseFloat(x.amount_charged)||0), 0);
                const paid    = (planSess || []).reduce((s,x) => s + (parseFloat(x.amount_paid)||0),    0);

                return (

                          return (
                            <div key={s.id} style={{display:'flex',alignItems:'flex-start',gap:8,padding:'6px 0',borderBottom:'1px solid var(--border)'}}>

                <button className="btn btn-danger btn-sm" onClick={() => setConfirmDel(true)}>Remove patient record…</button>

        </div>

        {/* ── Sticky edit footer ── */}
        {editing && (
          <div className="pt-foot">
            {saveErr && <span style={{fontSize:12,color:'var(--danger)',flex:1}}>{saveErr}</span>}
            <button className="btn btn-ghost btn-sm" onClick={() => { setEditing(false); setSaveErr(''); }}>Cancel</button>
            <button className="btn btn-primary btn-sm" disabled={saving} onClick={saveEdit}>{saving ? 'Saving…' : 'Save changes'}</button>
          </div>
        )}
      </div>

      {addDependantOpen && d && (
        <AddPatientModal
          onClose={() => setAddDependantOpen(false)}
          onDone={() => {
            setAddDependantOpen(false);
            api(`/api/patients?main_member_id=${patient.id}`)
              .then(r => setDependants(r.patients || []))
              .catch(() => {});
          }}
          initialForm={{
            has_medical_aid: true,
            medical_aid_name:    d.medical_aid_name    || '',
            medical_aid_number:  d.medical_aid_number  || '',
            medical_aid_plan:    d.medical_aid_plan    || '',
            main_member_patient_id: patient.id,
            main_member_name:    `${d.first_name} ${d.last_name}`,
            relationship_to_member: '',
          }}
          initialMmPick={{
            id:               patient.id,
            first_name:       d.first_name,
            last_name:        d.last_name,
            medical_aid_name: d.medical_aid_name || null,
          }}
        />
      )}
    </>
  );
}


/* ── Appointment date picker (future-friendly, Mon-first) ────── */
function ApptDatePicker({ value, onChange, placeholder = 'Select date', disablePast = true }) {
  const today  = new Date();
  const parsed = value ? new Date(value + 'T12:00:00') : null;

  const [open, setOpen] = useState(false);
  const [view, setView] = useState('days');
  const [vy,   setVy]   = useState(() => parsed?.getFullYear() ?? today.getFullYear());
  const [vm,   setVm]   = useState(() => parsed?.getMonth()    ?? today.getMonth());
  const wrapRef = useRef(null);

  useEffect(() => {
    if (parsed) { setVy(parsed.getFullYear()); setVm(parsed.getMonth()); }
  }, [value]);

  useEffect(() => {
    if (!open) return;
    const h = e => { if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', h);
    return () => document.removeEventListener('mousedown', h);
  }, [open]);

  const MONTHS   = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const MONTHS_S = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const WDAYS    = ['Mo','Tu','We','Th','Fr','Sa','Su'];

  const fmt = d => d
    ? `${String(d.getDate()).padStart(2,'0')} ${MONTHS_S[d.getMonth()]} ${d.getFullYear()}`
    : '';

  const prevNav = () => {
    if (view === 'years')  { setVy(y => y - 10); return; }
    if (view === 'months') { setVy(y => y - 1);  return; }
    if (vm === 0) { setVy(y => y - 1); setVm(11); } else setVm(m => m - 1);
  };
  const nextNav = () => {
    if (view === 'years')  { setVy(y => y + 10); return; }
    if (view === 'months') { setVy(y => y + 1);  return; }
    if (vm === 11) { setVy(y => y + 1); setVm(0); } else setVm(m => m + 1);
  };

  // Monday-first grid
  const firstDow = (new Date(vy, vm, 1).getDay() + 6) % 7;
  const daysInMo = new Date(vy, vm + 1, 0).getDate();
  const cells    = [...Array(firstDow).fill(null), ...Array.from({length: daysInMo}, (_, i) => i + 1)];

  const pickDay = d => {
    onChange(`${vy}-${String(vm + 1).padStart(2,'0')}-${String(d).padStart(2,'0')}`);
    setOpen(false);
  };

  const isSel   = d => parsed && parsed.getFullYear()===vy && parsed.getMonth()===vm && parsed.getDate()===d;
  const isToday = d => today.getFullYear()===vy && today.getMonth()===vm && today.getDate()===d;
  const isPast  = d => {
    if (!d || !disablePast) return false;
    const cell = new Date(vy, vm, d);
    const todayMid = new Date(today.getFullYear(), today.getMonth(), today.getDate());
    return cell < todayMid;
  };

  const decadeStart = Math.floor(vy / 10) * 10;
  const years       = Array.from({length: 12}, (_, i) => decadeStart - 1 + i);

  const triggerStyle = {
    width:'100%', display:'flex', alignItems:'center', gap:8,
    background:'var(--bg-3)', border:'1px solid var(--border)',
    borderRadius:8, padding:'10px 14px', cursor:'pointer',
    fontSize:14, color: parsed ? 'var(--ink)' : 'var(--muted)',
    textAlign:'left', fontFamily:'inherit', fontWeight:400,
    transition:'border-color 0.15s',
  };
  const popStyle = {

    background:'var(--card)', borderRadius:14,
    border:'1px solid var(--border-2)',
    boxShadow:'0 16px 48px rgba(10,31,38,0.18)',
    width:272, overflow:'hidden',

    background:'none', border:'none', cursor:'pointer',
    fontSize:18, color:'var(--ink-soft)', padding:'3px 8px',
    borderRadius:6, lineHeight:1, fontFamily:'inherit',
