    if (!inviteEmail.trim()) { setInviteErr('Email address is required.'); return; }
    if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(inviteEmail)) { setInviteErr('Please enter a valid email address.'); return; }
    if (!inviteName.trim()) { setInviteErr('Name is required.'); return; }
    setInviting(true);
    try {
      await api('/api/staff', {
        method: 'POST',
        body: JSON.stringify({ email: inviteEmail.trim(), name: inviteName.trim() }),
      });
      setInviteOk(true);
      setInviteEmail(''); setInviteName('');
      const d = await api('/api/staff');
      setStaff(d.staff || []);
      showToast(`Invite sent to ${inviteEmail.trim()}`);
    } catch(e) {
      const msg = e.message || '';
      setInviteErr(
        msg.toLowerCase().includes('already') || msg.includes('409')
          ? 'That email is already registered as a staff member.'
        : msg.toLowerCase().includes('limit') ? 'Staff limit reached — contact support to add more.'
        : 'Could not send invite. Please try again.'
      );
    } finally { setInviting(false); }
  };

  const removeStaff = async (s) => {
    if (!window.confirm(`Remove ${s.name || s.email} from the practice? They will no longer be able to log in.`)) return;
    setRemoving(s.id);
    try {
      await api(`/api/staff?id=${s.id}`, { method: 'DELETE' });
      setStaff(prev => prev.filter(x => x.id !== s.id));
      showToast(`${s.name || s.email} removed`);
    } catch(e) {
      showToast('Could not remove staff member. Please try again.', 'error');
    } finally { setRemoving(null); }
  };

  return (
    <div style={{maxWidth:640}}>
      <div style={{marginBottom:32}}>
        <div className="eyebrow">Account settings</div>
        <h2 style={{fontFamily:'Plus Jakarta Sans,sans-serif', fontSize:30, marginTop:4}}>Settings</h2>
      </div>

      {/* ── My account ── */}
      <div className="card" style={{marginBottom:24}}>
        <div style={{fontSize:11,letterSpacing:'0.12em',textTransform:'uppercase',color:'var(--muted)',marginBottom:16}}>My account</div>
        <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:24,paddingBottom:20,borderBottom:'1px solid var(--border)'}}>
          <div className="user-avatar" style={{width:48,height:48,fontSize:20}}>
            {user?.email?.[0]?.toUpperCase() || 'A'}
          </div>
          <div>
            <div style={{fontWeight:600,fontSize:15}}>{user?.email?.split('@')[0] || 'Staff'}</div>
            <div style={{fontSize:12,color:'var(--muted)'}}>{user?.email}</div>
          </div>
        </div>

        <div style={{fontSize:13,fontWeight:600,marginBottom:14}}>Change password</div>
        <div style={{display:'flex',flexDirection:'column',gap:12,maxWidth:380}}>
          <div className="field">
            <label>New password</label>
            <input type="password" value={pwForm.next} placeholder="At least 8 characters"
              onChange={e => setPwForm(p => ({...p, next: e.target.value}))} autoComplete="new-password" />
          </div>
          <div className="field">
            <label>Confirm new password</label>
            <input type="password" value={pwForm.confirm} placeholder="Same as above"
              onChange={e => setPwForm(p => ({...p, confirm: e.target.value}))} autoComplete="new-password" />
          </div>
          {pwErr && <div className="alert alert-error" style={{marginBottom:0}}>{pwErr}</div>}
          {pwOk  && <div style={{fontSize:13,color:'var(--green)',fontWeight:500}}>✓ Password updated successfully.</div>}
          <button className="btn btn-primary btn-sm" style={{alignSelf:'flex-start'}} disabled={pwSaving} onClick={savePw}>
            {pwSaving ? 'Saving…' : 'Update password'}
          </button>
        </div>
      </div>

      {/* ── Staff members ── */}
      <div className="card">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <div style={{fontSize:11,letterSpacing:'0.12em',textTransform:'uppercase',color:'var(--muted)'}}>Staff &amp; access</div>
        </div>

        {/* Current staff list */}
        <div style={{marginBottom:20}}>
          {staffLoading ? (
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              {[1,2].map(i => <div key={i} className="skel" style={{height:48,borderRadius:10}} />)}
            </div>
          ) : !staff.length ? (
            <div style={{color:'var(--muted)',fontSize:13}}>No other staff members found.</div>
          ) : (
            staff.map(s => {
              const isMe = s.auth_user_id === user?.id;
              return (
                <div key={s.id} style={{
                  display:'flex', alignItems:'center', gap:12,
                  padding:'12px 14px', borderRadius:10,
                  background:'var(--bg-3)', marginBottom:8,
                }}>
                  <div className="user-avatar" style={{width:36,height:36,fontSize:14,flexShrink:0}}>
                    {(s.name || s.email || '?')[0].toUpperCase()}
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:500,fontSize:13}}>{s.name || '—'}</div>
                    <div style={{fontSize:11,color:'var(--muted)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{s.email || '—'}</div>
                  </div>
                  {isMe ? (
                    <span style={{fontSize:11,color:'var(--sage)',fontWeight:600,background:'rgba(10,74,92,0.08)',padding:'3px 10px',borderRadius:20}}>You</span>
                  ) : (
                    <button className="btn btn-ghost btn-sm"
                      style={{fontSize:11,color:'var(--danger)',borderColor:'rgba(186,26,26,0.3)'}}
                      disabled={removing === s.id}
                      onClick={() => removeStaff(s)}>
                      {removing === s.id ? 'Removing…' : 'Remove'}
                    </button>
                  )}
                </div>
              );
            })
          )}
        </div>

        {/* Invite new staff */}
        <div style={{borderTop:'1px solid var(--border)',paddingTop:20}}>
          <div style={{fontSize:13,fontWeight:600,marginBottom:4}}>Invite a new staff member</div>
          <div style={{fontSize:12,color:'var(--muted)',marginBottom:14,lineHeight:1.5}}>
            They'll receive an email with a link to set their password and log in.
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:12,maxWidth:380}}>
            <div className="field">
              <label>Full name</label>
              <input value={inviteName} placeholder="e.g. Thandi Nkosi"
                onChange={e => setInviteName(e.target.value)} />
            </div>
            <div className="field">
              <label>Email address</label>
              <input type="email" value={inviteEmail} placeholder="e.g. thandi@kliniq.co.za"
                onChange={e => setInviteEmail(e.target.value)} />
            </div>
            {inviteErr && <div className="alert alert-error" style={{marginBottom:0}}>{inviteErr}</div>}
            {inviteOk  && <div style={{fontSize:13,color:'var(--green)',fontWeight:500}}>✓ Invite sent! They'll receive an email shortly.</div>}
            <button className="btn btn-primary btn-sm" style={{alignSelf:'flex-start'}} disabled={inviting} onClick={sendInvite}>
              {inviting ? 'Sending…' : 'Send invite'}
            </button>
          </div>
        </div>
      </div>

      {/* ── Data export ── */}
      <div className="card" style={{marginTop:24}}>
        <div style={{fontSize:11,letterSpacing:'0.12em',textTransform:'uppercase',color:'var(--muted)',marginBottom:4}}>Data export</div>
        <div style={{fontSize:13,color:'var(--ink-soft)',marginBottom:18,lineHeight:1.5}}>
          Download all practice data as CSV files. Useful for backups, external reporting, or migrating to another system.
        </div>
        <ExportButtons />
      </div>

      {/* ── Audit logs ── */}
      <div className="card" style={{marginTop:24}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,flexWrap:'wrap',gap:10}}>
          <div>
            <div style={{fontFamily:'Plus Jakarta Sans,sans-serif',fontSize:15,fontWeight:700}}>Audit log</div>
            <div style={{fontSize:12,color:'var(--muted)',marginTop:2}}>Database and admin changes recorded by the system.</div>
          </div>
          <div style={{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}}>
            {[['24','Last 24 h'],['720','Last 30 days'],['2160','Last 3 months']].map(([val, label]) => (
              <button key={val} type="button"
                className={`btn btn-sm ${auditRange===val && auditLogs!==null ? 'btn-primary' : 'btn-ghost'}`}
                disabled={auditLoading}
                onClick={() => { setAuditRange(val); loadAuditLogs(val); }}
              >{label}</button>
            ))}
          </div>
        </div>

        {auditErr && <div className="alert alert-error" style={{marginBottom:12}}>{auditErr}</div>}

        {auditLogs === null && !auditLoading && (
          <div style={{color:'var(--muted)',fontSize:13,padding:'20px 0',textAlign:'center'}}>
            Select a time range above to load the audit log.
          </div>
        )}

        {auditLoading && (
          <div style={{color:'var(--muted)',fontSize:13,padding:'20px 0',textAlign:'center'}}>Loading…</div>
        )}

        {auditLogs !== null && !auditLoading && (
          auditLogs.length === 0 ? (
            <div style={{color:'var(--muted)',fontSize:13,padding:'20px 0',textAlign:'center'}}>No changes recorded in this period.</div>
          ) : (
            <div className="table-wrap" style={{maxHeight:480,overflowY:'auto'}}>
              <table>
                <thead>
                  <tr>
                    <th>Time</th>
                    <th>Table</th>
                    <th>Action</th>
                    <th>Record ID</th>
                    <th>Summary</th>
                  </tr>
                </thead>
                <tbody>
                  {auditLogs.map(log => {
                    const changedFields = log.action === 'UPDATE' && log.old_data && log.new_data
                      ? Object.keys(log.new_data).filter(k => JSON.stringify(log.new_data[k]) !== JSON.stringify(log.old_data[k]))
                      : [];
                    const actionColor = { INSERT:'var(--green)', UPDATE:'var(--amber)', DELETE:'var(--danger)' }[log.action] || 'var(--muted)';
                    return (
                      <tr key={log.id}>
                        <td style={{whiteSpace:'nowrap',fontSize:12}}>{new Date(log.changed_at).toLocaleString('en-ZA',{dateStyle:'short',timeStyle:'short'})}</td>
                        <td style={{fontSize:12,color:'var(--ink-soft)'}}>{log.table_name}</td>
                        <td><span style={{fontSize:11,fontWeight:700,color:actionColor}}>{log.action}</span></td>
                        <td style={{fontSize:11,color:'var(--muted)',fontFamily:'monospace'}}>{log.record_id?.slice(0,8)}…</td>
                        <td style={{fontSize:12,color:'var(--ink-soft)'}}>
                          {log.action === 'INSERT' && 'New record created'}
                          {log.action === 'DELETE' && 'Record deleted'}
                          {log.action === 'UPDATE' && changedFields.length > 0
                            ? `Updated: ${changedFields.slice(0,4).join(', ')}${changedFields.length > 4 ? ` +${changedFields.length-4} more` : ''}`
                            : log.action === 'UPDATE' ? 'Record updated' : ''}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )
        )}
      </div>
    </div>
  );
}


/* ════════════════════════════════════════════════════════════
   REVIEWS PAGE
════════════════════════════════════════════════════════════ */
function ReviewsPage({ unreadCount = 0 }) {
  const [reviews,   setReviews]   = useState([]);
  const [loading,   setLoading]   = useState(true);
  const [filter,    setFilter]    = useState('all');   // all | new | read | 1..5
  const [selected,  setSelected]  = useState(null);
  const [total,     setTotal]     = useState(0);
  const [avgRating, setAvgRating] = useState(null);
  const [page,      setPage]      = useState(1);
  const [pages,     setPages]     = useState(1);
  const LIMIT = 20;

  const load = useCallback((pg = 1, f = filter) => {
    setLoading(true);
    const params = [`page=${pg}`, `limit=${LIMIT}`];
    if (f === 'new' || f === 'read') params.push(`status=${f}`);
    if (/^\d$/.test(f)) params.push(`rating=${f}`);
    api('/api/reviews?' + params.join('&'))
      .then(d => {
        setReviews(d.reviews || []);
        setTotal(d.total || 0);
        setAvgRating(d.avg_rating);
        setPages(d.pages || 1);
        setPage(pg);
        setLoading(false);
      })
      .catch(() => setLoading(false));
  }, [filter]);

  useEffect(() => { load(1, filter); }, [filter]);

  const markRead = async (id) => {
    try {
      await api(`/api/reviews?id=${id}`, { method:'PATCH', body: JSON.stringify({ status:'read' }) });
      setReviews(prev => prev.map(r => r.id === id ? {...r, status:'read'} : r));
      if (selected?.id === id) setSelected(p => ({...p, status:'read'}));
    } catch {}
  };

  const openReview = (r) => {
    setSelected(r);
    if (r.status === 'new') markRead(r.id);
  };

  const fmtDate = d => d
    ? new Date(d).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' })
    : '—';

  const StarRow = ({ n, size = 16 }) => (
    <span style={{letterSpacing:1, fontSize:size}}>
      {'★'.repeat(n)}<span style={{color:'rgba(10,74,92,0.15)'}}>{'★'.repeat(5-n)}</span>
    </span>
  );

  const ratingColor = n =>
    n >= 4 ? 'var(--green)' : n === 3 ? 'var(--amber)' : 'var(--danger)';

  const FILTERS = [
    { key:'all',  label:'All' },
    { key:'new',  label:'Unread' },
    { key:'5',    label:'★★★★★' },
    { key:'4',    label:'★★★★' },
    { key:'3',    label:'★★★' },
    { key:'2',    label:'★★' },
    { key:'1',    label:'★' },
  ];

  return (
    <div>
      {/* Summary */}
      <div className="stat-grid" style={{marginBottom:24}}>
        <div className="stat-card">
          <div className="stat-label">Average rating</div>
          <div className="stat-value" style={{display:'flex',alignItems:'center',gap:8}}>
            {avgRating
              ? <><span style={{color:'var(--amber)',fontSize:22}}>★</span>{avgRating}</>
              : '—'}
          </div>
          <div className="stat-sub">out of 5 stars</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Total reviews</div>
          <div className="stat-value">{total}</div>
          <div className="stat-sub">all time</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Unread</div>
          <div className="stat-value" style={{color: unreadCount > 0 ? 'var(--sage)' : 'var(--ink)'}}>
            {unreadCount}
          </div>
          <div className="stat-sub">new since last visit</div>
        </div>
        <div className="stat-card" style={{display:'flex',flexDirection:'column',justifyContent:'center',alignItems:'center',gap:8}}>
          <a href="/review.html" target="_blank" rel="noopener"
            className="btn btn-primary btn-sm" style={{whiteSpace:'nowrap'}}>
            Open review link
          </a>
          <a href="/onboarding.html" target="_blank" rel="noopener"
            className="btn btn-ghost btn-sm" style={{whiteSpace:'nowrap',fontSize:11}}>
            Patient check-in page
          </a>
        </div>
      </div>

      {/* Filters */}
      <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:16}}>
        {FILTERS.map(f => (
          <button key={f.key}
            className={`btn btn-sm ${filter === f.key ? 'btn-primary' : 'btn-ghost'}`}
            style={{letterSpacing: /^\d/.test(f.key) ? '2px' : undefined,
                    color: filter !== f.key && /^\d/.test(f.key) ? 'var(--amber)' : undefined}}
            onClick={() => { setFilter(f.key); }}>
            {f.label}
          </button>
        ))}
      </div>

      {/* Reviews list */}
      <div className="card" style={{padding:0,overflow:'hidden'}}>
        {loading ? (
          <div style={{padding:24}}>
            {[1,2,3].map(i => (
              <div key={i} style={{display:'flex',gap:12,padding:'14px 0',
                borderBottom:i<3?'1px solid var(--border)':'none'}}>
                <div className="skel" style={{width:40,height:40,borderRadius:10,flexShrink:0}} />
                <div style={{flex:1}}>
                  <div className="skel" style={{width:'40%',height:13,marginBottom:7}} />
                  <div className="skel" style={{width:'75%',height:11}} />
                </div>
              </div>
            ))}
          </div>
        ) : !reviews.length ? (
          <div className="empty">
            <div className="empty-icon">⭐</div>
            <div style={{marginBottom:12}}>No reviews yet.</div>
            <a href="/review.html" target="_blank" rel="noopener" className="btn btn-primary btn-sm">
              Open review form →
            </a>
          </div>
        ) : (
          reviews.map((r, idx) => (
            <div key={r.id}
              onClick={() => openReview(r)}
              style={{
                display:'flex', alignItems:'flex-start', gap:14,
                padding:'16px 20px',
                borderBottom: idx < reviews.length-1 ? '1px solid var(--border)' : 'none',
                cursor:'pointer',
                background: r.status === 'new' ? 'rgba(10,74,92,0.025)' : '',
                transition:'background .12s',
              }}
              onMouseEnter={e => e.currentTarget.style.background='rgba(10,74,92,0.04)'}
              onMouseLeave={e => e.currentTarget.style.background=r.status==='new'?'rgba(10,74,92,0.025)':''}
            >
              {/* Rating circle */}
              <div style={{
                width:42, height:42, borderRadius:12, flexShrink:0,
                background:`${ratingColor(r.rating)}18`,
                border:`1.5px solid ${ratingColor(r.rating)}40`,
                display:'flex', alignItems:'center', justifyContent:'center',
                fontFamily:'monospace', fontWeight:800, fontSize:16, color:ratingColor(r.rating),
              }}>
                {r.rating}
              </div>

              <div style={{flex:1,minWidth:0}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:3}}>
                  <span style={{color:'var(--amber)',fontSize:13,letterSpacing:1}}>
                    {'★'.repeat(r.rating)}<span style={{color:'rgba(10,74,92,0.12)'}}>{'★'.repeat(5-r.rating)}</span>
                  </span>
                  {r.treatment && (
                    <span style={{fontSize:11,color:'var(--muted)',background:'var(--bg-3)',
                      padding:'2px 8px',borderRadius:20}}>
                      {r.treatment}
                    </span>
                  )}
                  {r.status === 'new' && (
                    <span style={{fontSize:10,fontWeight:700,color:'var(--sage)',
                      background:'rgba(10,74,92,0.1)',padding:'2px 8px',borderRadius:20,
                      letterSpacing:'0.05em'}}>NEW</span>
                  )}
                </div>
                <div style={{fontSize:13,color:'var(--ink)',lineHeight:1.4,
                  overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:'100%'}}>
                  {r.text}
                </div>
                <div style={{fontSize:11,color:'var(--muted)',marginTop:4,display:'flex',gap:12}}>
                  <span>{r.name || 'Anonymous'}</span>
                  <span>{fmtDate(r.created_at)}</span>
                  {r.would_recommend === true  && <span style={{color:'var(--green)'}}>👍 Would recommend</span>}
                  {r.would_recommend === false && <span style={{color:'var(--muted)'}}>Would not recommend</span>}
                </div>
              </div>
            </div>
          ))
        )}
      </div>

      {/* Pagination */}
      {!loading && pages > 1 && (
        <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8,marginTop:16}}>
          <button className="btn btn-ghost btn-sm" onClick={() => load(1)} disabled={page===1}>«</button>
          <button className="btn btn-ghost btn-sm" onClick={() => load(page-1)} disabled={page===1}>‹ Prev</button>
          <span style={{fontSize:13,color:'var(--muted)'}}>Page {page} of {pages}</span>
          <button className="btn btn-ghost btn-sm" onClick={() => load(page+1)} disabled={page===pages}>Next ›</button>
          <button className="btn btn-ghost btn-sm" onClick={() => load(pages)} disabled={page===pages}>»</button>
        </div>
      )}

      {/* Detail modal */}
      {selected && (
        <div className="overlay" onClick={() => setSelected(null)}>
          <div className="modal" style={{maxWidth:500}} onClick={e => e.stopPropagation()}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:16}}>
              <div>
                <div style={{color:'var(--amber)',fontSize:20,letterSpacing:2,marginBottom:4}}>
                  {'★'.repeat(selected.rating)}<span style={{color:'rgba(10,74,92,0.15)'}}>{'★'.repeat(5-selected.rating)}</span>
                </div>
                <div className="modal-title" style={{marginBottom:0}}>
                  {selected.name || 'Anonymous reviewer'}
                </div>
                <div className="modal-sub" style={{marginBottom:0}}>
                  {fmtDate(selected.created_at)}
                  {selected.treatment && ` · ${selected.treatment}`}
                </div>
              </div>
              <button className="btn btn-ghost btn-sm" onClick={() => setSelected(null)}>✕</button>
            </div>

            <div style={{background:'var(--bg-3)',borderRadius:12,padding:'16px 18px',
              fontSize:14,lineHeight:1.7,color:'var(--ink)',marginBottom:16}}>
              {selected.text}
            </div>

            {selected.would_recommend !== null && (
              <div style={{fontSize:13,color:'var(--muted)',marginBottom:16}}>
                {selected.would_recommend
                  ? <span style={{color:'var(--green)'}}>👍 Would recommend Kliniq</span>
                  : <span>Would not recommend</span>}
              </div>
            )}

            {selected.email && (
              <div style={{fontSize:12,color:'var(--muted)',marginBottom:16}}>
                Email: <a href={`mailto:${selected.email}`} style={{color:'var(--sage)'}}>{selected.email}</a>
              </div>
            )}

            <div className="modal-foot">
              <button className="btn btn-ghost btn-sm" onClick={() => setSelected(null)}>Close</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

   019_treatment_plan_payments.sql to be applied.

const PLAN_STATUS_COLOR    = { active:'var(--teal)', paused:'var(--amber)', completed:'var(--green)', cancelled:'var(--muted)' };
const PLAN_STATUS_LABEL    = { active:'Active', paused:'Paused', completed:'Completed', cancelled:'Cancelled' };
const SESSION_STATUS_COLOR = { scheduled:'var(--muted)', completed:'var(--green)', missed:'var(--danger)', rescheduled:'var(--amber)' };
const SESSION_STATUS_LABEL = { scheduled:'Scheduled', completed:'Completed', missed:'Missed', rescheduled:'Rescheduled' };

/* ── Rand currency formatter ────────────────────────────────── */
function fmtR(n) {
  if (n == null || n === '') return '—';
  return 'R ' + Number(n).toLocaleString('en-ZA', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

/* ── PDF export ─────────────────────────────────────────────── */
function exportPlanPDF(plan, sessions) {
  if (!window.jspdf) { showToast('PDF library not loaded — check internet connection.', 'error'); return; }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  const W = 210, M = 18, CW = W - M * 2;
  let y = M;

  // Header band
  doc.setFillColor(155, 0, 68);
  doc.rect(0, 0, W, 30, 'F');
  doc.setTextColor(255, 255, 255);
  doc.setFont('helvetica', 'bold'); doc.setFontSize(15);
  doc.text('KLINIQ', M, 13);
  doc.setFont('helvetica', 'normal'); doc.setFontSize(8);
  doc.text('cliniq-five.vercel.app', M, 21);
  doc.text('TREATMENT PLAN REPORT  ·  Confidential', M, 27);
  y = 40;

  // Plan title
  doc.setTextColor(42, 15, 31);
  doc.setFont('helvetica', 'bold'); doc.setFontSize(16);
  doc.text(plan.title, M, y); y += 7;
  doc.setDrawColor(155, 0, 68); doc.setLineWidth(0.4);
  doc.line(M, y, W - M, y); y += 9;

  // Meta grid
  const col2 = M + 75, col3 = M + 140;
  const toD = v => {
    if (!v) return '—';
    try { return new Date(v.length === 10 ? v + 'T12:00:00' : v).toLocaleDateString('en-ZA'); } catch(e) { return String(v); }
  };
  const metaRow = (labels, values) => {
    doc.setFont('helvetica', 'normal'); doc.setFontSize(8); doc.setTextColor(133, 115, 118);
    doc.text(labels[0], M, y); doc.text(labels[1], col2, y);
    if (labels[2]) doc.text(labels[2], col3, y);
    y += 4;
    doc.setFont('helvetica', 'bold'); doc.setFontSize(10); doc.setTextColor(42, 15, 31);
    doc.text(String(values[0]), M, y); doc.text(String(values[1]), col2, y);
    if (values[2] != null) doc.text(String(values[2]), col3, y);
    y += 8;
  };
  const pat = plan.patients;
  metaRow(
    ['PATIENT', 'STATUS', 'CREATED'],
    [pat ? pat.first_name + ' ' + pat.last_name : '—', (PLAN_STATUS_LABEL[plan.status] || plan.status).toUpperCase(), toD(plan.created_at)]
  );
  metaRow(
    ['TOTAL SESSIONS', 'COMPLETED', 'NEXT SESSION DUE'],
    [plan.total_sessions, plan.sessions_done, toD(plan.next_session_due)]
  );

  // Payment summary band
  const totalCharged = sessions.reduce((s, x) => s + (parseFloat(x.amount_charged) || 0), 0);
  const totalPaid    = sessions.reduce((s, x) => s + (parseFloat(x.amount_paid)    || 0), 0);
  const outstanding  = totalCharged - totalPaid;
  const fA = v => 'R ' + v.toLocaleString('en-ZA', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

  doc.setFillColor(253, 238, 245);
  doc.roundedRect(M, y, CW, 26, 3, 3, 'F');
  [['TOTAL CHARGED', fA(totalCharged), false], ['TOTAL PAID', fA(totalPaid), false], ['OUTSTANDING', fA(outstanding), outstanding > 0]].forEach(([lbl, val, red], i) => {
    const x = M + i * (CW / 3) + 5;
    doc.setFont('helvetica', 'normal'); doc.setFontSize(7); doc.setTextColor(133, 115, 118);
    doc.text(lbl, x, y + 7);
    doc.setFont('helvetica', 'bold'); doc.setFontSize(12);
    doc.setTextColor(...(red ? [186, 26, 26] : [42, 15, 31]));
    doc.text(val, x, y + 19);
  });
  y += 34;

  // Sessions table
  doc.setFont('helvetica', 'bold'); doc.setFontSize(9); doc.setTextColor(133, 115, 118);
  doc.text('SESSIONS', M, y); y += 4;
  doc.autoTable({
    startY: y,
    margin: { left: M, right: M },
    head: [['#', 'Date', 'Status', 'Service', 'Charged', 'Paid', 'Balance', 'Method']],
    body: sessions.map(s => {
      const appt = s.appointments;
      const ch = parseFloat(s.amount_charged) || 0;
      const pd = parseFloat(s.amount_paid)    || 0;
      return [
        s.session_number,
        toD(s.session_date || appt?.appointment_date),
        SESSION_STATUS_LABEL[s.status] || s.status,
        appt?.services?.name || '—',
        s.amount_charged != null ? fA(ch) : '—',
        pd > 0 ? fA(pd) : '—',
        s.amount_charged != null ? fA(ch - pd) : '—',
        s.payment_method ? s.payment_method.replace('_', ' ') : '—',
      ];
    }),
    headStyles:         { fillColor: [155, 0, 68], textColor: 255, fontStyle: 'bold', fontSize: 8, cellPadding: 3 },
    bodyStyles:         { fontSize: 8, textColor: [42, 15, 31], cellPadding: 3 },
    alternateRowStyles: { fillColor: [253, 238, 245] },
    columnStyles:       { 0: { cellWidth: 8, halign: 'center' }, 4: { halign: 'right' }, 5: { halign: 'right' }, 6: { halign: 'right' } },
  });
  y = (doc.lastAutoTable ? doc.lastAutoTable.finalY : y) + 10;

  // Notes
  const noteParts = [plan.description, plan.notes ? 'Staff notes: ' + plan.notes : null].filter(Boolean);
  if (noteParts.length) {
    doc.setFont('helvetica', 'bold'); doc.setFontSize(9); doc.setTextColor(133, 115, 118);
    doc.text('NOTES', M, y); y += 5;
    doc.setFont('helvetica', 'normal'); doc.setFontSize(9); doc.setTextColor(42, 15, 31);
    noteParts.forEach(p => {
      const lines = doc.splitTextToSize(p, CW);
      doc.text(lines, M, y);
      y += lines.length * 5 + 3;
    });
  }

  // Footer on every page
  const total = doc.internal.getNumberOfPages();
  for (let i = 1; i <= total; i++) {
    doc.setPage(i);
    doc.setFontSize(7); doc.setFont('helvetica', 'normal'); doc.setTextColor(133, 115, 118);
    doc.text('Kliniq — Confidential', M, 289);
    doc.text('Generated: ' + new Date().toLocaleDateString('en-ZA'), W / 2, 289, { align: 'center' });
    doc.text('Page ' + i + ' of ' + total, W - M, 289, { align: 'right' });
  }

  const pSlug = pat ? (pat.first_name + '_' + pat.last_name).replace(/\s+/g, '_') : 'Patient';
  const tSlug = plan.title.replace(/[^a-zA-Z0-9]+/g, '_').slice(0, 30);
  doc.save('TreatmentPlan_' + pSlug + '_' + tSlug + '.pdf');
}

/* ── Session Payment Modal ──────────────────────────────────── */
function SessionPaymentModal({ session, onClose, onSaved }) {
  const [form, setForm] = useState({
    amount_charged: session.amount_charged ?? '',
    amount_paid:    session.amount_paid    ?? '',
    payment_method: session.payment_method ?? '',
    payment_notes:  session.payment_notes  ?? '',
  });
  const [saving, setSaving] = useState(false);
  const [err,    setErr]    = useState('');
  const set = p => setForm(f => ({...f, ...p}));

  const save = async () => {
    setSaving(true); setErr('');
    const charged = form.amount_charged !== '' ? parseFloat(form.amount_charged) : null;
    const paid    = form.amount_paid    !== '' ? parseFloat(form.amount_paid)    : null;
    if (charged != null && isNaN(charged)) { setErr('Amount charged must be a valid number.'); setSaving(false); return; }
    if (paid    != null && isNaN(paid))    { setErr('Amount paid must be a valid number.');    setSaving(false); return; }
    if (paid != null && charged != null && paid > charged) { setErr('Amount paid cannot exceed amount charged.'); setSaving(false); return; }
    try {
      const body = {
        amount_charged: charged,
        amount_paid:    paid ?? 0,
        payment_method: form.payment_method || null,
        payment_notes:  form.payment_notes.trim() || null,
        paid_at:        (paid && paid > 0) ? (session.paid_at || new Date().toISOString()) : null,
      };
      await api('/api/appointments?resource=plan_sessions&id=' + session.id, {
        method: 'PATCH', body: JSON.stringify(body),
      });
      showToast('Payment saved');
      onSaved({ ...session, ...body });
    } catch(e) { setErr(e.message || 'Could not save payment.'); setSaving(false); }
  };

  const appt = session.appointments;
  const sub  = [
    session.session_date  ? fmtDate(session.session_date) : (appt?.appointment_date ? fmtDate(appt.appointment_date) : null),
    appt?.services?.name,
    appt?.appointment_time ? appt.appointment_time.slice(0, 5) : null,
  ].filter(Boolean).join(' · ');

  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal" style={{maxWidth:440}} onClick={e => e.stopPropagation()}>
        <h3 className="modal-title">Payment — Session {session.session_number}</h3>
        {sub && <p className="modal-sub">{sub}</p>}

        <div className="form-cols" style={{gap:14,marginBottom:14}}>
          <div className="field">
            <label>Amount charged (R)</label>
            <input type="number" min="0" step="0.01" placeholder="0.00"
              value={form.amount_charged} onChange={e => set({amount_charged: e.target.value})} />
          </div>
          <div className="field">
            <label>Amount paid (R)</label>
            <input type="number" min="0" step="0.01" placeholder="0.00"
              value={form.amount_paid} onChange={e => set({amount_paid: e.target.value})} />
          </div>
        </div>

        <div className="field" style={{marginBottom:14}}>
          <label>Payment method</label>
          <select value={form.payment_method} onChange={e => set({payment_method: e.target.value})}>
            <option value="">— Select method —</option>
            <option value="cash">Cash</option>
            <option value="card">Card</option>
            <option value="eft">EFT</option>
            <option value="medical_aid">Medical Aid</option>
            <option value="other">Other</option>
          </select>
        </div>

        <div className="field" style={{marginBottom:16}}>
          <label>Payment notes</label>
          <textarea rows={2} value={form.payment_notes}
            onChange={e => set({payment_notes: e.target.value})}
            placeholder="Optional notes about this payment…" />
        </div>

        {err && <div className="alert alert-error" style={{marginBottom:12}}>{err}</div>}
        <div className="modal-foot">
          <button className="btn btn-ghost btn-sm" onClick={onClose} disabled={saving}>Cancel</button>
          <button className="btn btn-primary btn-sm" onClick={save} disabled={saving}>
            {saving ? 'Saving…' : 'Save payment'}
          </button>
        </div>
      </div>
    </div>
  );
}

function TreatmentPlansPage({ onNavigate, initialPatient, initialPlan, initialSessionId }) {
  const [plans,        setPlans]        = useState([]);
  const [loading,      setLoading]      = useState(true);
  const [total,        setTotal]        = useState(0);
  const [page,         setPage]         = useState(1);
  const [pages,        setPages]        = useState(1);
  const [selected,     setSelected]     = useState(null);
  const [sessions,     setSessions]     = useState([]);
  const [sessLoading,  setSessLoading]  = useState(false);
  const [showCreate,   setShowCreate]   = useState(false);
  const [statusFilter,   setStatusFilter]   = useState('active');
  const [payModal,       setPayModal]       = useState(null);
  const [addSessModal,   setAddSessModal]   = useState(false);
  const [loadErr,        setLoadErr]        = useState('');
  const [highlightSessId, setHighlightSessId] = useState(initialSessionId || null);
  const LIMIT = 20;

  const load = useCallback((pg = 1, sf = statusFilter) => {
    setLoading(true); setLoadErr('');
    const params = [`resource=treatment_plans`, `page=${pg}`, `limit=${LIMIT}`];
    if (sf) params.push(`status=${encodeURIComponent(sf)}`);
    api('/api/appointments?' + params.join('&'))
      .then(d => { setPlans(d.plans || []); setTotal(d.total || 0); setPages(d.pages || 1); setPage(pg); setLoading(false); })
      .catch(e => { setLoadErr(e.message || 'Could not load treatment plans.'); setLoading(false); });
  }, [statusFilter]);

  useEffect(() => { load(1, statusFilter); }, [statusFilter]);

  // Auto-open plan when navigated here from PatientDrawer
  useEffect(() => {
    if (initialPlan) openPlan(initialPlan);
  }, []); // intentionally runs once on mount only

  // Clear the session highlight 2.5s after the target session becomes visible
  useEffect(() => {
    if (!highlightSessId || !sessions.some(s => s.id === highlightSessId)) return;
    const t = setTimeout(() => setHighlightSessId(null), 2500);
    return () => clearTimeout(t);
  }, [sessions, highlightSessId]);

  const openPlan = async (plan) => {
    setSelected(plan); setSessions([]); setSessLoading(true);
    try {
      const d = await api(`/api/appointments?resource=plan_sessions&plan_id=${plan.id}`);
      setSessions(d.sessions || []);
    } catch {}
    finally { setSessLoading(false); }
  };

  const updatePlanStatus = async (planId, status) => {
    await api(`/api/appointments?resource=treatment_plans&id=${planId}`, { method:'PATCH', body: JSON.stringify({ status }) });
    setPlans(prev => prev.map(p => p.id === planId ? {...p, status} : p));
    if (selected?.id === planId) setSelected(p => ({...p, status}));
    showToast(`Plan ${PLAN_STATUS_LABEL[status].toLowerCase()}`);
  };

  const updateSessionStatus = async (sessionId, status) => {
    try {
      await api(`/api/appointments?resource=plan_sessions&id=${sessionId}`, { method:'PATCH', body: JSON.stringify({ status }) });
      setSessions(prev => prev.map(s => s.id === sessionId ? {...s, status} : s));
      const d = await api(`/api/appointments?resource=treatment_plans&id=${selected.id}`);
      setSelected(d.plan);
      setPlans(prev => prev.map(p => p.id === selected.id ? {...p, sessions_done: d.plan.sessions_done, status: d.plan.status} : p));
    } catch(e) { showToast(e.message, 'error'); }
  };

  const onSessionPaid = (updatedSession) => {
    setSessions(prev => prev.map(s => s.id === updatedSession.id ? {...s, ...updatedSession} : s));
    setPayModal(null);
  };

  const onSessionAdded = (newSession) => {
    setSessions(prev => [...prev, newSession]);
    setAddSessModal(false);
    // Update plan's sessions_done count if new session is already completed
    if (newSession.status === 'completed') {
      setSelected(p => p ? {...p, sessions_done: (p.sessions_done || 0) + 1} : p);
    }
  };

  const notifyPatient = async (plan) => {
    const patient = plan.patients;
    const dueDate = plan.next_session_due ? fmtDate(plan.next_session_due) : 'soon';
    const msg = encodeURIComponent(
      `Hi ${patient?.first_name || 'there'}, this is Kliniq. Your next session for your treatment plan "${plan.title}" is due on ${dueDate}. Please call us on 011 660 2400 to confirm your appointment. Thank you!`
    );
    const waNum = patient?.phone?.replace(/\D/g, '');
    if (!waNum) { showToast('No phone number on record for this patient', 'error'); return; }
    window.open(`https://wa.me/${waNum}?text=${msg}`, '_blank');
    await api(`/api/appointments?resource=treatment_plans&id=${plan.id}`, {
      method: 'PATCH', body: JSON.stringify({ last_notified_at: new Date().toISOString() }),
    }).catch(() => {});
    setSelected(p => p ? {...p, last_notified_at: new Date().toISOString()} : p);
    showToast(`WhatsApp opened for ${patient?.first_name} ${patient?.last_name}`);
  };

  // Live payment summary computed from sessions state
  const totalCharged = sessions.reduce((s, x) => s + (parseFloat(x.amount_charged) || 0), 0);
  const totalPaid    = sessions.reduce((s, x) => s + (parseFloat(x.amount_paid)    || 0), 0);
  const outstanding  = totalCharged - totalPaid;
  const anyPayment   = sessions.some(s => s.amount_charged != null);

  return (
    <div>
      <div style={{marginBottom:24,display:'flex',justifyContent:'space-between',alignItems:'flex-end'}}>
        <div>
          <div className="eyebrow">Clinical</div>
          <h2 style={{fontFamily:'Plus Jakarta Sans,sans-serif',fontSize:30,marginTop:4}}>Treatment Plans</h2>
          <div style={{fontSize:12,color:'var(--muted)',marginTop:4}}>
            Multi-session procedures — track progress, payments and notify patients.
          </div>
        </div>
        <button className="btn btn-primary btn-sm" onClick={() => setShowCreate(true)}>+ New plan</button>
      </div>

      {/* Filter */}
      <div style={{display:'flex',gap:6,marginBottom:20}}>
        {['active','paused','completed',''].map(sf => (
          <button key={sf||'all'} className={`btn btn-sm ${statusFilter===sf?'btn-primary':'btn-ghost'}`}
            onClick={() => setStatusFilter(sf)}>
            {sf==='active'?'Active':sf==='paused'?'Paused':sf==='completed'?'Completed':'All'}
          </button>
        ))}
      </div>

      {loadErr && <div className="alert alert-error" style={{marginBottom:16}}>{loadErr}</div>}

      <div className="card" style={{padding:0,overflow:'hidden'}}>
        <div className="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Patient</th>
                <th>Plan</th>
                <th>Progress</th>
                <th>Next session</th>
                <th>Status</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              {loading ? <SkeletonRows n={5} /> : plans.length === 0 ? (
                <tr><td colSpan="6">
                  <div className="empty">
                    <div className="empty-icon">📋</div>
                    <div style={{marginBottom:8}}>No treatment plans yet.</div>
                    <div style={{fontSize:12,color:'var(--muted)'}}>Use "New plan" to create a multi-session treatment plan for a patient.</div>
                  </div>
                </td></tr>
              ) : plans.map(plan => {
                const pct = plan.total_sessions > 0 ? Math.round((plan.sessions_done / plan.total_sessions) * 100) : 0;
                return (
                  <tr key={plan.id} style={{cursor:'pointer'}} onClick={() => openPlan(plan)}>
                    <td className="td-main">
                      {plan.patients ? (
                        <button style={{background:'none',border:'none',padding:0,cursor:'pointer',color:'var(--ink)',fontWeight:500,fontSize:13,fontFamily:'inherit',textAlign:'left'}}
                          onClick={e => { e.stopPropagation(); onNavigate?.({ page:'patients', payload:{ patient: plan.patients } }); }}>
                          {plan.patients.first_name} {plan.patients.last_name}
                        </button>
                      ) : '—'}
                    </td>
                    <td>
                      <div style={{fontWeight:500,fontSize:13,color:'var(--ink)'}}>{plan.title}</div>
                      {plan.description && <div style={{fontSize:11,color:'var(--muted)',marginTop:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:240}}>{plan.description}</div>}
                    </td>
                    <td>
                      <div style={{display:'flex',alignItems:'center',gap:8,minWidth:120}}>
                        <div style={{flex:1,height:6,borderRadius:3,background:'var(--bg-3)',overflow:'hidden'}}>
                          <div style={{height:'100%',borderRadius:3,background:pct===100?'var(--green)':'var(--sage)',width:`${pct}%`,transition:'width .4s'}} />
                        </div>
                        <span style={{fontSize:12,color:'var(--muted)',whiteSpace:'nowrap',fontVariantNumeric:'tabular-nums'}}>
                          {plan.sessions_done}/{plan.total_sessions}
                        </span>
                      </div>
                    </td>
                    <td className="mono" style={{fontSize:12}}>{plan.next_session_due ? fmtDateShort(plan.next_session_due) : '—'}</td>
                    <td><span style={{fontSize:11,fontWeight:600,color:PLAN_STATUS_COLOR[plan.status]||'var(--muted)'}}>{PLAN_STATUS_LABEL[plan.status]||plan.status}</span></td>
                    <td><button className="btn btn-ghost btn-sm" onClick={e=>{e.stopPropagation();openPlan(plan);}}>View</button></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      {!loading && pages > 1 && (
        <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8,marginTop:20}}>
          <button className="btn btn-ghost btn-sm" onClick={() => load(page-1)} disabled={page===1}>‹ Prev</button>
          <span style={{fontSize:12,color:'var(--muted)'}}>Page {page} of {pages}</span>
          <button className="btn btn-ghost btn-sm" onClick={() => load(page+1)} disabled={page===pages}>Next ›</button>
        </div>
      )}

      {/* ── Plan detail modal ── */}
      {selected && (
        <div className="overlay" onClick={() => setSelected(null)}>
          <div className="modal" style={{maxWidth:640}} onClick={e => e.stopPropagation()}>
            <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:4}}>
              <h3 className="modal-title" style={{margin:0}}>{selected.title}</h3>
              <button className="btn btn-ghost btn-sm" onClick={() => setSelected(null)}>✕</button>
            </div>
            <p className="modal-sub">
              {selected.patients ? (
                <button style={{background:'none',border:'none',padding:0,cursor:'pointer',color:'var(--sage)',fontFamily:'inherit',fontSize:'inherit'}}
                  onClick={() => { setSelected(null); onNavigate?.({ page:'patients', payload:{ patient: selected.patients } }); }}>
                  {selected.patients.first_name} {selected.patients.last_name}
                </button>
              ) : 'Unknown patient'}
              {' · '}<span style={{color:PLAN_STATUS_COLOR[selected.status]||'var(--muted)',fontWeight:600}}>{PLAN_STATUS_LABEL[selected.status]}</span>
            </p>

            {/* Progress bar */}
            <div style={{background:'var(--bg-3)',borderRadius:10,padding:'14px 16px',marginBottom:anyPayment?10:16}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                <span style={{fontSize:12,color:'var(--muted)',fontWeight:600,letterSpacing:'0.08em',textTransform:'uppercase'}}>Progress</span>
                <span style={{fontSize:14,fontWeight:700,color:'var(--ink)'}}>{selected.sessions_done} / {selected.total_sessions} sessions</span>
              </div>
              <div style={{height:8,borderRadius:4,background:'rgba(10,74,92,0.1)',overflow:'hidden'}}>
                <div style={{height:'100%',borderRadius:4,
                  background: selected.sessions_done >= selected.total_sessions ? 'var(--green)' : 'var(--sage)',
                  width: `${selected.total_sessions > 0 ? Math.round((selected.sessions_done / selected.total_sessions)*100) : 0}%`,
                  transition:'width .4s'}} />
              </div>
              {selected.next_session_due && (
                <div style={{fontSize:12,color:'var(--muted)',marginTop:8}}>Next session due: <strong style={{color:'var(--ink)'}}>{fmtDate(selected.next_session_due)}</strong></div>
              )}
              {selected.description && (
                <div style={{fontSize:13,color:'var(--ink-soft)',marginTop:8,lineHeight:1.5}}>{selected.description}</div>
              )}
            </div>

            {/* Payment summary — shown once any session has a charge */}
            {anyPayment && (
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:16}}>
                {[['Total Charged', totalCharged, false], ['Total Paid', totalPaid, false], ['Outstanding', outstanding, outstanding > 0]].map(([label, val, warn]) => (
                  <div key={label} style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:10,padding:'10px 14px'}}>
                    <div style={{fontSize:10,color:'var(--muted)',letterSpacing:'0.06em',textTransform:'uppercase',fontWeight:600,marginBottom:4}}>{label}</div>
                    <div style={{fontSize:15,fontWeight:700,color:warn?'var(--danger)':'var(--ink)',fontFamily:'Plus Jakarta Sans,sans-serif'}}>{fmtR(val)}</div>
                  </div>
                ))}
              </div>
            )}

            {/* Sessions */}
            <div style={{marginBottom:16}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
                <div style={{fontSize:10,letterSpacing:'0.12em',textTransform:'uppercase',color:'var(--muted)',fontWeight:600}}>Sessions</div>
                {['active','paused'].includes(selected.status) && (
                  <button className="btn btn-ghost btn-sm" style={{fontSize:11,display:'flex',alignItems:'center',gap:4}}
                    onClick={() => setAddSessModal(true)}>
                    <span className="material-symbols-outlined" style={{fontSize:14}}>add</span> Add session
                  </button>
                )}
              </div>
              {sessLoading ? <div style={{color:'var(--muted)',fontSize:13,padding:'8px 0'}}>Loading…</div>
              : !sessions.length ? (
                <div style={{background:'var(--bg-3)',borderRadius:8,padding:'16px',textAlign:'center'}}>
                  <div style={{fontSize:13,color:'var(--muted)',marginBottom:6}}>No sessions recorded yet.</div>
                  {['active','paused'].includes(selected.status) && (
                    <button className="btn btn-ghost btn-sm" style={{fontSize:11}} onClick={() => setAddSessModal(true)}>+ Add first session</button>
                  )}
                </div>
              )
              : sessions.map(s => {
                const appt     = s.appointments;
                const ch       = parseFloat(s.amount_charged) || 0;
                const pd       = parseFloat(s.amount_paid)    || 0;
                const isPaid   = s.amount_charged != null && ch > 0 && pd >= ch;
                const isPartial= s.amount_charged != null && pd > 0 && pd < ch;
                return (
                  <div key={s.id}
                    ref={el => { if (el && s.id === highlightSessId) el.scrollIntoView({ behavior:'smooth', block:'nearest' }); }}
                    style={{
                      display:'flex',alignItems:'flex-start',gap:10,padding:'10px 12px',
                      background: s.id === highlightSessId ? 'rgba(10,74,92,0.05)' : 'var(--bg-3)',
                      borderRadius:8, marginBottom:6,
                      outline: s.id === highlightSessId ? '2px solid var(--sage)' : '2px solid transparent',
                      transition:'background 0.8s, outline 0.8s',
                    }}>
                    {/* Number badge */}
                    <div style={{
                      width:28,height:28,borderRadius:6,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',
                      background:`${SESSION_STATUS_COLOR[s.status]||'var(--muted)'}18`,
                      border:`1.5px solid ${SESSION_STATUS_COLOR[s.status]||'var(--muted)'}40`,
                      fontSize:12,fontWeight:700,color:SESSION_STATUS_COLOR[s.status]||'var(--muted)',marginTop:2,
                    }}>{s.session_number}</div>

                    {/* Content */}
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                        <span style={{fontSize:13,fontWeight:500,color:'var(--ink)'}}>Session {s.session_number}</span>
                        <span style={{fontSize:11,color:SESSION_STATUS_COLOR[s.status]||'var(--muted)',fontWeight:600}}>{SESSION_STATUS_LABEL[s.status]||s.status}</span>
                      </div>
                      {(s.session_date || appt) && (
                        <div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>
                          {s.session_date ? fmtDateShort(s.session_date) : (appt?.appointment_date ? fmtDateShort(appt.appointment_date) : '')}
                          {appt?.services?.name ? ' · ' + appt.services.name : ''}
                          {appt?.appointment_time ? ' at ' + appt.appointment_time.slice(0,5) : ''}
                        </div>
                      )}
                      {s.notes && <div style={{fontSize:12,color:'var(--ink-soft)',marginTop:2}}>{s.notes}</div>}
                      {/* Payment row */}
                      {s.amount_charged != null && (
                        <div style={{display:'flex',alignItems:'center',gap:10,marginTop:5,flexWrap:'wrap'}}>
                          <span style={{fontSize:11,color:'var(--muted)'}}>Charged: <strong style={{color:'var(--ink)'}}>{fmtR(s.amount_charged)}</strong></span>
                          <span style={{fontSize:11,color:'var(--muted)'}}>Paid: <strong style={{color:isPaid?'var(--green)':isPartial?'var(--amber)':'var(--danger)'}}>{fmtR(s.amount_paid)}</strong></span>
                          {isPartial && <span style={{fontSize:10,color:'var(--amber)',fontWeight:600}}>{fmtR(ch - pd)} outstanding</span>}
                          {isPaid    && <span style={{fontSize:10,color:'var(--green)',fontWeight:600}}>Paid in full</span>}
                          {s.payment_method && <span style={{fontSize:10,color:'var(--muted)',background:'rgba(10,74,92,0.06)',padding:'1px 6px',borderRadius:999,textTransform:'capitalize'}}>{s.payment_method.replace('_',' ')}</span>}
                        </div>
                      )}
                    </div>

                    {/* Action buttons */}
                    <div style={{display:'flex',flexDirection:'column',gap:4,flexShrink:0,alignItems:'flex-end'}}>
                      <div style={{display:'flex',gap:4}}>
                        {s.status !== 'completed' && (
                          <button className="btn btn-ghost btn-sm" style={{fontSize:11,color:'var(--green)',borderColor:'rgba(22,163,74,0.3)'}}
                            onClick={() => updateSessionStatus(s.id, 'completed')}>✓ Done</button>
                        )}
                        {s.status === 'scheduled' && (
                          <button className="btn btn-ghost btn-sm" style={{fontSize:11,color:'var(--danger)',borderColor:'rgba(186,26,26,0.3)'}}
                            onClick={() => updateSessionStatus(s.id, 'missed')}>Missed</button>
                        )}
                      </div>
                      <button className="btn btn-ghost btn-sm" style={{fontSize:11}}
                        onClick={() => setPayModal(s)}>
                        {s.amount_charged != null ? 'Edit payment' : '+ Payment'}
                      </button>
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Actions */}
            <div style={{display:'flex',gap:8,flexWrap:'wrap',borderTop:'1px solid var(--border)',paddingTop:16}}>
              {selected.status === 'active' && (
                <button className="btn btn-ghost btn-sm" onClick={() => updatePlanStatus(selected.id, 'paused').catch(e => showToast(e.message, 'error'))}>Pause plan</button>
              )}
              {selected.status === 'paused' && (
                <button className="btn btn-ghost btn-sm" onClick={() => updatePlanStatus(selected.id, 'active').catch(e => showToast(e.message, 'error'))}>Resume plan</button>
              )}
              {['active','paused'].includes(selected.status) && (
                <button className="btn btn-ghost btn-sm" onClick={() => notifyPatient(selected)}
                  style={{display:'flex',alignItems:'center',gap:6}}>
                  <span style={{fontSize:14}}>💬</span> WhatsApp reminder
                </button>
              )}
              {sessions.length > 0 && (
                <button className="btn btn-ghost btn-sm" style={{display:'flex',alignItems:'center',gap:5}}
                  onClick={() => exportPlanPDF(selected, sessions)}>
                  <span className="material-symbols-outlined" style={{fontSize:15}}>download</span> Export PDF
                </button>
              )}
              {selected.last_notified_at && (
                <span style={{fontSize:11,color:'var(--muted)',alignSelf:'center'}}>Last notified: {fmtDate(selected.last_notified_at)}</span>
              )}
              <div style={{marginLeft:'auto',display:'flex',gap:8}}>
                {['active','paused'].includes(selected.status) && (
                  <button className="btn btn-ghost btn-sm" style={{color:'var(--danger)',borderColor:'rgba(186,26,26,0.3)'}}
                    onClick={async () => {
                      if (!window.confirm('Cancel this treatment plan?')) return;
                      try { await updatePlanStatus(selected.id, 'cancelled'); setSelected(null); }
                      catch {}
                    }}>
                    Cancel plan
                  </button>
                )}
                <button className="btn btn-ghost btn-sm" onClick={() => setSelected(null)}>Close</button>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* ── Create plan modal ── */}
      {showCreate && <CreateTreatmentPlanModal onClose={() => setShowCreate(false)} onDone={() => { setShowCreate(false); load(1, statusFilter); }} />}

      {/* ── Session payment modal ── */}
      {payModal && (
        <SessionPaymentModal
          session={payModal}
          onClose={() => setPayModal(null)}
          onSaved={onSessionPaid}
        />
      )}

      {/* ── Add session modal ── */}
      {addSessModal && selected && (
        <AddSessionModal
          plan={selected}
          nextNumber={sessions.length + 1}
          onClose={() => setAddSessModal(false)}
          onSaved={onSessionAdded}
        />
      )}
    </div>
  );
}

/* ── Add Session Modal ───────────────────────────────────────── */
function AddSessionModal({ plan, nextNumber, onClose, onSaved }) {
  const [form, setForm] = useState({ session_date: '', notes: '' });
  const [saving, setSaving] = useState(false);
  const [err,    setErr]    = useState('');
  const set = p => setForm(f => ({...f, ...p}));

  const save = async () => {
    setSaving(true); setErr('');
    try {
      const body = {
        plan_id:        plan.id,
        session_number: nextNumber,
        session_date:   form.session_date || null,
        notes:          form.notes.trim() || null,
      };
      const d = await api('/api/appointments?resource=plan_sessions', {
        method: 'POST', body: JSON.stringify(body),
      });
      showToast(`Session ${nextNumber} added`);
      onSaved(d.session);
    } catch(e) { setErr(e.message || 'Could not add session.'); setSaving(false); }
  };

  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal" style={{maxWidth:420}} onClick={e => e.stopPropagation()}>
        <h3 className="modal-title">Add session {nextNumber}</h3>
        <p className="modal-sub">{plan.title}</p>

        <div className="field" style={{marginBottom:14}}>
          <label>Session date</label>
          <input type="date" value={form.session_date} onChange={e => set({session_date: e.target.value})} />
        </div>

        <div className="field" style={{marginBottom:16}}>
          <label>Notes</label>
          <textarea rows={2} value={form.notes} onChange={e => set({notes: e.target.value})}
            placeholder="Optional notes for this session…" />
        </div>

        {err && <div className="alert alert-error" style={{marginBottom:12}}>{err}</div>}
        <div className="modal-foot">
          <button className="btn btn-ghost btn-sm" onClick={onClose} disabled={saving}>Cancel</button>
          <button className="btn btn-primary btn-sm" onClick={save} disabled={saving}>
            {saving ? 'Adding…' : 'Add session'}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ── Create Treatment Plan Modal ─────────────────────────────── */
function CreateTreatmentPlanModal({ onClose, onDone }) {
  const [form, setForm] = useState({ patient_id:'', patient_label:'', title:'', total_sessions:2, description:'', notes:'', next_session_due:'' });
  const [saving, setSaving] = useState(false);
  const [err, setErr] = useState('');
  const [ptSearch, setPtSearch] = useState('');
  const [ptResults, setPtResults] = useState([]);
  const [ptBusy, setPtBusy] = useState(false);
  const ptTimer = useRef(null);
  const set = p => setForm(f => ({...f,...p}));

  const searchPt = q => {
    setPtSearch(q); clearTimeout(ptTimer.current);
    if (!q.trim()) { setPtResults([]); return; }
    ptTimer.current = setTimeout(async () => {
      setPtBusy(true);
      try { const d = await api(`/api/patients?q=${encodeURIComponent(q)}&limit=6`); setPtResults(d.patients || []); }
      catch { setPtResults([]); }
      finally { setPtBusy(false); }
    }, 350);
  };

  const selectPt = p => {
    set({ patient_id: p.id, patient_label: `${p.first_name} ${p.last_name}` });
    setPtSearch(''); setPtResults([]);
  };

  const submit = async () => {
    if (!form.patient_id) { setErr('Please select a patient.'); return; }
    if (!form.title.trim()) { setErr('Plan title is required.'); return; }
    if (!form.total_sessions || Number(form.total_sessions) < 1) { setErr('Total sessions must be at least 1.'); return; }
    setSaving(true); setErr('');
    try {
      const resp = await api('/api/appointments?resource=treatment_plans', {
        method: 'POST',
        body: JSON.stringify({
          patient_id:       form.patient_id,
          title:            form.title.trim(),
          total_sessions:   Number(form.total_sessions),
          description:      form.description.trim() || null,
          notes:            form.notes.trim() || null,
          next_session_due: form.next_session_due || null,
        }),
      });
      showToast(`Treatment plan "${form.title}" created`);
      onDone(resp.plan);
    } catch(e) { setErr(e.message || 'Could not create plan. Please try again.'); setSaving(false); }
  };

  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal" style={{maxWidth:520}} onClick={e => e.stopPropagation()}>
        <h3 className="modal-title">New treatment plan</h3>
        <p className="modal-sub">Create a multi-session treatment plan for a patient.</p>

        {/* Patient search */}
        <div className="field" style={{marginBottom:14}}>
          <label>Patient *</label>
          {form.patient_id ? (
            <div style={{display:'flex',alignItems:'center',gap:10,background:'var(--bg-3)',borderRadius:10,padding:'10px 14px'}}>
              <span style={{flex:1,fontSize:13,fontWeight:500,color:'var(--ink)'}}>{form.patient_label}</span>
              <button type="button" className="btn btn-ghost btn-sm" style={{fontSize:11}} onClick={() => set({patient_id:'',patient_label:''})}>Change</button>
            </div>
          ) : (
            <>
              <input type="search" placeholder="Search by name or email…" value={ptSearch} onChange={e => searchPt(e.target.value)} />
              {ptBusy && <div style={{fontSize:12,color:'var(--muted)',marginTop:4}}>Searching…</div>}
              {ptResults.length > 0 && (
                <div style={{border:'1px solid var(--border)',borderRadius:8,overflow:'hidden',marginTop:4}}>
                  {ptResults.map((p,i) => (
                    <div key={p.id} onClick={() => selectPt(p)} style={{padding:'9px 12px',cursor:'pointer',fontSize:13,borderTop:i>0?'1px solid var(--border)':'none',background:'var(--card)'}}
                      onMouseEnter={e=>e.currentTarget.style.background='color-mix(in oklab,var(--sage) 8%,var(--card))'}
                      onMouseLeave={e=>e.currentTarget.style.background='var(--card)'}>
                      <span style={{fontWeight:500}}>{p.first_name} {p.last_name}</span>
                      <span style={{fontSize:11,color:'var(--muted)',marginLeft:8}}>{p.phone||p.email||''}</span>
                    </div>
                  ))}
                </div>
              )}
            </>
          )}
        </div>

        <div className="field" style={{marginBottom:14}}>
          <label>Plan title *</label>
          <input value={form.title} onChange={e => set({title:e.target.value})} placeholder="e.g. Root Canal Treatment — Tooth 16" />
        </div>

        <div className="form-cols" style={{gap:14,marginBottom:14}}>
          <div className="field">
            <label>Total sessions *</label>
            <input type="number" min="1" max="50" value={form.total_sessions} onChange={e => set({total_sessions:e.target.value})} />
          </div>
          <div className="field">
            <label>First session due</label>
            <input type="date" value={form.next_session_due} onChange={e => set({next_session_due:e.target.value})} />
          </div>
        </div>

        <div className="field" style={{marginBottom:14}}>
          <label>Description</label>
          <textarea rows={2} value={form.description} onChange={e => set({description:e.target.value})} placeholder="Procedures involved, tooth numbers, special instructions…" />
        </div>

        <div className="field" style={{marginBottom:14}}>
          <label>Internal notes</label>
          <textarea rows={2} value={form.notes} onChange={e => set({notes:e.target.value})} placeholder="Staff-only notes…" />
        </div>

        {err && <div className="alert alert-error" style={{marginBottom:12}}>{err}</div>}
        <div className="modal-foot">
          <button className="btn btn-ghost btn-sm" onClick={onClose} disabled={saving}>Cancel</button>
          <button className="btn btn-primary btn-sm" onClick={submit} disabled={saving}>
            {saving ? 'Creating…' : 'Create plan'}
          </button>
        </div>
      </div>
    </div>
  );
}


const NAV = [
  { id:'overview',         label:'Overview',         icon:'dashboard' },
  { id:'appointments',     label:'Appointments',     icon:'calendar_month' },
  { id:'patients',         label:'Patients',         icon:'groups' },
  { id:'treatment_plans',  label:'Treatment Plans',  icon:'assignment' },
  { id:'analytics',        label:'Analytics',        icon:'bar_chart' },
  { id:'inventory',        label:'Inventory',        icon:'inventory_2' },
  { id:'revenue',          label:'Revenue',          icon:'payments' },
  // { id:'claims', label:'Claims', icon:'receipt_long' },  // hidden — re-enable for Healthbridge
  { id:'services',         label:'Services',         icon:'medical_services' },
  { id:'messages',         label:'Messages',         icon:'mail' },
  { id:'reviews',          label:'Reviews',          icon:'reviews' },
  { id:'settings',         label:'Settings',         icon:'settings' },
];

const PAGE_TITLES = {
  overview:        'Overview',
  appointments:    'Appointments',
  patients:        'Patients',
  treatment_plans: 'Treatment Plans',
  analytics:       'Analytics',
  inventory:       'Inventory',
  revenue:         'Revenue',
  claims:          'Claims',
  services:        'Services',
  messages:        'Messages',
  reviews:         'Reviews',
  settings:        'Settings',
};

function Shell({ session, supabase, onLogout }) {
  const [page,         setPage]        = useState('overview');
  const [navPayload,   setNavPayload]   = useState(null);
  const [timeoutWarning, setTimeoutWarning] = useState(false);
  const [sidebarOpen,  setSidebarOpen]  = useState(false);
  const [unreadMsgs,      setUnreadMsgs]      = useState(0);
  const [unreadReviews,   setUnreadReviews]   = useState(0);
  const [practiceName,    setPracticeName]    = useState('Kliniq');
  const [sidebarCollapsed, setSidebarCollapsed] = useState(() => {
    try { return localStorage.getItem('sb_collapsed') === '1'; } catch { return false; }
  });
  const stayRef = useRef(null);

  const toggleCollapse = () => setSidebarCollapsed(v => {
    const next = !v;
    try { localStorage.setItem('sb_collapsed', next ? '1' : '0'); } catch {}
    return next;
  });
  const user = session?.user;

  useEffect(() => {
    supabase.from('practices').select('name').limit(1).single()
      .then(({ data }) => { if (data?.name) setPracticeName(data.name); })
      .catch(() => {});
  }, [supabase]);

  // Keep the global _token in sync with the session (safe to call in render;
  // moved here so token is always fresh before any child API call).
  useEffect(() => {
    setToken(session?.access_token || null);
  }, [session?.access_token]);

  // Poll unread message count every 60s
  useEffect(() => {
    const fetchCount = () => {
      api('/api/contact?status=new&limit=1')
        .then(d => setUnreadMsgs(d.total || 0))
        .catch(() => {});
    };
    fetchCount();
    const interval = setInterval(fetchCount, 60_000);
    return () => clearInterval(interval);
  }, []);

  // Poll unread review count every 60s
  useEffect(() => {
    const fetchReviews = () => {
      api('/api/reviews?status=new&limit=1')
        .then(d => setUnreadReviews(d.total || 0))
        .catch(() => {});
    };
    fetchReviews();
    const interval = setInterval(fetchReviews, 60_000);
    return () => clearInterval(interval);
  }, []);

  const navigate = (target) => {
    if (typeof target === 'string') { setPage(target); setNavPayload(null); }
    else { setPage(target.page); setNavPayload(target.payload || null); }
  };

  const logout = async () => {
    await supabase.auth.signOut();
    onLogout();
  };

  // ── Inactivity timeout ────────────────────────────────────────
  useEffect(() => {
    const WARN_MS   = 14 * 60 * 1000; // show warning at 14 min
    const LOGOUT_MS = 15 * 60 * 1000; // sign out at 15 min
    let warnTimer, logoutTimer;

    const reset = () => {
      clearTimeout(warnTimer);
      clearTimeout(logoutTimer);
      setTimeoutWarning(false);
      warnTimer   = setTimeout(() => setTimeoutWarning(true), WARN_MS);
      logoutTimer = setTimeout(async () => {
        await supabase.auth.signOut();
        onLogout();
      }, LOGOUT_MS);
    };

    stayRef.current = reset;

    const events = ['mousemove','mousedown','keydown','touchstart','scroll'];
    events.forEach(e => window.addEventListener(e, reset, { passive: true }));
    reset(); // start timer on mount

    return () => {
      clearTimeout(warnTimer);
      clearTimeout(logoutTimer);
      events.forEach(e => window.removeEventListener(e, reset));
    };
  }, [supabase, onLogout]);

  const renderPage = () => {
    switch (page) {
      case 'overview':     return <Overview onNavigate={navigate} unreadMsgs={unreadMsgs} />;
      case 'appointments':    return <Appointments onNavigate={navigate} />;
      case 'patients':        return <Patients initialPatient={navPayload?.patient} />;
      case 'treatment_plans': return <TreatmentPlansPage onNavigate={navigate} initialPatient={navPayload?.patient} initialPlan={navPayload?.plan} initialSessionId={navPayload?.sessionId} />;
      case 'analytics':    return <AnalyticsPage />;
      case 'inventory':    return <InventoryPage />;
      case 'revenue':      return <RevenuePage />;
      // case 'claims': return <ClaimsPage onNavigate={navigate} initialPayload={navPayload} />;  // hidden — re-enable for Healthbridge
      case 'services':     return <ServicesPage />;
      case 'messages':     return <MessagesPage />;
      case 'reviews':      return <ReviewsPage unreadCount={unreadReviews} />;
      case 'settings':     return <SettingsPage supabase={supabase} session={session} />;
      default:             return <Overview onNavigate={navigate} unreadMsgs={unreadMsgs} />;
    }
  };

  return (
    <div style={{display:'flex',minHeight:'100vh',width:'100%'}}>

      {/* ── Global toast notifications ── */}
      <ToastContainer />

      {/* ── Inactivity warning toast ── */}
      {timeoutWarning && (
        <div style={{
          position:'fixed', bottom:24, right:24, zIndex:300,
          background:'var(--card)', border:'1px solid var(--border-2)',
          borderRadius:12, padding:'18px 20px', maxWidth:300,
          boxShadow:'0 4px 24px rgba(10,74,92,0.14)',
          display:'flex', flexDirection:'column', gap:12,
        }}>
          <div style={{fontSize:13,fontWeight:600,color:'var(--ink)'}}>Session expiring</div>
          <div style={{fontSize:12,color:'var(--muted)',lineHeight:1.5}}>
            You'll be signed out in 1 minute due to inactivity.
          </div>
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-primary btn-sm" onClick={() => stayRef.current?.()}>Stay signed in</button>
            <button className="btn btn-ghost btn-sm" onClick={logout}>Sign out now</button>
          </div>
        </div>
      )}

      {/* Mobile sidebar overlay */}
      {sidebarOpen && (
        <div className="pt-overlay" style={{zIndex:199}} onClick={()=>setSidebarOpen(false)} />
      )}

      <aside className={`sidebar ${sidebarOpen ? 'sidebar-open' : ''} ${sidebarCollapsed ? 'sidebar-collapsed' : ''}`}>
        <div className="sidebar-logo">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="34" height="34" style={{flexShrink:0}}>
            <circle cx="40" cy="40" r="40" fill="rgba(255,255,255,0.15)"/>
            <path d="M40 57 C35 52 18 42 18 30 C18 24 23 19 29 19 C33 19 36.5 21.5 40 25.5 C43.5 21.5 47 19 51 19 C57 19 62 24 62 30 C62 42 45 52 40 57Z" fill="none" stroke="white" strokeWidth="2.2" strokeLinejoin="round" strokeLinecap="round"/>
            <line x1="40" y1="26.5" x2="40" y2="35.5" stroke="white" strokeWidth="2.2" strokeLinecap="round"/>
            <line x1="35.5" y1="31" x2="44.5" y2="31" stroke="white" strokeWidth="2.2" strokeLinecap="round"/>
            <path d="M14 62 L14 54 C14 51 16 49 18.5 49 L18.5 43 C18.5 41.5 20.5 41 21 42.5 L21.5 48.5 C22.5 48 24 49 24 50.5 L24 53.5 C26 54.5 26.5 57 25.5 59 L25.5 62 Z" fill="none" stroke="white" strokeWidth="1.8" strokeLinejoin="round" strokeLinecap="round"/>
            <path d="M66 62 L66 54 C66 51 64 49 61.5 49 L61.5 43 C61.5 41.5 59.5 41 59 42.5 L58.5 48.5 C57.5 48 56 49 56 50.5 L56 53.5 C54 54.5 53.5 57 54.5 59 L54.5 62 Z" fill="none" stroke="white" strokeWidth="1.8" strokeLinejoin="round" strokeLinecap="round"/>
          </svg>
          {!sidebarCollapsed && (
            <div className="sidebar-logo-text">
              <div className="sidebar-logo-mark">{practiceName}</div>
              <div className="sidebar-logo-sub">Practice Dashboard</div>
            </div>
          )}
        </div>
        <nav className="sidebar-nav">
          {NAV.map(n => (
            <div key={n.id} className={`nav-item ${page===n.id?'active':''}`}
              title={sidebarCollapsed ? n.label : ''}
              onClick={()=>{ navigate(n.id); setSidebarOpen(false); }}>
              <span className="nav-icon material-symbols-outlined">{n.icon}</span>
              {!sidebarCollapsed && <span className="nav-label">{n.label}</span>}
              {!sidebarCollapsed && n.id === 'messages' && unreadMsgs > 0 && (
                <span className="nav-badge">{unreadMsgs > 99 ? '99+' : unreadMsgs}</span>
              )}
              {!sidebarCollapsed && n.id === 'reviews' && unreadReviews > 0 && (
                <span className="nav-badge">{unreadReviews > 99 ? '99+' : unreadReviews}</span>
              )}
            </div>
          ))}
        </nav>
        <button className="sidebar-collapse-btn" onClick={toggleCollapse} title={sidebarCollapsed ? 'Expand sidebar' : 'Collapse sidebar'}>
          <span className="material-symbols-outlined" style={{fontSize:18}}>
            {sidebarCollapsed ? 'chevron_right' : 'chevron_left'}
          </span>
        </button>
        <div className="sidebar-foot">
          <div className="user-chip" title={sidebarCollapsed ? (user?.email?.split('@')[0] || 'Staff') : ''}>
            <div className="user-avatar">{user?.email?.[0]?.toUpperCase() || 'S'}</div>
            {!sidebarCollapsed && (
              <div className="user-info">
                <div className="user-name">{user?.email?.split('@')[0] || 'Staff'}</div>
                <div className="user-role">Practice staff</div>
              </div>
            )}
            {!sidebarCollapsed && <button className="btn-logout" onClick={logout} title="Sign out">✕</button>}
          </div>
        </div>
      </aside>

      <div className="main" style={sidebarCollapsed ? {marginLeft:62} : {}}>
        <div className="topbar">
          <button className="hamburger-btn" onClick={()=>setSidebarOpen(o=>!o)} aria-label="Toggle menu">
            <span className="material-symbols-outlined" style={{fontSize:22}}>{sidebarOpen ? 'close' : 'menu'}</span>
          </button>
          <span className="topbar-title">{PAGE_TITLES[page]}</span>
          <div className="topbar-right">
            <span style={{color:'rgba(255,255,255,0.75)',fontSize:13,fontWeight:500,letterSpacing:'0.04em'}}>{practiceName}</span>
          </div>
        </div>
        <div className="page">
          {renderPage()}
        </div>
      </div>
    </div>
  );
}


/* ════════════════════════════════════════════════════════════
   ROOT
════════════════════════════════════════════════════════════ */
function App() {
  const [supabase,  setSupabase]  = useState(null);
  const [session,   setSession]   = useState(null);
  const [booting,   setBooting]   = useState(true);

  useEffect(() => {
    // Fetch public config from our API (keeps keys out of HTML source)
    fetch('/api/config')
      .then(r => r.json())
      .then(({ supabaseUrl, supabaseAnon }) => {
        const sb = window.supabase.createClient(supabaseUrl, supabaseAnon);
        setSupabase(sb);
        // Restore existing session if any
        sb.auth.getSession().then(({ data: { session: s } }) => {
          if (s) { setSession(s); setToken(s.access_token); }
          setBooting(false);
        });
        // Listen for auth state changes (token refresh etc.)
        sb.auth.onAuthStateChange((_event, s) => {
          setSession(s);
          setToken(s?.access_token || null);
        });
      })
      .catch(() => setBooting(false));
  }, []);

  if (booting) return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',width:'100vw',height:'100vh',color:'var(--muted)'}}>
      <div style={{textAlign:'center'}}>
        <div style={{fontFamily:'Plus Jakarta Sans,sans-serif',fontSize:28,fontWeight:700,color:'var(--sage)',marginBottom:8}}>Kliniq</div>
        <div style={{fontSize:12,color:'var(--muted)'}}>Loading dashboard…</div>
      </div>
    </div>
  );

  if (!supabase) return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',width:'100vw',height:'100vh'}}>
      <div className="alert alert-error">Could not connect to the server. Check your environment variables.</div>
    </div>
  );

  if (!session) return (
    <LoginPage supabase={supabase} onLogin={(s)=>setSession(s)} />
  );

  return (
    <Shell
      session={session}
      supabase={supabase}
      onLogout={() => setSession(null)}
    />
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
