function CreateAppointmentModal({ onClose, onDone, allowPastDates = false }) {
  // Services list — load ALL (including inactive) so veneers etc. always appear
  const [services,     setServices]     = useState([]);
  const [svcsLoading,  setSvcsLoading]  = useState(true);
  const [svcsErr,      setSvcsErr]      = useState(null);

  // Patient search / pick
  const [ptSearch,     setPtSearch]     = useState('');
  const [ptResults,    setPtResults]    = useState([]);
  const [ptSearching,  setPtSearching]  = useState(false);
  const [ptPick,       setPtPick]       = useState(null);
  const ptTimer = useRef(null);

  // Inline new-patient flow
  const [showAddPt,    setShowAddPt]    = useState(false);

  // Branches
  const [branches,  setBranches]  = useState([]);
  const [branchId,  setBranchId]  = useState('');
  useEffect(() => {
    api('/api/appointments?resource=branches')
      .then(d => {
        const brs = d.branches || [];
        setBranches(brs);
        if (brs.length === 1) setBranchId(brs[0].id); // auto-select if only one
      })
      .catch(() => {}); // silently ignore — branches are optional
  }, []);

  // Form fields
  const [serviceId,  setServiceId]  = useState('');
  const [date,       setDate]       = useState('');
  const [time,       setTime]       = useState('');
  const [status,     setStatus]     = useState('confirmed');
  const [iNotes,     setINotes]     = useState('');
  const [pNotes,     setPNotes]     = useState('');

  // Available time slots
  const [slots,        setSlots]        = useState([]);
  const [slotsLoading, setSlotsLoading] = useState(false);
  const [noSlots,      setNoSlots]      = useState(false);

  const [saving, setSaving] = useState(false);
  const [err,    setErr]    = useState('');

  // Load ALL services on mount (incl. inactive — so veneers/any service is always bookable by staff)
  useEffect(() => {
    api('/api/services?all=true')
      .then(d => { setServices(d.services || []); setSvcsLoading(false); })
      .catch(() => { setSvcsLoading(false); setSvcsErr('Could not load services — close and try again.'); });
  }, []);

  // Reload time slots whenever service or date changes
  // Past dates: skip slot fetching — use manual time picker instead
  const isPastDate = date && date < new Date().toISOString().slice(0,10);
  useEffect(() => {
    if (!serviceId || !date) { setSlots([]); setTime(''); setNoSlots(false); return; }
    if (isPastDate) { setSlots([]); setNoSlots(false); setSlotsLoading(false); return; }
    const svc = services.find(s => s.id === serviceId);
    const dur = svc?.duration_minutes || 30;
    setSlotsLoading(true); setSlots([]); setTime(''); setNoSlots(false);
    api(`/api/bookings?date=${date}&duration=${dur}`)
      .then(d => { const sl = d.slots || []; setSlots(sl); setNoSlots(sl.length === 0); setSlotsLoading(false); })
      .catch(() => { setSlotsLoading(false); setNoSlots(true); });
  }, [serviceId, date]);

  // Patient autocomplete
  const searchPt = q => {
    setPtSearch(q); clearTimeout(ptTimer.current);
    if (!q.trim()) { setPtResults([]); return; }
    ptTimer.current = setTimeout(async () => {
      setPtSearching(true);
      try { const d = await api(`/api/patients?q=${encodeURIComponent(q)}&limit=6`); setPtResults(d.patients || []); }
      catch { setPtResults([]); }
      finally { setPtSearching(false); }
    }, 350);
  };

  const submit = async e => {
    e.preventDefault();
    if (!ptPick)    { setErr('Please select a patient'); return; }
    if (!serviceId) { setErr('Please select a service'); return; }
    if (!date)      { setErr('Please choose a date'); return; }
    if (!time)      { setErr('Please select a time slot'); return; }
    setSaving(true); setErr('');
    try {
      await api('/api/appointments', {
        method: 'POST',
        body: JSON.stringify({
          patient_id:       ptPick.id,
          service_id:       serviceId,
          appointment_date: date,
          appointment_time: time,
          status,
          internal_notes:   iNotes || null,
          patient_notes:    pNotes || null,
          branch_id:        branchId || null,
        }),
      });
      showToast('Appointment booked');
      onDone();
    } catch(e) { setErr(e.message); setSaving(false); }
  };

  const selSvc = services.find(s => s.id === serviceId);
  const today  = new Date().toISOString().slice(0, 10);

  return (
    <>
    <div className="overlay" onClick={onClose}>
      <div className="modal" style={{maxWidth:500}} onClick={e => e.stopPropagation()}>
        <h3 className="modal-title">{allowPastDates ? 'Add historical appointment' : 'New appointment'}</h3>
        {allowPastDates && (
          <div className="alert alert-warning" style={{marginBottom:0,marginTop:8,fontSize:12}}>
            You are recording a past appointment. Select any date and enter the time manually.
          </div>
        )}

        <form onSubmit={submit} style={{display:'flex', flexDirection:'column', gap:16, marginTop:20}}>

          {/* ── Patient ── */}
          <div className="field">
            <label>Patient *</label>
            {ptPick ? (
              <div style={{display:'flex', alignItems:'center', gap:10,
                background:'var(--bg-3)', border:'1px solid var(--border)',
                borderRadius:8, padding:'9px 12px'}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:14, fontWeight:600, color:'var(--ink)'}}>
                    {ptPick.first_name} {ptPick.last_name}
                  </div>
                  <div style={{fontSize:12, color:'var(--muted)'}}>
                    {[ptPick.email, ptPick.phone].filter(Boolean).join(' · ')}
                  </div>
                </div>
                <button type="button" onClick={() => { setPtPick(null); setPtSearch(''); setPtResults([]); }}
                  style={{background:'none', border:'none', cursor:'pointer',
                    color:'var(--muted)', fontSize:20, lineHeight:1, padding:'0 4px'}}>
                  ×
                </button>
              </div>
            ) : (
              <div style={{position:'relative'}}>
                <input
                  value={ptSearch}
                  onChange={e => searchPt(e.target.value)}
                  placeholder="Search by name, email or phone…"
                  autoComplete="off"
                />
                {(ptSearching || ptResults.length > 0 || (ptSearch.trim() && !ptSearching)) && (
                  <div style={{position:'absolute', top:'calc(100% + 4px)', left:0, right:0, zIndex:50,
                    background:'var(--card)', border:'1px solid var(--border-2)',
                    borderRadius:8, overflow:'hidden',
                    boxShadow:'0 8px 24px rgba(10,31,38,0.12)'}}>
                    {ptSearching && (
                      <div style={{padding:'10px 14px', fontSize:12, color:'var(--muted)'}}>Searching…</div>
                    )}
                    {ptResults.map((p, i) => (
                      <div key={p.id} onClick={() => { setPtPick(p); setPtSearch(''); setPtResults([]); }}
                        style={{padding:'10px 14px', cursor:'pointer', fontSize:13,
                          borderTop: i > 0 ? '1px solid var(--border)' : 'none',
                          display:'flex', justifyContent:'space-between', alignItems:'center'}}
                        onMouseEnter={e => e.currentTarget.style.background = 'var(--bg-3)'}
                        onMouseLeave={e => e.currentTarget.style.background = ''}>
                        <span style={{fontWeight:500, color:'var(--ink)'}}>{p.first_name} {p.last_name}</span>
                        <span style={{fontSize:11, color:'var(--muted)'}}>{p.phone || p.email}</span>
                      </div>
                    ))}
                    {!ptSearching && ptSearch.trim() && ptResults.length === 0 && (
                      <div style={{padding:'10px 14px', display:'flex', alignItems:'center', justifyContent:'space-between', gap:10}}>
                        <span style={{fontSize:12, color:'var(--muted)'}}>No patients found</span>
                        <button type="button" className="btn btn-primary btn-sm"
                          style={{fontSize:11, padding:'5px 12px', whiteSpace:'nowrap', flexShrink:0}}
                          onClick={() => setShowAddPt(true)}>
                          + Add new patient
                        </button>
                      </div>
                    )}
                  </div>
                )}
              </div>
            )}
          </div>

          {/* ── Service ── */}
          <div className="field">
            <label>Service *</label>
            {svcsErr && <div className="alert alert-error" style={{marginBottom:6,marginTop:-2}}>{svcsErr}</div>}
            <select value={serviceId} onChange={e => setServiceId(e.target.value)} disabled={svcsLoading || !!svcsErr}>
              <option value="">{svcsLoading ? 'Loading…' : svcsErr ? 'Unavailable' : 'Select a service…'}</option>
              {services.map(s => (
                <option key={s.id} value={s.id}>
                  {s.name}{s.price_from ? ` — from R ${s.price_from}` : ''}
                </option>
              ))}
            </select>
            {selSvc && (
              <div style={{fontSize:11, color:'var(--muted)', marginTop:2}}>
                {selSvc.duration_minutes} min · {selSvc.category}
              </div>
            )}
          </div>

          {/* ── Date + Status ── */}
          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:12}}>
            <div className="field">
              <label>Date *</label>
              <ApptDatePicker value={date} onChange={v => setDate(v)} placeholder="Choose a date"
                disablePast={!allowPastDates} />
            </div>
            <div className="field">
              <label>Status</label>
              <select value={status} onChange={e => setStatus(e.target.value)}>
                <option value="confirmed">Confirmed</option>
                <option value="pending">Awaiting confirmation</option>
                <option value="completed">Completed</option>
                <option value="cancelled">Cancelled</option>
                <option value="no_show">Did not arrive</option>
              </select>
            </div>
          </div>

          {/* ── Time: manual picker for past dates, live slots for future ── */}
          {serviceId && date && (
            <div className="field">
              <label>Time *</label>
              {isPastDate ? (
                <ApptTimePicker value={time} onChange={setTime} placeholder="Select appointment time" />
              ) : slotsLoading ? (
                <div style={{fontSize:12, color:'var(--muted)', padding:'4px 0'}}>Checking availability…</div>
              ) : noSlots ? (
                <div style={{fontSize:12, color:'var(--amber)', padding:'4px 0'}}>
                  No available slots for this date — try another day.
                </div>
              ) : (
                <div style={{display:'flex', flexWrap:'wrap', gap:6, marginTop:2}}>
                  {slots.map(sl => {
                    const sel = time === sl;
                    return (
                      <button key={sl} type="button"
                        onClick={() => setTime(sl)}
                        style={{
                          padding:'7px 12px', border:'none', borderRadius:8, fontSize:12,
                          background: sel ? 'var(--sage)' : 'var(--bg-3)',
                          color: sel ? '#fff' : 'var(--ink)',
                          cursor:'pointer', fontWeight: sel ? 700 : 400,
                          fontVariantNumeric:'tabular-nums', fontFamily:'monospace',
                          transition:'background 0.12s, color 0.12s',
                        }}>
                        {sl}
                      </button>
                    );
                  })}
                </div>
              )}
            </div>
          )}

          {/* ── Branch (only show if practice has multiple branches) ── */}
          {branches.length > 1 && (
            <div className="field">
              <label>Branch</label>
              <select value={branchId} onChange={e => setBranchId(e.target.value)}>
                <option value="">Select branch…</option>
                {branches.map(b => <option key={b.id} value={b.id}>{b.name}</option>)}
              </select>
            </div>
          )}

          {/* ── Notes ── */}
          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:12}}>
            <div className="field">
              <label>Patient notes</label>
              <input value={pNotes} onChange={e => setPNotes(e.target.value)}
                placeholder="Pre-appointment info…" maxLength={500} />
            </div>
            <div className="field">
              <label>Internal notes</label>
              <input value={iNotes} onChange={e => setINotes(e.target.value)}
                placeholder="Staff only…" maxLength={500} />
            </div>
          </div>

          {err && <div className="alert alert-error">{err}</div>}

          <div className="modal-foot" style={{marginTop:0}}>
            <button type="button" className="btn btn-ghost btn-sm" onClick={onClose}>Cancel</button>
            <button type="submit" className="btn btn-primary btn-sm" disabled={saving}>
              {saving ? 'Creating…' : 'Create appointment'}
            </button>
          </div>
        </form>
      </div>
    </div>

    {/* Inline add-patient flow — stacked on top */}
    {showAddPt && (
      <AddPatientModal
        onClose={() => setShowAddPt(false)}
        onDone={newPt => {
          setShowAddPt(false);
          if (newPt) {
            setPtPick(newPt);
            setPtSearch('');
            setPtResults([]);
          }
        }}
      />
    )}
    </>
  );
}

function Appointments({ onNavigate }) {
  const [appts,        setAppts]       = useState([]);
  const [loading,      setLoading]     = useState(true);
  const [err,          setErr]         = useState(null);
  const [dateFilter,   setDateFilter]  = useState('');
  const [statusFilter, setStatusFilter]= useState('');
  const [selected,     setSelected]    = useState(null);
  const [patching,     setPatching]    = useState(false);
  const [showCreate,   setShowCreate]  = useState(false);
  const [showHistory,  setShowHistory] = useState(false);
  // Pagination
  const [page,  setPage]  = useState(1);
  const [total, setTotal] = useState(0);
  const [pages, setPages] = useState(1);
  const LIMIT = 20;
  // Reschedule
  const [editMode,    setEditMode]    = useState(false);
  const [editForm,    setEditForm]    = useState({});
  const [editSaving,  setEditSaving]  = useState(false);
  const [editErr,     setEditErr]     = useState('');
  const [svcList,     setSvcList]     = useState([]);
  // Structured clinical codes (tariff + ICD-10 pickers)
  const [tariffLines,  setTariffLines]  = useState([]);
  const [icd10Items,   setIcd10Items]   = useState([]);
  const [claimLoading, setClaimLoading] = useState(false);
  // MA claim + pre-auth state for the currently selected appointment
  // NOTE: apptClaim / apptPreAuth states removed — MA claims UI simplified to
  // plain payment recording. Backend claims/pre_auths API + schema preserved for
  // future Healthbridge integration (see ClaimsPage + migrations/024_claims_module.sql).

  // Unlinked returning-patient appointments
  const [unlinked,        setUnlinked]       = useState([]);
  const [unlinkedLoading, setUnlinkedLoading]= useState(true);

  const loadUnlinked = useCallback(() => {
    setUnlinkedLoading(true);
    api('/api/appointments?needs_link=true')
      .then(d => { setUnlinked(d.appointments || []); setUnlinkedLoading(false); })
      .catch(() => setUnlinkedLoading(false));
  }, []);

  useEffect(() => { loadUnlinked(); }, [loadUnlinked]);

  // Patient-linking state
  const [linkSearch,    setLinkSearch]    = useState('');
  const [linkResults,   setLinkResults]   = useState([]);
  const [linkSearching, setLinkSearching] = useState(false);
  const [linkPick,      setLinkPick]      = useState(null);
  const [linking,       setLinking]       = useState(false);
  const linkTimer = useRef(null);

  const resetLink = () => { setLinkSearch(''); setLinkResults([]); setLinkPick(null); };

  const searchPatients = (q) => {
    setLinkSearch(q); setLinkPick(null);
    clearTimeout(linkTimer.current);
    if (!q.trim()) { setLinkResults([]); return; }
    linkTimer.current = setTimeout(async () => {
      setLinkSearching(true);
      try {
        const d = await api(`/api/patients?q=${encodeURIComponent(q)}&limit=6`);
        setLinkResults(d.patients || []);
      } catch { setLinkResults([]); }
      finally { setLinkSearching(false); }
    }, 350);
  };

  const confirmLink = async () => {
    if (!linkPick || !selected) return;
    setLinking(true);
    try {
      await api(`/api/appointments?id=${selected.id}`, {
        method: 'PATCH',
        body: JSON.stringify({ patient_id: linkPick.id, needs_patient_link: false }),
      });
      const updated = { ...selected, needs_patient_link: false, patients: linkPick };
      setSelected(updated);
      setUnlinked(prev => prev.filter(a => a.id !== selected.id));
      setAppts(prev => prev.map(a => a.id === selected.id ? { ...a, needs_patient_link: false, patients: linkPick } : a));
      resetLink();
      showToast(`Booking linked to ${linkPick.first_name} ${linkPick.last_name}`);
    } catch(e) { showToast(e.message, 'error'); }
    finally { setLinking(false); }
  };

  const [deletingAppt, setDeletingAppt] = useState(null);
  const deleteUnlinked = async (appt) => {
    const name = [appt.patients?.first_name, appt.patients?.last_name].filter(Boolean).join(' ') || 'this booking';
    if (!window.confirm(`Delete the unlinked booking for "${name}"?\n\nThis removes bad data entered online — it cannot be undone.`)) return;
    setDeletingAppt(appt.id);
    try {
      await api(`/api/appointments?id=${appt.id}`, { method: 'DELETE' });
      setUnlinked(prev => prev.filter(a => a.id !== appt.id));
      if (selected?.id === appt.id) { setSelected(null); resetLink(); }
      showToast('Booking deleted');
    } catch(e) { showToast(e.message, 'error'); }
    finally { setDeletingAppt(null); }
  };

  const load = useCallback((pg) => {
    setLoading(true);
    const params = [`page=${pg}`, `limit=${LIMIT}`];
    if (dateFilter)   params.push(`date=${dateFilter}`);
    if (statusFilter) params.push(`status=${statusFilter}`);
    api('/api/appointments?' + params.join('&'))
      .then(d => {
        setAppts(d.appointments || []);
        setTotal(d.total || 0);
        setPages(d.pages || 1);
        setLoading(false);
      })
      .catch(e => { setErr(e.message); setLoading(false); });
  }, [dateFilter, statusFilter]);

  // When filters change, jump back to page 1 and fetch
  useEffect(() => { setPage(1); load(1); }, [dateFilter, statusFilter]); // eslint-disable-line react-hooks/exhaustive-deps
  // When the page number changes (pagination), fetch that page
  useEffect(() => { load(page); }, [load, page]); // eslint-disable-line react-hooks/exhaustive-deps

  const [cancelReason, setCancelReason] = useState('');
  const [cancelPending, setCancelPending] = useState(false);
  const [completePending, setCompletePending] = useState(false);
  const [allowCompletedEdit, setAllowCompletedEdit] = useState(false);

  const updateStatus = async (id, status, reason) => {
    setPatching(true);
    try {
      const body = { status };
      if (status === 'cancelled') body.cancellation_reason = reason || null;
      await api(`/api/appointments?id=${id}`, { method:'PATCH', body: JSON.stringify(body) });
      setAppts(prev => prev.map(a => a.id === id ? {...a, status, cancellation_reason: body.cancellation_reason} : a));
      if (selected?.id === id) setSelected(s => ({...s, status, cancellation_reason: body.cancellation_reason}));
      setCancelPending(false); setCancelReason('');
      showToast(`Status updated to "${STATUS_LABELS[status] || status}"`);
    } catch(e) { showToast(e.message, 'error'); }
    finally { setPatching(false); }
  };

  // Open edit / reschedule mode
  const openEdit = async () => {
    if (!svcList.length) {
      try { const d = await api('/api/services?all=true'); setSvcList(d.services || []); }
      catch {}
    }
    setEditForm({
      appointment_date: selected.appointment_date || '',
      appointment_time: selected.appointment_time?.slice(0,5) || '',
      service_id:       selected.services?.id || '',
      duration_minutes: selected.duration_minutes || 30,
      internal_notes:   selected.internal_notes || '',
      clinical_notes:   selected.clinical_notes  || '',
    });
    setTariffLines(normTariffLines(selected.tariff_codes));
    setIcd10Items(normIcd10Items(selected.icd10_codes));
    setEditErr('');
    setEditMode(true);
  };

  const saveEdit = async () => {
    setEditSaving(true); setEditErr('');
    const payload = {
      ...editForm,
      icd10_codes:  icd10Items,
      tariff_codes: tariffLines,
    };
    try {
      await api(`/api/appointments?id=${selected.id}`, {
        method: 'PATCH',
        body: JSON.stringify(payload),
      });
      // Reflect changes in state
      const svcObj = svcList.find(s => s.id === editForm.service_id) || selected.services;
      const updated = {
        ...selected,
        appointment_date: editForm.appointment_date,
        appointment_time: editForm.appointment_time + ':00',
        duration_minutes: Number(editForm.duration_minutes),
        internal_notes:   editForm.internal_notes,
        clinical_notes:   editForm.clinical_notes,
        icd10_codes:      icd10Items,
        tariff_codes:     tariffLines,
        services: svcObj ? { ...selected.services, ...svcObj } : selected.services,
      };
      setSelected(updated);
      setAppts(prev => prev.map(a => a.id === selected.id ? { ...a, ...updated } : a));
      setEditMode(false);
      showToast('Appointment updated');
    } catch(e) {
      const raw = e.message || '';
      // Map technical API errors to plain English
      const friendly =
        raw.includes('409') || raw.toLowerCase().includes('conflict') || raw.toLowerCase().includes('overlap')
          ? 'That time slot is already booked. Please choose a different time.'
        : raw.includes('400') || raw.toLowerCase().includes('invalid')
          ? 'Some details are invalid — please check the date, time and service, then try again.'
        : raw.includes('403') || raw.toLowerCase().includes('unauthori')
          ? 'You don\'t have permission to edit this appointment.'
        : raw.includes('404')
          ? 'This appointment could not be found. It may have been deleted.'
        : raw.includes('500') || raw.toLowerCase().includes('server')
          ? 'Something went wrong on our end. Please try again in a moment.'
        : raw || 'Could not save the change. Please try again.';
      setEditErr(friendly);
    }
    finally { setEditSaving(false); }
  };

  const closeModal = () => { setSelected(null); resetLink(); setEditMode(false); setEditErr(''); setCancelPending(false); setCancelReason(''); setCompletePending(false); setAllowCompletedEdit(false); setTariffLines([]); setIcd10Items([]); };

  // (Claim/pre-auth async load removed — MA simplified to plain payment recording.
  //  Backend API + schema preserved for future Healthbridge integration.)

  return (
    <div>
      <div style={{marginBottom:24, display:'flex', justifyContent:'space-between', alignItems:'flex-end'}}>
        <div>
          <div className="eyebrow">Management</div>
          <h2 style={{fontFamily:'Plus Jakarta Sans,sans-serif', fontSize:30, marginTop:4}}>Appointments</h2>
        </div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-ghost btn-sm" onClick={() => setShowHistory(true)}
            title="Record a past appointment for an existing patient">
            <span className="material-symbols-outlined" style={{fontSize:14}}>history</span> Historical
          </button>
          <button className="btn btn-primary btn-sm" onClick={() => setShowCreate(true)}>
            + New appointment
          </button>
        </div>
      </div>

      {/* ── Needs-linking section ── */}
      {(unlinkedLoading || unlinked.length > 0) && (
        <div style={{marginBottom:32}}>
          <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:12}}>
            <div style={{fontSize:11, fontWeight:600, letterSpacing:'0.12em', textTransform:'uppercase', color:'#92400e'}}>
              Online bookings — needs to be matched to a patient record
            </div>
            {!unlinkedLoading && (
              <span style={{fontSize:11, background:'#fef3c7', border:'1px solid #fcd34d', color:'#92400e', borderRadius:10, padding:'1px 8px', fontWeight:600}}>
                {unlinked.length}
              </span>
            )}
          </div>
          <div className="card" style={{padding:0, overflow:'hidden', border:'1px solid #fcd34d'}}>
            <div className="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Date</th><th>Time</th><th>Name on booking</th>
                    <th>Phone</th><th>Service</th><th>Status</th><th></th>
                  </tr>
                </thead>
                <tbody>
                  {unlinkedLoading ? <SkeletonRows n={2} /> : unlinked.map(a => (
                    <tr key={a.id} style={{cursor:'pointer'}} onClick={() => setSelected(a)}>
                      <td className="td-main">{fmtDateShort(a.appointment_date)}</td>
                      <td className="mono">{a.appointment_time?.slice(0,5)}</td>
                      <td className="td-main">{a.patients?.first_name} {a.patients?.last_name}</td>
                      <td className="mono">{a.patients?.phone || '—'}</td>
                      <td>{a.services?.name}</td>
                      <td><StatusBadge status={a.status} /></td>
                      <td>
                        <div style={{display:'flex',gap:6}}>
                          <button className="btn btn-sm" style={{background:'#fef3c7', border:'1px solid #fcd34d', color:'#92400e'}}
                            onClick={e => { e.stopPropagation(); setSelected(a); }}>
                            Open &amp; link
                          </button>
                          <button className="btn btn-sm btn-danger"
                            disabled={deletingAppt === a.id}
                            onClick={e => { e.stopPropagation(); deleteUnlinked(a); }}>
                            {deletingAppt === a.id ? '…' : 'Delete'}
                          </button>
                        </div>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      )}

      <div className="search-bar">
        <input type="date" value={dateFilter} onChange={e => setDateFilter(e.target.value)} style={{maxWidth:180}} />
        <select value={statusFilter} onChange={e => setStatusFilter(e.target.value)}>
          <option value="">All statuses</option>
          <option value="pending">Awaiting confirmation</option>
          <option value="confirmed">Confirmed</option>
          <option value="completed">Completed</option>
          <option value="cancelled">Cancelled</option>
          <option value="no_show">Did not arrive</option>
        </select>
        <button className="btn btn-ghost btn-sm" onClick={() => { setDateFilter(''); setStatusFilter(''); }}>Clear</button>
        {total > 0 && <span className="mono" style={{color:'var(--muted)',marginLeft:'auto'}}>{total} appointment{total!==1?'s':''}</span>}
      </div>

      {err && <div className="alert alert-error">{err}</div>}

      <div className="card" style={{padding:0, overflow:'hidden'}}>
        <div className="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Date</th><th>Time</th><th>Patient</th>
                <th>Service</th><th>Duration</th><th>Status</th><th></th>
              </tr>
            </thead>
            <tbody>
              {loading ? <SkeletonRows n={6} /> : appts.length === 0 ? (
                <tr><td colSpan="7">
                  <div className="empty"><div className="empty-icon">📅</div>
                    <div style={{marginBottom:8}}>No appointments found.</div>
                    <div style={{fontSize:12,color:'var(--muted)'}}>Try clearing the filters, or use the "New appointment" button above to book one.</div>
                  </div>
                </td></tr>
              ) : appts.map(a => (
                <tr key={a.id} style={{cursor:'pointer'}} onClick={() => setSelected(a)}>
                  <td className="td-main">{fmtDateShort(a.appointment_date)}</td>
                  <td className="mono">{a.appointment_time?.slice(0,5)}</td>
                  <td className="td-main">
                    {a.patients?.first_name} {a.patients?.last_name}
                    {a.needs_patient_link && (
                      <span style={{marginLeft:6,fontSize:10,fontWeight:600,letterSpacing:'0.08em',textTransform:'uppercase',color:'#b45309',background:'#fef3c7',border:'1px solid #fcd34d',borderRadius:4,padding:'1px 5px',verticalAlign:'middle'}}>
                        Needs linking
                      </span>
                    )}
                  </td>
                  <td>{a.services?.name || <span style={{color:'var(--muted)'}}>—</span>}</td>
                  <td className="mono">{a.duration_minutes ? `${a.duration_minutes} min` : '—'}</td>
                  <td><StatusBadge status={a.status} /></td>
                  <td>
                    <button className="btn btn-ghost btn-sm" onClick={e => { e.stopPropagation(); setSelected(a); }}>View</button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {/* ── Pagination controls ── */}
      {!loading && pages > 1 && (
        <div style={{display:'flex', alignItems:'center', justifyContent:'center', gap:8, marginTop:20}}>
          <button className="btn btn-ghost btn-sm" onClick={() => setPage(1)} disabled={page===1}>«</button>
          <button className="btn btn-ghost btn-sm" onClick={() => setPage(p=>Math.max(1,p-1))} disabled={page===1}>‹ Prev</button>
          <span className="mono" style={{padding:'0 8px', color:'var(--muted)', fontSize:12}}>
            Page {page} of {pages}
          </span>
          <button className="btn btn-ghost btn-sm" onClick={() => setPage(p=>Math.min(pages,p+1))} disabled={page===pages}>Next ›</button>
          <button className="btn btn-ghost btn-sm" onClick={() => setPage(pages)} disabled={page===pages}>»</button>
        </div>
      )}

      {showCreate && (
        <CreateAppointmentModal
          onClose={() => setShowCreate(false)}
          onDone={() => { setShowCreate(false); load(1); setPage(1); loadUnlinked(); }}
        />
      )}

      {showHistory && (
        <CreateAppointmentModal
          allowPastDates={true}
          onClose={() => setShowHistory(false)}
          onDone={() => { setShowHistory(false); load(1); setPage(1); }}
        />
      )}

      {/* ── Appointment detail / edit modal ── */}
      {selected && (
        <div className="overlay" onClick={() => { if (!editMode) closeModal(); }}>
          <div className="modal" style={{maxWidth:580}} onClick={e => e.stopPropagation()}>
            {!editMode ? (
              <>
                <div style={{display:'flex', alignItems:'flex-start', justifyContent:'space-between', marginBottom:4}}>
                  <h3 className="modal-title" style={{margin:0}}>
                    {selected.patients ? (
                      <button
                        style={{background:'none',border:'none',padding:0,cursor:'pointer',fontFamily:'inherit',fontSize:'inherit',fontWeight:'inherit',color:'var(--ink)',textDecoration:'none',display:'inline-flex',alignItems:'center',gap:6}}
                        title="View patient record"
                        onClick={() => { closeModal(); onNavigate?.({ page:'patients', payload:{ patient: selected.patients } }); }}
                      >
                        {selected.patients.first_name} {selected.patients.last_name}
                        <span className="material-symbols-outlined" style={{fontSize:16,color:'var(--sage)',opacity:.7}}>open_in_new</span>
                      </button>
                    ) : <span>Unknown patient</span>}
                  </h3>
                  <button className="btn btn-ghost btn-sm" onClick={openEdit} style={{marginTop:2}}
                    disabled={selected?.status === 'completed' && !allowCompletedEdit}
                    title={selected?.status === 'completed' && !allowCompletedEdit ? 'Use "Modify completed appointment" below to edit' : undefined}>
                    <span className="material-symbols-outlined" style={{fontSize:15}}>edit</span> Edit
                  </button>
                </div>
                <p className="modal-sub">
                  {selected.services?.name || 'No service recorded'} · {fmtDateShort(selected.appointment_date)} at {selected.appointment_time?.slice(0,5)}
                  {selected.branches?.name && <span> · <span className="material-symbols-outlined" style={{fontSize:12,verticalAlign:'middle'}}>location_on</span> {selected.branches.name}</span>}
                </p>
                <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:12, marginBottom:20}}>
                  {[
                    ['Status',   <StatusBadge status={selected.status} />],
                    ['Duration', `${selected.duration_minutes} min`],
                    ['Email',    selected.patients?.email || '—'],
                    ['Phone',    selected.patients?.phone || '—'],
                  ].map(([l,v]) => (
                    <div key={l}>
                      <div style={{fontSize:10,letterSpacing:'0.12em',textTransform:'uppercase',color:'var(--muted)',marginBottom:4}}>{l}</div>
                      <div style={{fontSize:13,color:'var(--ink)'}}>{v}</div>
                    </div>
                  ))}
                </div>
                {selected.internal_notes && (
                  <div style={{background:'var(--bg-3)',borderRadius:8,padding:'12px 14px',marginBottom:16,fontSize:13,color:'var(--ink-soft)'}}>
                    <div style={{fontSize:10,letterSpacing:'0.12em',textTransform:'uppercase',color:'var(--muted)',marginBottom:6}}>Internal notes</div>
                    {selected.internal_notes}
                  </div>
                )}
                {selected.patient_notes && (
                  <div style={{background:'var(--bg-3)',borderRadius:8,padding:'12px 14px',marginBottom:16,fontSize:13,color:'var(--ink-soft)'}}>
                    <div style={{fontSize:10,letterSpacing:'0.12em',textTransform:'uppercase',color:'var(--muted)',marginBottom:6}}>Patient notes</div>
                    {selected.patient_notes}
                  </div>
                )}
                {/* ── Medical Aid indicator (MA patients only) ── */}
                {selected.patients?.has_medical_aid && (
                  <div style={{marginBottom:16,display:'flex',alignItems:'center',gap:10,padding:'10px 14px',background:'rgba(10,74,92,0.04)',border:'1px solid var(--border)',borderRadius:10,flexWrap:'wrap'}}>
                    <span className="material-symbols-outlined" style={{fontSize:16,color:'var(--sage)'}}>health_and_safety</span>
                    <span style={{fontSize:12,color:'var(--ink-soft)'}}>
                      Medical aid
                      {selected.patients.medical_aid_name && <strong style={{color:'var(--ink)'}}> · {selected.patients.medical_aid_name}</strong>}
                      {selected.patients.medical_aid_number && <span style={{color:'var(--muted)'}}> · {selected.patients.medical_aid_number}</span>}
                    </span>
                    {selected.amount_paid > 0 && selected.payment_method === 'medical_aid' && (
                      <span style={{marginLeft:'auto',fontSize:12,fontWeight:600,color:'var(--green)',background:'rgba(22,163,74,0.08)',padding:'2px 10px',borderRadius:99}}>
                        R {Number(selected.amount_paid).toFixed(2)} received
                      </span>
                    )}
                  </div>
                )}
                {/* Clinical notes — shown for all patients */}
                {selected.clinical_notes && (
                  <div style={{background:'var(--bg-3)',borderRadius:8,padding:'12px 14px',marginBottom:16,fontSize:13,color:'var(--ink-soft)',lineHeight:1.6}}>
                    <div style={{fontSize:10,letterSpacing:'0.12em',textTransform:'uppercase',color:'var(--muted)',marginBottom:6}}>Clinical Notes</div>
                    {selected.clinical_notes}
                  </div>
                )}
                {selected.needs_patient_link && (
                  <div style={{marginBottom:16,border:'1px solid #fcd34d',borderRadius:8,overflow:'hidden'}}>
                    <div style={{background:'#fef3c7',padding:'10px 14px'}}>
                      <span style={{fontSize:12,fontWeight:600,color:'#92400e',letterSpacing:'0.06em',textTransform:'uppercase'}}>Returning patient — needs linking</span>
                    </div>
                    <div style={{padding:'12px 14px',background:'var(--card)'}}>
                      <p style={{fontSize:13,color:'var(--ink-soft)',margin:'0 0 10px',lineHeight:1.5}}>
                        Call the patient to verify their identity, then search for their existing record below and confirm.
                      </p>
                      <input type="search" placeholder="Search by name or email…" value={linkSearch}
                        onChange={e => searchPatients(e.target.value)} style={{width:'100%',marginBottom:8}} />
                      {linkSearching && <div style={{fontSize:12,color:'var(--muted)',padding:'4px 0'}}>Searching…</div>}
                      {linkResults.length > 0 && (
                        <div style={{border:'1px solid var(--bg-3)',borderRadius:6,overflow:'hidden',marginBottom:8}}>
                          {linkResults.map((p, i) => (
                            <div key={p.id} onClick={() => setLinkPick(p)}
                              style={{padding:'8px 12px',cursor:'pointer',fontSize:13,borderTop:i>0?'1px solid var(--bg-3)':'none',
                                background:linkPick?.id===p.id?'color-mix(in oklab, var(--sage) 12%, var(--card))':'var(--card)',
                                display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                              <span style={{fontWeight:linkPick?.id===p.id?600:400,color:'var(--ink)'}}>{p.first_name} {p.last_name}</span>
                              <span style={{fontSize:12,color:'var(--muted)'}}>{p.email}</span>
                            </div>
                          ))}
                        </div>
                      )}
                      {linkSearch.trim() && !linkSearching && linkResults.length===0 && (
                        <div style={{fontSize:12,color:'var(--muted)',padding:'4px 0',marginBottom:8}}>No matching patients found.</div>
                      )}
                      {linkPick && (
                        <div style={{display:'flex',alignItems:'center',gap:8,marginTop:4}}>
                          <span style={{fontSize:13,color:'var(--ink)',flex:1}}>Link to: <strong>{linkPick.first_name} {linkPick.last_name}</strong></span>
                          <button className="btn btn-ghost btn-sm" onClick={resetLink} disabled={linking}>Cancel</button>
                          <button className="btn btn-sm" style={{background:'var(--sage)',color:'#fff',border:'none'}} onClick={confirmLink} disabled={linking}>
                            {linking ? 'Linking…' : 'Confirm link'}
                          </button>
                        </div>
                      )}
                    </div>
                  </div>
                )}
                {/* Cancellation reason — show when cancelled */}
                {selected.status === 'cancelled' && (
                  <div style={{marginBottom:16,padding:'10px 14px',background:'rgba(220,38,38,0.05)',border:'1px solid rgba(220,38,38,0.18)',borderRadius:8}}>
                    <div style={{fontSize:10,letterSpacing:'0.12em',textTransform:'uppercase',color:'var(--danger)',marginBottom:4}}>Cancellation reason</div>
                    <div style={{fontSize:13,color:'var(--ink-soft)'}}>{selected.cancellation_reason || <span style={{color:'var(--muted)'}}>No reason recorded</span>}</div>
                    {selected.cancelled_at && <div style={{fontSize:11,color:'var(--muted)',marginTop:4}}>Cancelled {new Date(selected.cancelled_at).toLocaleString('en-ZA',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})}</div>}
                  </div>
                )}
                <div style={{marginBottom:6,fontSize:11,letterSpacing:'0.12em',textTransform:'uppercase',color:'var(--muted)'}}>Update status</div>
                {(STATUS_TRANSITIONS[selected.status]?.length === 0) ? (
                  <div>
                    <div style={{fontSize:13,color:'var(--muted)',padding:'6px 0',marginBottom:selected.status==='completed'?10:0}}>
                      <span className="material-symbols-outlined" style={{fontSize:15,verticalAlign:'middle',marginRight:6}}>lock</span>
                      This appointment is <strong>{STATUS_LABELS[selected.status]}</strong> and cannot be changed.
                    </div>
                    {selected.status === 'completed' && !allowCompletedEdit && (
                      <button className="btn btn-ghost btn-sm"
                        style={{fontSize:12,display:'inline-flex',alignItems:'center',gap:5}}
                        onClick={() => { setAllowCompletedEdit(true); openEdit(); }}>
                        <span className="material-symbols-outlined" style={{fontSize:14}}>edit_note</span>
                        Modify completed appointment
                      </button>
                    )}
                  </div>
                ) : (
                  <>
                    <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
                      {(STATUS_TRANSITIONS[selected.status]||[]).map(s => (
                        <button key={s}
                          className="btn btn-ghost btn-sm"
                          style={s==='cancelled'?{borderColor:'var(--danger)',color:'var(--danger)'}:{}}
                          onClick={() => {
                            if (s==='cancelled') { setCompletePending(false); setCancelPending(true); }
                            else if (s==='completed') { setCancelPending(false); setCompletePending(true); }
                            else { updateStatus(selected.id, s); }
                          }}
                          disabled={patching}>
                          {STATUS_LABELS[s] || s}
                        </button>
                      ))}
                    </div>
                    {completePending && (
                      <div style={{marginTop:12,padding:12,background:'rgba(22,163,74,0.06)',border:'1px solid rgba(22,163,74,0.25)',borderRadius:10}}>
                        <div style={{fontSize:13,fontWeight:600,color:'var(--green)',marginBottom:6}}>Mark as completed?</div>
                        <div style={{fontSize:12,color:'var(--ink-soft)',marginBottom:10,lineHeight:1.5}}>
                          This will mark the appointment as completed. You can still edit it afterwards using the "Modify completed appointment" option.
                        </div>
                        <div style={{display:'flex',gap:8}}>
                          <button className="btn btn-sm" style={{background:'var(--green)',color:'#fff',border:'none'}}
                            onClick={() => { setCompletePending(false); updateStatus(selected.id,'completed'); }} disabled={patching}>
                            {patching?'…':'Yes, mark completed'}
                          </button>
                          <button className="btn btn-ghost btn-sm" onClick={() => setCompletePending(false)}>Back</button>
                        </div>
                      </div>
                    )}
                    {cancelPending && (
                      <div style={{marginTop:12,padding:12,background:'rgba(220,38,38,0.06)',border:'1px solid rgba(220,38,38,0.2)',borderRadius:10}}>
                        <div style={{fontSize:12,color:'var(--danger)',fontWeight:600,marginBottom:8}}>Cancellation reason (optional)</div>
                        <input value={cancelReason} onChange={e=>setCancelReason(e.target.value)}
                          placeholder="e.g. Patient request, double-booked, illness…"
                          style={{width:'100%',marginBottom:10}} autoFocus />
                        <div style={{display:'flex',gap:8}}>
                          <button className="btn btn-sm" style={{background:'var(--danger)',color:'#fff',border:'none'}}
                            onClick={() => updateStatus(selected.id,'cancelled',cancelReason)} disabled={patching}>
                            {patching?'…':'Confirm cancel'}
                          </button>

                  <div className="field">
                    <label>Clinical notes</label>
                    <textarea rows={2} value={editForm.clinical_notes}
                      onChange={e => setEditForm(f => ({...f, clinical_notes: e.target.value}))}

                  </div>
                </div>
                {editErr && <div className="alert alert-error" style={{marginBottom:12}}>{editErr}</div>}
                <div className="modal-foot">
                  <button className="btn btn-ghost btn-sm" onClick={() => setEditMode(false)} disabled={editSaving}>Cancel</button>
                  <button className="btn btn-primary btn-sm" onClick={saveEdit} disabled={editSaving}>
                    {editSaving ? 'Saving…' : 'Save changes'}
                  </button>
                </div>
              </>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

/* ── Consent Documents upload component ─────────────────────── */
function ConsentDocs({ patient, onUpdate }) {
  const [uploading, setUploading] = useState(false);
  const [uploadErr, setUploadErr] = useState('');
  const fileRef = useRef(null);
  const docs = Array.isArray(patient?.consent_docs) ? patient.consent_docs : [];

  const DOC_TYPES = ['Consent form', 'POPIA form', 'Medical aid form', 'X-ray', 'Other'];

  const pickFile = () => { setUploadErr(''); fileRef.current?.click(); };

  const handleFile = async e => {
    const file = e.target.files?.[0];
    if (!file) return;
    e.target.value = '';  // allow re-picking same file

    const ALLOWED = ['application/pdf','image/jpeg','image/png','image/webp'];
    if (!ALLOWED.includes(file.type)) {
      setUploadErr('Only PDF, JPEG, PNG or WebP files are allowed.'); return;
    }
    if (file.size > 5 * 1024 * 1024) {
      setUploadErr('File is too large — maximum 5 MB.'); return;
    }

    setUploading(true); setUploadErr('');
    try {
      const base64 = await new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = () => res(r.result.split(',')[1]);
        r.onerror = rej;
        r.readAsDataURL(file);
      });
      await api('/api/patients?upload_doc=1', {
        method: 'POST',
        body: JSON.stringify({
          patient_id:  patient.id,
          file_name:   file.name,
          file_type:   file.type,
          file_base64: base64,
          doc_type:    'Consent form',
        }),
      });
      showToast(`"${file.name}" uploaded`);
      onUpdate?.();
    } catch (err) {
      setUploadErr(err.message || 'Upload failed. Please try again.');
    } finally { setUploading(false); }
  };

  const removeDoc = async (docId) => {
    if (!window.confirm('Remove this document? This cannot be undone.')) return;
    const updated = docs.filter(d => d.id !== docId);
    try {
      await api(`/api/patients?id=${patient.id}`, {
        method: 'PATCH',
        body: JSON.stringify({ consent_docs: updated }),
      });
      showToast('Document removed');
      onUpdate?.();
    } catch { showToast('Could not remove document', 'error'); }
  };

  return (
    <div className="pt-section" style={{borderTop:'1px solid var(--border)',paddingTop:20,marginTop:20}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <div className="pt-section-title" style={{marginBottom:0}}>
          <span className="material-symbols-outlined" style={{fontSize:16,verticalAlign:'middle',marginRight:6,color:'var(--sage)',fontVariationSettings:"'FILL' 1"}}>description</span>
          Signed documents
        </div>
        <button className="btn btn-ghost btn-sm" onClick={pickFile} disabled={uploading}
          style={{display:'flex',alignItems:'center',gap:4}}>
          <span className="material-symbols-outlined" style={{fontSize:13}}>upload</span>
          {uploading ? 'Uploading…' : 'Upload'}
        </button>
        <input ref={fileRef} type="file" accept=".pdf,.jpg,.jpeg,.png,.webp"
          onChange={handleFile} style={{display:'none'}} />
      </div>

      {uploadErr && <div className="alert alert-error" style={{marginBottom:10,fontSize:12}}>{uploadErr}</div>}

      {!docs.length ? (
        <div style={{fontSize:13,color:'var(--muted)',padding:'8px 0'}}>
          No documents uploaded yet. Click "Upload" to add a signed consent form, X-ray, or other document.
        </div>
      ) : docs.map(doc => (
        <div key={doc.id} style={{display:'flex',alignItems:'center',gap:10,
          padding:'10px 12px',borderRadius:10,background:'var(--bg-3)',marginBottom:8}}>
          <span className="material-symbols-outlined" style={{fontSize:18,color:'var(--sage)',flexShrink:0,fontVariationSettings:"'FILL' 1"}}>
            {doc.name?.endsWith('.pdf') ? 'picture_as_pdf' : 'image'}
          </span>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:13,fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
              {doc.name}
            </div>
            <div style={{fontSize:11,color:'var(--muted)'}}>
              {doc.doc_type} · {doc.uploaded_at ? new Date(doc.uploaded_at).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}) : ''}
            </div>
          </div>
          <div style={{display:'flex',gap:6,flexShrink:0}}>
            {doc.url && (
              <a href={doc.url} target="_blank" rel="noopener noreferrer"
                className="btn btn-ghost btn-sm" style={{fontSize:11}}>View</a>
            )}
            <button className="btn btn-ghost btn-sm" style={{fontSize:11,color:'var(--danger)'}}
              onClick={() => removeDoc(doc.id)}>Remove</button>
          </div>
        </div>
      ))}
    </div>
  );
}


/* ── Shared: main member search ─────────────────────────────── */
function MainMemberSearch({ picked, onSelect, onClear }) {
  const [search,  setSearch]  = useState('');
  const [results, setResults] = useState([]);
  const [busy,    setBusy]    = useState(false);
  const timer = useRef(null);

  const doSearch = q => {
    setSearch(q);
    clearTimeout(timer.current);
    if (!q.trim()) { setResults([]); return; }
    timer.current = setTimeout(async () => {
      setBusy(true);
      try { const d = await api(`/api/patients?q=${encodeURIComponent(q)}&limit=6`); setResults(d.patients || []); }
      catch { setResults([]); }
      finally { setBusy(false); }
    }, 350);
  };

  return (
    <div style={{background:'var(--bg-3)',borderRadius:8,padding:'12px 14px',display:'flex',flexDirection:'column',gap:10}}>
      <div style={{fontSize:10,letterSpacing:'0.1em',textTransform:'uppercase',color:'var(--muted)'}}>Link to main member</div>
      {picked ? (
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div className="user-avatar" style={{width:32,height:32,fontSize:12,flexShrink:0}}>{initials(picked.first_name, picked.last_name)}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:13,fontWeight:500}}>{picked.first_name} {picked.last_name}</div>
            <div style={{fontSize:11,color:'var(--muted)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{picked.email||picked.phone||'—'}{picked.medical_aid_name?` · ${picked.medical_aid_name}`:''}</div>
          </div>
          <button type="button" className="btn btn-ghost btn-sm" style={{fontSize:11}} onClick={onClear}>Remove</button>
        </div>
      ) : (
        <>
          <input type="search" placeholder="Search by name or email…" value={search} onChange={e=>doSearch(e.target.value)} style={{width:'100%'}} />
          {busy && <div style={{fontSize:12,color:'var(--muted)'}}>Searching…</div>}
          {results.length > 0 && (
            <div style={{border:'1px solid var(--border)',borderRadius:6,overflow:'hidden'}}>
              {results.map((p,i) => (
                <div key={p.id}
                  onClick={()=>{ onSelect(p); setSearch(''); setResults([]); }}
                  style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 12px',cursor:'pointer',fontSize:13,borderTop:i>0?'1px solid var(--border)':'none',background:'var(--card)'}}
                  onMouseEnter={e=>e.currentTarget.style.background='color-mix(in oklab,var(--sage) 8%,var(--card))'}
                  onMouseLeave={e=>e.currentTarget.style.background='var(--card)'}>
                  <span style={{fontWeight:500}}>{p.first_name} {p.last_name}</span>
                  <span style={{fontSize:11,color:'var(--muted)'}}>{p.email||p.phone||'—'}{p.medical_aid_name?` · ${p.medical_aid_name}`:''}</span>
                </div>
              ))}
            </div>
          )}
          {search.trim() && !busy && results.length===0 && <div style={{fontSize:12,color:'var(--muted)'}}>No matching patients found.</div>}
        </>
      )}
      <div style={{fontSize:11,color:'var(--muted)',lineHeight:1.4}}>Linking copies their contact and medical aid info to this record — you can still override any field.</div>
    </div>
  );
}
