/* ════════════════════════════════════════════════════════════
   SERVICES MANAGER
════════════════════════════════════════════════════════════ */
const SVC_CATEGORIES = ['General','Cosmetic','Orthodontics','Paediatric','Oral Surgery','Periodontics','Endodontics','Implants','Prosthodontics','Other'];

function ServicesPage() {
  const [services, setServices] = useState([]);
  const [loading,  setLoading]  = useState(true);
  const [showAll,  setShowAll]  = useState(false);
  const [modal,    setModal]    = useState(null); // null | 'create' | service-object (edit)
  const [form,     setForm]     = useState({});
  const [saving,   setSaving]   = useState(false);
  const [formErr,  setFormErr]  = useState('');
  const [toggling, setToggling] = useState(null);

  const load = useCallback(() => {
    setLoading(true);
    api(`/api/services?all=${showAll}`)
      .then(d => { setServices(d.services || []); setLoading(false); })
      .catch(() => setLoading(false));
  }, [showAll]);

  useEffect(() => { load(); }, [load]);

  const openCreate = () => {
    setForm({ name:'', category:'General', duration_minutes:30, price_from:'', price_to:'', description:'' });
    setFormErr(''); setModal('create');
  };
  const openEdit = (svc) => {
    setForm({
      name:             svc.name,
      category:         svc.category,
      duration_minutes: svc.duration_minutes,
      price_from:       svc.price_from ?? '',
      price_to:         svc.price_to   ?? '',
      description:      svc.description ?? '',
    });
    setFormErr(''); setModal(svc);
  };

  const submit = async () => {
    if (!form.name?.trim())      { setFormErr('Service name is required'); return; }
    if (!form.duration_minutes)  { setFormErr('Duration is required'); return; }
    setSaving(true); setFormErr('');
    // Normalise: empty price strings → null (not 0)
    const payload = {
      ...form,
      name:             form.name.trim(),
      duration_minutes: Number(form.duration_minutes),
      price_from:       form.price_from !== '' && form.price_from != null ? Number(form.price_from) : null,
      price_to:         form.price_to   !== '' && form.price_to   != null ? Number(form.price_to)   : null,
      description:      form.description?.trim() || null,
    };
    try {
      if (modal === 'create') {
        const result = await api('/api/services', { method:'POST', body: JSON.stringify(payload) });
        showToast(`"${payload.name}" added to services`);
      } else {
        await api(`/api/services?id=${modal.id}`, { method:'PATCH', body: JSON.stringify(payload) });
        showToast(`"${payload.name}" updated`);
      }
      setModal(null); load();
    } catch(e) {
      const raw = e.message || '';
      const friendly = raw.includes('category') ? 'Please select a valid category.'
        : raw.includes('duplicate') || raw.includes('unique') ? 'A service with this name already exists.'
        : raw.toLowerCase().includes('auth') || raw.includes('401') ? 'Session expired — please refresh and log in again.'
        : raw.includes('duration') ? 'Duration must be a number greater than 0.'
        : raw || 'Could not save the service. Please try again.';
      console.error('[ServicesPage submit]', raw);
      setFormErr(friendly);
    }
    finally { setSaving(false); }
  };

  const toggleActive = async (svc) => {
    if (svc.active && !window.confirm(`Deactivate "${svc.name}"? It will no longer appear in the booking form, but existing appointments won't be affected.`)) return;
    setToggling(svc.id);
    try {
      await api(`/api/services?id=${svc.id}`, { method:'PATCH', body: JSON.stringify({ active: !svc.active }) });
      setServices(prev => prev.map(s => s.id === svc.id ? { ...s, active: !s.active } : s));
      showToast(svc.active ? `"${svc.name}" deactivated` : `"${svc.name}" is now active`);
    } catch(e) { showToast(e.message, 'error'); }
    finally { setToggling(null); }
  };

  const grouped = useMemo(() => {
    const out = {};
    services.forEach(s => { (out[s.category] = out[s.category] || []).push(s); });
    return out;
  }, [services]);

  return (
    <div>
      <div style={{marginBottom:24,display:'flex',justifyContent:'space-between',alignItems:'flex-end'}}>
        <div>
          <div className="eyebrow">Practice</div>
          <h2 style={{fontFamily:'Plus Jakarta Sans,sans-serif',fontSize:30,marginTop:4}}>Services</h2>
        </div>
        <div style={{display:'flex',gap:10,alignItems:'center'}}>
          <label style={{display:'flex',alignItems:'center',gap:8,fontSize:13,color:'var(--muted)',cursor:'pointer'}}>
            <input type="checkbox" checked={showAll} onChange={e=>setShowAll(e.target.checked)} />
            Show inactive
          </label>
          <button className="btn btn-primary btn-sm" onClick={openCreate}>+ New service</button>
        </div>
      </div>

      {loading ? (
        <div className="card"><SkeletonRows n={4} /></div>
      ) : services.length === 0 ? (
        <div className="card">
          <div className="empty"><div className="empty-icon">🦷</div>
            <div style={{marginBottom:8}}>No services have been added yet.</div>
            <div style={{fontSize:12,color:'var(--muted)'}}>Use the "New service" button above to add your first treatment or procedure.</div>
          </div>
        </div>
      ) : Object.entries(grouped).map(([cat, svcs]) => (
        <div key={cat} style={{marginBottom:28}}>
          <div style={{fontSize:11,letterSpacing:'0.14em',textTransform:'uppercase',color:'var(--muted)',marginBottom:10,fontWeight:600}}>
            {cat}
          </div>
          <div className="card" style={{padding:0,overflow:'hidden'}}>
            <div className="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Name</th>
                    <th>Duration</th>
                    <th>Price from</th>
                    <th>Price to</th>
                    <th>Status</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody>
                  {svcs.map(s => (
                    <tr key={s.id} style={{opacity: s.active ? 1 : 0.5}}>
                      <td>
                        <div className="td-main">{s.name}</div>
                        {s.description && <div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>{s.description}</div>}
                      </td>
                      <td className="mono">{s.duration_minutes} min</td>
                      <td className="mono">{s.price_from != null ? fmtMoney(s.price_from) : '—'}</td>
                      <td className="mono">{s.price_to   != null ? fmtMoney(s.price_to)   : '—'}</td>
                      <td>
                        <span style={{fontSize:11,fontWeight:600,color:s.active?'var(--green)':'var(--muted)'}}>
                          {s.active ? '● Active' : '○ Inactive'}
                        </span>
                      </td>
                      <td>
                        <div style={{display:'flex',gap:6}}>
                          <button className="btn btn-ghost btn-sm" onClick={() => openEdit(s)}>Edit</button>
                          <button className="btn btn-ghost btn-sm" onClick={() => toggleActive(s)} disabled={toggling===s.id}>
                            {toggling===s.id ? '…' : s.active ? 'Deactivate' : 'Activate'}
                          </button>
                        </div>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      ))}

      {modal !== null && (
        <div className="overlay" onClick={() => setModal(null)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <h3 className="modal-title">{modal === 'create' ? 'New service' : 'Edit service'}</h3>
            <p className="modal-sub">{modal === 'create' ? 'Add a new treatment or procedure.' : `Editing "${modal.name}"`}</p>
            <div className="field" style={{marginBottom:14}}>
              <label>Name *</label>
              <input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="e.g. Composite Filling" />
            </div>
            <div className="form-cols" style={{gap:14,marginBottom:14}}>
              <div className="field">
                <label>Category *</label>
                <select value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))}>
                  {SVC_CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
                </select>
              </div>
              <div className="field">
                <label>Duration (min) *</label>
                <input type="number" min="5" max="480" value={form.duration_minutes}
                  onChange={e=>setForm(f=>({...f,duration_minutes:e.target.value}))} />
              </div>
            </div>
            <div className="form-cols" style={{gap:14,marginBottom:14}}>
              <div className="field">
                <label>Price from (R)</label>
                <input type="number" min="0" value={form.price_from}
                  onChange={e=>setForm(f=>({...f,price_from:e.target.value}))} placeholder="500" />
              </div>
              <div className="field">
                <label>Price to (R)</label>
                <input type="number" min="0" value={form.price_to}
                  onChange={e=>setForm(f=>({...f,price_to:e.target.value}))} placeholder="800" />
              </div>
            </div>
            <div className="field" style={{marginBottom:14}}>
              <label>Description</label>
              <textarea rows={2} value={form.description}
                onChange={e=>setForm(f=>({...f,description:e.target.value}))}
                placeholder="Brief patient-facing description (optional)" />
            </div>
            {formErr && <div className="alert alert-error" style={{marginBottom:12}}>{formErr}</div>}
            <div className="modal-foot">
              <button className="btn btn-ghost btn-sm" onClick={() => setModal(null)} disabled={saving}>Cancel</button>
              <button className="btn btn-primary btn-sm" onClick={submit} disabled={saving}>
                {saving ? 'Saving…' : modal === 'create' ? 'Add service' : 'Save changes'}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const TOPIC_LABEL = { general:'General', appointment:'Appointment', cosmetic:'Cosmetic', emergency:'Emergency', medical:'Medical aid' };
const STATUS_COLOR = { new:'var(--sage)', read:'var(--muted)', archived:'var(--muted)' };
const MSG_STATUS_LABEL = { new:'New', read:'Read', archived:'Archived' };

function MessagesPage() {
  const [msgs,       setMsgs]      = useState([]);
  const [loading,    setLoading]   = useState(true);
  const [statusFilt, setStatusFilt]= useState('new');
  const [selected,   setSelected]  = useState(null);
  const [page,       setPage]      = useState(1);
  const [pages,      setPages]     = useState(1);
  const [total,      setTotal]     = useState(0);
  const LIMIT = 20;

  const load = useCallback((pg, sf) => {
    setLoading(true);
    const params = [`page=${pg}`, `limit=${LIMIT}`];
    if (sf) params.push(`status=${sf}`);
    api('/api/contact?' + params.join('&'))
      .then(d => {
        setMsgs(d.submissions || []);
        setTotal(d.total || 0);
        setPages(d.pages || 1);
        setLoading(false);
      })
      .catch(() => setLoading(false));
  }, []);

  useEffect(() => { setPage(1); load(1, statusFilt); }, [statusFilt]); // eslint-disable-line react-hooks/exhaustive-deps
  useEffect(() => { load(page, statusFilt); }, [page]); // eslint-disable-line react-hooks/exhaustive-deps

  const markStatus = async (id, status) => {
    try {
      await api(`/api/contact?id=${id}`, { method:'PATCH', body: JSON.stringify({ status }) });
      setMsgs(prev => prev.map(m => m.id === id ? { ...m, status } : m));
      if (selected?.id === id) setSelected(s => ({ ...s, status }));
    } catch(e) { alert(e.message); }
  };

  const openMsg = async (msg) => {
    setSelected(msg);
    if (msg.status === 'new') markStatus(msg.id, 'read');
  };

  return (
    <div>
      <div style={{marginBottom:24,display:'flex',justifyContent:'space-between',alignItems:'flex-end'}}>
        <div>
          <div className="eyebrow">Inbox</div>
          <h2 style={{fontFamily:'Plus Jakarta Sans,sans-serif',fontSize:30,marginTop:4}}>Messages</h2>
        </div>
        <div style={{display:'flex',gap:6}}>
          {['new','read','archived',''].map(sf => (
            <button key={sf||'all'} className={`btn btn-sm ${statusFilt===sf?'btn-primary':'btn-ghost'}`}
              onClick={() => setStatusFilt(sf)}>
              {sf==='new'?'New':sf==='read'?'Read':sf==='archived'?'Archived':'All'}
            </button>
          ))}
        </div>
      </div>

      <div className="card" style={{padding:0,overflow:'hidden'}}>
        <div className="table-wrap">
          <table>
            <thead>
              <tr>
                <th></th>
                <th>From</th>
                <th>Topic</th>
                <th>Date</th>
                <th>Status</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              {loading ? <SkeletonRows n={5} /> : msgs.length === 0 ? (
                <tr><td colSpan="6">
                  <div className="empty"><div className="empty-icon">📬</div>
                    <div style={{marginBottom:6}}>{statusFilt === 'new' ? 'No new messages — you\'re all caught up!' : statusFilt === 'archived' ? 'No archived messages.' : 'No messages found.'}</div>
                    {statusFilt === 'new' && <div style={{fontSize:12,color:'var(--muted)'}}>New enquiries from the website will appear here.</div>}
                  </div>
                </td></tr>
              ) : msgs.map(m => (
                <tr key={m.id} style={{cursor:'pointer', fontWeight: m.status==='new' ? 600 : 400}}
                  onClick={() => openMsg(m)}>
                  <td style={{width:6,padding:0}}>
                    {m.status==='new' && (
                      <div style={{width:6,height:6,borderRadius:'50%',background:'var(--sage)',margin:'auto'}} />
                    )}
                  </td>
                  <td>
                    <div className="td-main">{m.name}</div>
                    <div style={{fontSize:11,color:'var(--muted)'}}>{m.email}</div>
                  </td>
                  <td><span className="tag">{TOPIC_LABEL[m.topic] || m.topic}</span></td>
                  <td className="mono" style={{fontSize:12}}>{fmtDate(m.created_at)}</td>
                  <td>
                    <span style={{fontSize:11,fontWeight:600,color:STATUS_COLOR[m.status]||'var(--muted)'}}>
                      {MSG_STATUS_LABEL[m.status] || m.status}
                    </span>
                  </td>
                  <td>
                    <button className="btn btn-ghost btn-sm" onClick={e=>{e.stopPropagation();openMsg(m);}}>
                      View
                    </button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {!loading && pages > 1 && (
        <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8,marginTop:20}}>
          <button className="btn btn-ghost btn-sm" onClick={()=>setPage(p=>Math.max(1,p-1))} disabled={page===1}>‹ Prev</button>
          <span className="mono" style={{padding:'0 8px',color:'var(--muted)',fontSize:12}}>Page {page} of {pages}</span>
          <button className="btn btn-ghost btn-sm" onClick={()=>setPage(p=>Math.min(pages,p+1))} disabled={page===pages}>Next ›</button>
        </div>
      )}

      {selected && (
        <div className="overlay" onClick={() => setSelected(null)}>
          <div className="modal" style={{maxWidth:560}} onClick={e => e.stopPropagation()}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:4}}>
              <h3 className="modal-title" style={{margin:0}}>{selected.name}</h3>
              <span className="tag">{TOPIC_LABEL[selected.topic] || selected.topic}</span>
            </div>
            <p className="modal-sub">{selected.email}{selected.phone ? ` · ${selected.phone}` : ''} · {fmtDate(selected.created_at)}</p>
            <div style={{background:'var(--bg-3)',borderRadius:10,padding:'16px 18px',fontSize:14,lineHeight:1.7,color:'var(--ink)',whiteSpace:'pre-wrap',marginBottom:20}}>
              {selected.message}
            </div>
            <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:8}}>
              <a href={`mailto:${selected.email}?subject=Re: ${TOPIC_LABEL[selected.topic]||'Your enquiry'}&body=Hi ${selected.name},%0A%0A`}
                className="btn btn-primary btn-sm" target="_blank" rel="noopener noreferrer">
                <span className="material-symbols-outlined" style={{fontSize:14}}>reply</span> Reply by email
              </a>
              {selected.phone && (
                <a href={`https://wa.me/${selected.phone.replace(/\D/g,'')}`}
                  className="btn btn-ghost btn-sm" target="_blank" rel="noopener noreferrer">
                  WhatsApp
                </a>
              )}
            </div>
            <div className="modal-foot">
              {selected.status !== 'archived' && (
                <button className="btn btn-ghost btn-sm" onClick={() => markStatus(selected.id, 'archived')}>Archive</button>
              )}
              {selected.status === 'archived' && (
                <button className="btn btn-ghost btn-sm" onClick={() => markStatus(selected.id, 'read')}>Unarchive</button>
              )}
              <button className="btn btn-ghost btn-sm" onClick={() => setSelected(null)}>Close</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── CSV export helper ───────────────────────────────────────── */
function toCSV(rows) {
  if (!rows.length) return '';
  const keys = Object.keys(rows[0]);
  const escape = v => {
    if (v == null) return '';
    const s = String(v);
    return s.includes(',') || s.includes('"') || s.includes('\n') ? `"${s.replace(/"/g, '""')}"` : s;
  };
  return [keys.join(','), ...rows.map(r => keys.map(k => escape(r[k])).join(','))].join('\n');
}
function downloadCSV(csv, filename) {
  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}
function ExportButtons() {
  const [exporting, setExporting] = useState(null);

  const exportPatients = async () => {
    setExporting('patients');
    try {
      const d = await api('/api/analytics?resource=export&type=patients');
      downloadCSV(toCSV(d.rows || []), `OH_Dental_Patients_${new Date().toISOString().slice(0,10)}.csv`);
      showToast('Patients CSV downloaded');
    } catch(e) { showToast('Export failed: ' + e.message, 'error'); }
    finally { setExporting(null); }
  };

  const exportAppointments = async () => {
    setExporting('appointments');
    try {
      const d = await api('/api/analytics?resource=export&type=appointments');
      downloadCSV(toCSV(d.rows || []), `OH_Dental_Appointments_${new Date().toISOString().slice(0,10)}.csv`);
      showToast('Appointments CSV downloaded');
    } catch(e) { showToast('Export failed: ' + e.message, 'error'); }
    finally { setExporting(null); }
  };

  return (
    <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
      <button className="btn btn-ghost btn-sm" onClick={exportPatients} disabled={!!exporting}
        style={{display:'flex',alignItems:'center',gap:6}}>
        <span className="material-symbols-outlined" style={{fontSize:15}}>download</span>
        {exporting==='patients' ? 'Exporting…' : 'Export patients CSV'}
      </button>
      <button className="btn btn-ghost btn-sm" onClick={exportAppointments} disabled={!!exporting}
        style={{display:'flex',alignItems:'center',gap:6}}>
        <span className="material-symbols-outlined" style={{fontSize:15}}>download</span>
        {exporting==='appointments' ? 'Exporting…' : 'Export appointments CSV'}
      </button>
    </div>
  );
}

const CLAIM_STATUS_META = {
  draft:       { label:'Draft',       color:'var(--muted)',  bg:'rgba(133,115,118,0.1)' },
  submitted:   { label:'Submitted',   color:'#d97706',       bg:'rgba(217,119,6,0.1)' },
  partial:     { label:'Partial',     color:'#0d9488',       bg:'rgba(13,148,136,0.1)' },
  paid:        { label:'Paid',        color:'var(--green)',  bg:'rgba(22,163,74,0.1)' },
  rejected:    { label:'Rejected',    color:'var(--danger)', bg:'rgba(186,26,26,0.1)' },
  written_off: { label:'Written Off', color:'var(--muted)',  bg:'rgba(133,115,118,0.1)' },
};
const PA_STATUS_META = {
  requested: { label:'Requested', color:'#d97706',       bg:'rgba(217,119,6,0.1)' },
  granted:   { label:'Granted',   color:'var(--green)',  bg:'rgba(22,163,74,0.1)' },
  declined:  { label:'Declined',  color:'var(--danger)', bg:'rgba(186,26,26,0.1)' },
  expired:   { label:'Expired',   color:'var(--muted)',  bg:'rgba(133,115,118,0.1)' },
};

function ClaimStatusChip({ status }) {
  const m = CLAIM_STATUS_META[status] || CLAIM_STATUS_META.draft;
  return <span style={{display:'inline-block',padding:'2px 10px',borderRadius:20,fontSize:11,fontWeight:600,color:m.color,background:m.bg}}>{m.label}</span>;
}

/* ── CreateClaimModal ─────────────────────────────────────────────── */
function CreateClaimModal({ show, onClose, onCreated, prefill }) {
  const [saving, setSaving]       = useState(false);
  const [err,    setErr]          = useState('');
  const [patientQ,  setPQ]        = useState('');
  const [ptResults, setPtR]       = useState([]);
  const [patient,   setPatient]   = useState(prefill?.patient || null);
  const [form,      setForm]      = useState({
    scheme_name:         prefill?.scheme_name         || '',
    scheme_membership_no:prefill?.scheme_membership_no|| '',
    dependant_code:      prefill?.dependant_code      || '',
    plan_name:           prefill?.plan_name           || '',
    treating_provider:   prefill?.treating_provider   || '',
    date_of_service:     prefill?.date_of_service     || new Date().toISOString().slice(0,10),
    auth_number:         prefill?.auth_number         || '',
    notes:               '',
  });
  const [tLines,  setTLines]  = useState(prefill?.tariff_lines  || []);
  const [icd10,   setIcd10]   = useState(prefill?.icd10_items   || []);
  const apptId = prefill?.appointment_id || null;
  const timerRef = useRef(null);

  // Auto-fill scheme from patient when selected
  const selectPatient = (pt) => {
    setPatient(pt);
    setPQ('');
    setPtR([]);
    if (pt.has_medical_aid) {
      setForm(f => ({
        ...f,
        scheme_name:          f.scheme_name          || pt.medical_aid_name   || '',
        scheme_membership_no: f.scheme_membership_no || pt.medical_aid_number || '',
        dependant_code:       f.dependant_code        || pt.dependant_code    || '',
        plan_name:            f.plan_name             || pt.medical_aid_plan  || '',
      }));
    }
  };

  // Patient search
  useEffect(() => {
    clearTimeout(timerRef.current);
    if (!patientQ.trim()) { setPtR([]); return; }
    timerRef.current = setTimeout(async () => {
      try {
        const d = await api(`/api/patients?q=${encodeURIComponent(patientQ.trim())}`);
        setPtR((d.patients || []).slice(0, 8));
      } catch {}
    }, 300);
  }, [patientQ]);

  const sf = f => e => setForm(p => ({...p, [f]: e.target.value}));
  const totalCharged = tLines.reduce((s,l) => s + (parseFloat(l.fee_charged)||0)*(parseInt(l.qty)||1), 0);

  const save = async () => {
    setErr('');
    if (!patient) return setErr('Select a patient');
    if (!form.scheme_name.trim()) return setErr('Scheme name is required');
    if (!form.scheme_membership_no.trim()) return setErr('Membership number is required');
    if (!form.date_of_service) return setErr('Date of service is required');
    if (tLines.length === 0) return setErr('Add at least one procedure code');
    setSaving(true);
    try {
      const d = await api('/api/appointments?resource=claims', {
        method:'POST',
        body: JSON.stringify({
          patient_id:          patient.id,
          appointment_id:      apptId,
          scheme_name:         form.scheme_name.trim(),
          scheme_membership_no:form.scheme_membership_no.trim(),
          dependant_code:      form.dependant_code.trim() || null,
          plan_name:           form.plan_name.trim()      || null,
          treating_provider:   form.treating_provider.trim() || null,
          date_of_service:     form.date_of_service,
          auth_number:         form.auth_number.trim()   || null,
          notes:               form.notes.trim()         || null,
          lines:               tLines,
          icd10_codes:         icd10,
        }),
      });
      showToast('Claim created');
      onCreated(d.claim_id);
    } catch(e) { setErr(e.message); }
    finally { setSaving(false); }
  };

  if (!show) return null;
  return (
    <div className="overlay" onClick={e => e.target===e.currentTarget && onClose()}>
      <div className="modal" style={{maxWidth:680,maxHeight:'90vh',overflowY:'auto'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
          <div style={{fontSize:18,fontWeight:700,color:'var(--ink)'}}>New MA Claim</div>
          <button className="btn btn-ghost btn-sm" onClick={onClose}>✕</button>
        </div>

        {err && <div className="error-banner" style={{marginBottom:12}}>{err}</div>}

        {/* Patient */}
        <div style={{marginBottom:16}}>
          <label style={{fontSize:11,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'0.08em',fontWeight:600,display:'block',marginBottom:6}}>Patient</label>
          {patient ? (
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',background:'var(--bg-3)',border:'1px solid var(--border)',borderRadius:10,padding:'8px 12px'}}>
              <div>
                <div style={{fontWeight:600,fontSize:13}}>{patient.first_name} {patient.last_name}</div>
                {patient.has_medical_aid && <div style={{fontSize:11,color:'var(--muted)'}}>{patient.medical_aid_name} · {patient.medical_aid_number}</div>}
              </div>
              {!apptId && <button className="btn btn-ghost btn-sm" style={{fontSize:11}} onClick={() => setPatient(null)}>Change</button>}
            </div>
          ) : (
            <div style={{position:'relative'}}>
              <span className="material-symbols-outlined" style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',fontSize:18,color:'var(--muted)',pointerEvents:'none',zIndex:1}}>search</span>
              <input value={patientQ} onChange={e=>setPQ(e.target.value)}
                placeholder="Search by name or medical aid number…"
                style={{paddingLeft:36}} />
              {ptResults.length > 0 && (
                <div style={{position:'absolute',zIndex:400,top:'calc(100% + 4px)',left:0,right:0,background:'var(--bg-2)',border:'1px solid var(--border-2)',borderRadius:12,boxShadow:'0 8px 28px rgba(10,31,38,.15)',maxHeight:240,overflowY:'auto'}}>
                  {ptResults.map(pt => (
                    <div key={pt.id} onMouseDown={() => selectPatient(pt)}
                      style={{padding:'10px 14px',cursor:'pointer',borderBottom:'1px solid var(--border)',fontSize:13,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                      <div>
                        <div style={{fontWeight:600,color:'var(--ink)'}}>{pt.first_name} {pt.last_name}</div>
                        {pt.has_medical_aid
                          ? <div style={{fontSize:11,color:'var(--muted)',marginTop:1}}>{pt.medical_aid_name} · {pt.medical_aid_number}</div>
                          : <div style={{fontSize:11,color:'var(--muted)',marginTop:1}}>Self-pay</div>
                        }
                      </div>
                      {pt.has_medical_aid
                        ? <span style={{fontSize:10,fontWeight:600,color:'var(--sage)',background:'rgba(10,74,92,0.08)',padding:'2px 9px',borderRadius:10,flexShrink:0}}>MA</span>
                        : <span style={{fontSize:10,color:'var(--muted)',background:'var(--bg-3)',padding:'2px 9px',borderRadius:10,flexShrink:0}}>Self-pay</span>
                      }
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}
        </div>

        {/* Scheme info */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
          <div className="field"><label>Medical Aid / Scheme *</label>
            <input value={form.scheme_name} onChange={sf('scheme_name')} placeholder="e.g. Discovery Health" /></div>
          <div className="field"><label>Membership Number *</label>
            <input value={form.scheme_membership_no} onChange={sf('scheme_membership_no')} placeholder="e.g. 12345678" /></div>
          <div className="field"><label>Plan Name</label>
            <input value={form.plan_name} onChange={sf('plan_name')} placeholder="e.g. Classic Comprehensive" /></div>
          <div className="field"><label>Dependant Code</label>
            <input value={form.dependant_code} onChange={sf('dependant_code')} placeholder="e.g. 01 (main), 02" /></div>
          <div className="field"><label>Date of Service *</label>
            <input type="date" value={form.date_of_service} onChange={sf('date_of_service')} /></div>
          <div className="field"><label>Pre-Auth Number</label>
            <input value={form.auth_number} onChange={sf('auth_number')} placeholder="If pre-authorised" /></div>
          <div className="field" style={{gridColumn:'1/-1'}}><label>Treating Provider</label>
            <input value={form.treating_provider} onChange={sf('treating_provider')} placeholder="Dentist name (defaults to practice name on PDF)" /></div>
        </div>

        {/* ICD-10 */}
        <div className="field" style={{marginBottom:16}}>
          <label style={{fontSize:11,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'0.08em',fontWeight:600,display:'block',marginBottom:6}}>Diagnosis Codes (ICD-10)</label>
          <ICD10CodePicker items={icd10} onChange={setIcd10} />
        </div>

        {/* Tariff codes */}
        <div className="field" style={{marginBottom:16}}>
          <label style={{fontSize:11,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'0.08em',fontWeight:600,display:'block',marginBottom:6}}>Procedure Codes *</label>
          <TariffCodePicker lines={tLines} onChange={setTLines} />
        </div>

        {tLines.length > 0 && (
          <div style={{textAlign:'right',fontSize:13,fontWeight:700,color:'var(--green)',marginBottom:8}}>
            Total charged: R {totalCharged.toFixed(2)}
          </div>
        )}

        <div className="field" style={{marginBottom:20}}>
          <label>Internal Notes</label>
          <textarea value={form.notes} onChange={sf('notes')} rows={2} placeholder="Optional" style={{resize:'vertical'}} />
        </div>

        <div style={{display:'flex',justifyContent:'flex-end',gap:10}}>
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn" onClick={save} disabled={saving}>{saving ? 'Creating…' : 'Create Claim'}</button>
        </div>
      </div>
    </div>
  );
}

/* ── RemittanceModal ─────────────────────────────────────────────── */
function RemittanceModal({ claim, lines, onClose, onSaved }) {
  const [saving,   setSaving]   = useState(false);
  const [err,      setErr]      = useState('');
  const [form,     setForm]     = useState({
    received_at:    new Date().toISOString().slice(0,10),
    amount_received:'',
    remittance_ref: '',
    notes:          '',
  });
  const [lineUpdates, setLineUpdates] = useState(() =>
    (lines||[]).map(l => ({ id: l.id, status: l.status === 'pending' ? 'approved' : l.status, amount_approved: l.fee_charged * (l.qty||1), rejection_code: l.rejection_code || '', rejection_reason: l.rejection_reason || '' }))
  );

  const sf = f => e => setForm(p => ({...p, [f]: e.target.value}));
  const updateLine = (idx, field, val) => setLineUpdates(prev => prev.map((l,i) => i===idx ? {...l,[field]:val} : l));

  // Auto-sum approved lines
  const autoTotal = lineUpdates.filter(l=>l.status==='approved'||l.status==='partial').reduce((s,l)=>s+(parseFloat(l.amount_approved)||0),0);

  const save = async () => {
    setErr('');
    if (!form.received_at)     return setErr('Date received is required');
    if (!form.amount_received) return setErr('Amount received is required');
    setSaving(true);
    try {
      await api('/api/revenue?resource=remittance', {
        method:'POST',
        body: JSON.stringify({
          claim_id:        claim.id,
          received_at:     form.received_at,
          amount_received: parseFloat(form.amount_received),
          remittance_ref:  form.remittance_ref.trim() || null,
          notes:           form.notes.trim() || null,
          line_updates:    lineUpdates.map(l => ({
            id:               l.id,
            status:           l.status,
            amount_approved:  l.status === 'rejected' ? null : parseFloat(l.amount_approved) || null,
            rejection_code:   l.status === 'rejected' ? l.rejection_code : null,
            rejection_reason: l.status === 'rejected' ? l.rejection_reason : null,
          })),
        }),
      });
      showToast('Remittance recorded');
      onSaved();
    } catch(e) { setErr(e.message); }
    finally { setSaving(false); }
  };

  const lineStatusColor = s => s==='approved' ? 'var(--green)' : s==='rejected' ? 'var(--danger)' : s==='partial' ? '#0d9488' : 'var(--muted)';

  return (
    <div className="overlay" onClick={e => e.target===e.currentTarget && onClose()}>
      <div className="modal" style={{maxWidth:640,maxHeight:'90vh',overflowY:'auto'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <div>
            <div style={{fontSize:18,fontWeight:700,color:'var(--ink)'}}>Record Remittance</div>
            <div style={{fontSize:12,color:'var(--muted)',marginTop:2}}>{claim.scheme_name} · Claim R {Number(claim.total_charged).toFixed(2)}</div>
          </div>
          <button className="btn btn-ghost btn-sm" onClick={onClose}>✕</button>
        </div>

        {err && <div className="error-banner" style={{marginBottom:12}}>{err}</div>}

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
          <div className="field"><label>Date Received *</label>
            <input type="date" value={form.received_at} onChange={sf('received_at')} /></div>
          <div className="field"><label>Amount Received (R) *</label>
            <input type="number" value={form.amount_received} onChange={sf('amount_received')} placeholder="0.00" step="0.01" min="0" /></div>
          <div className="field"><label>Remittance / EFT Reference</label>
            <input value={form.remittance_ref} onChange={sf('remittance_ref')} placeholder="Scheme batch or EFT ref" /></div>
          <div className="field"><label>Notes</label>
            <input value={form.notes} onChange={sf('notes')} placeholder="Optional" /></div>
        </div>

        {/* Line-by-line breakdown */}
        {lines && lines.length > 0 && (
          <div style={{marginBottom:16}}>
            <div style={{fontSize:11,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'0.08em',fontWeight:600,marginBottom:8}}>Line Item Responses (optional)</div>
            <div style={{border:'1px solid var(--border)',borderRadius:10,overflow:'hidden'}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                <thead>
                  <tr style={{background:'var(--bg-3)'}}>
                    <th style={{padding:'6px 10px',textAlign:'left',fontSize:10,color:'var(--muted)',fontWeight:600,textTransform:'uppercase'}}>Code</th>
                    <th style={{padding:'6px 10px',textAlign:'left',fontSize:10,color:'var(--muted)',fontWeight:600,textTransform:'uppercase'}}>Procedure</th>
                    <th style={{padding:'6px 8px',textAlign:'center',fontSize:10,color:'var(--muted)',fontWeight:600,textTransform:'uppercase',width:90}}>Status</th>
                    <th style={{padding:'6px 8px',textAlign:'right',fontSize:10,color:'var(--muted)',fontWeight:600,textTransform:'uppercase',width:80}}>Approved</th>
                  </tr>
                </thead>
                <tbody>
                  {lineUpdates.map((lu, i) => {
                    const line = lines[i];
                    return (
                      <tr key={lu.id} style={{borderTop:'1px solid var(--border)'}}>
                        <td style={{padding:'6px 10px'}}><span style={{fontFamily:'monospace',fontWeight:700,color:'var(--sage)'}}>{line?.code}</span></td>
                        <td style={{padding:'6px 10px',color:'var(--ink)',maxWidth:160,fontSize:11}}>{line?.description}</td>
                        <td style={{padding:'4px 6px',textAlign:'center'}}>
                          <select value={lu.status} onChange={e=>updateLine(i,'status',e.target.value)}
                            style={{fontSize:11,padding:'3px 4px',color:lineStatusColor(lu.status),fontWeight:600,border:'1px solid var(--border)',borderRadius:6,background:'var(--bg-2)',cursor:'pointer'}}>
                            <option value="approved">Approved</option>
                            <option value="partial">Partial</option>
                            <option value="rejected">Rejected</option>
                            <option value="pending">Pending</option>
                          </select>
                        </td>
                        <td style={{padding:'4px 8px'}}>
                          {lu.status !== 'rejected' ? (
                            <input type="number" value={lu.amount_approved} onChange={e=>updateLine(i,'amount_approved',e.target.value)}
                              style={{width:76,textAlign:'right',fontSize:11,padding:'3px 6px'}} placeholder="0.00" step="0.01" min="0" />
                          ) : (
                            <input value={lu.rejection_code} onChange={e=>updateLine(i,'rejection_code',e.target.value)}
                              style={{width:76,fontSize:11,padding:'3px 6px'}} placeholder="Code" />
                          )}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
            {autoTotal > 0 && (
              <div style={{textAlign:'right',fontSize:12,color:'var(--muted)',marginTop:6}}>
                Sum of approved lines: <strong style={{color:'var(--green)'}}>R {autoTotal.toFixed(2)}</strong>
                {!form.amount_received && <button className="btn btn-ghost btn-sm" style={{fontSize:11,marginLeft:8}}
                  onClick={() => setForm(f=>({...f,amount_received:autoTotal.toFixed(2)}))}>Use this</button>}
              </div>
            )}
          </div>
        )}

        <div style={{display:'flex',justifyContent:'flex-end',gap:10}}>
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn" onClick={save} disabled={saving}>{saving?'Saving…':'Record Remittance'}</button>
        </div>
      </div>
    </div>
  );
}

/* ── PreAuthModal ────────────────────────────────────────────────── */
function PreAuthModal({ preAuth, patient: initPatient, onClose, onSaved }) {
  const isEdit = !!preAuth;
  const [saving, setSaving] = useState(false);
  const [err,    setErr]    = useState('');
  const [patientQ, setPQ]   = useState('');
  const [ptR,     setPtR]   = useState([]);
  const [patient, setPt]    = useState(initPatient || (isEdit ? preAuth?.patients : null));
  const [form, setForm]     = useState({
    scheme_name:      isEdit ? preAuth.scheme_name   : (initPatient?.medical_aid_name   || ''),
    membership_no:    isEdit ? preAuth.membership_no : (initPatient?.medical_aid_number || ''),
    requested_at:     isEdit ? preAuth.requested_at  : new Date().toISOString().slice(0,10),
    auth_number:      isEdit ? (preAuth.auth_number || '')      : '',
    authorised_amount:isEdit ? (preAuth.authorised_amount || ''): '',
    valid_from:       isEdit ? (preAuth.valid_from || '')       : '',
    valid_until:      isEdit ? (preAuth.valid_until || '')      : '',
    status:           isEdit ? preAuth.status : 'requested',
    notes:            isEdit ? (preAuth.notes || '')            : '',
  });
  const [codes, setCodes] = useState(isEdit ? (preAuth.requested_codes || []) : []);
  const timerRef = useRef(null);

  useEffect(() => {
    clearTimeout(timerRef.current);
    if (!patientQ.trim()) { setPtR([]); return; }
    timerRef.current = setTimeout(async () => {
      try { const d = await api(`/api/patients?q=${encodeURIComponent(patientQ)}`); setPtR((d.patients||[]).slice(0,6)); } catch {}
    }, 300);
  }, [patientQ]);

  const sf = f => e => setForm(p=>({...p,[f]:e.target.value}));

  const save = async () => {
    setErr('');
    if (!patient && !isEdit) return setErr('Select a patient');
    if (!form.scheme_name.trim()) return setErr('Scheme name required');
    if (!form.membership_no.trim()) return setErr('Membership number required');
    setSaving(true);
    try {
      if (isEdit) {
        await api(`/api/appointments?resource=pre_auths&id=${preAuth.id}`, {
          method:'PATCH',
          body: JSON.stringify({ ...form, authorised_amount: form.authorised_amount || null }),
        });
      } else {
        await api('/api/appointments?resource=pre_auths', {
          method:'POST',
          body: JSON.stringify({ patient_id: patient.id, scheme_name: form.scheme_name, membership_no: form.membership_no, requested_codes: codes, requested_at: form.requested_at, notes: form.notes }),
        });
      }
      showToast(isEdit ? 'Pre-auth updated' : 'Pre-auth request created');
      onSaved();
    } catch(e) { setErr(e.message); }
    finally { setSaving(false); }
  };

  return (
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:540}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <div style={{fontSize:18,fontWeight:700,color:'var(--ink)'}}>{isEdit?'Update Pre-Auth':'New Pre-Auth Request'}</div>
          <button className="btn btn-ghost btn-sm" onClick={onClose}>✕</button>
        </div>
        {err && <div className="error-banner" style={{marginBottom:12}}>{err}</div>}

        {!isEdit && (
          <div style={{marginBottom:14}}>
            <label style={{fontSize:11,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'0.08em',fontWeight:600,display:'block',marginBottom:6}}>Patient</label>
            {patient ? (
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',background:'var(--bg-3)',border:'1px solid var(--border)',borderRadius:10,padding:'10px 14px'}}>
                <div>
                  <div style={{fontWeight:600,fontSize:13,color:'var(--ink)'}}>{patient.first_name} {patient.last_name}</div>
                  {patient.has_medical_aid && <div style={{fontSize:11,color:'var(--muted)',marginTop:1}}>{patient.medical_aid_name} · {patient.medical_aid_number}</div>}
                </div>
                <button className="btn btn-ghost btn-sm" style={{fontSize:11}} onClick={()=>setPt(null)}>Change</button>
              </div>
            ) : (
              <div style={{position:'relative'}}>
                <span className="material-symbols-outlined" style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',fontSize:18,color:'var(--muted)',pointerEvents:'none',zIndex:1}}>search</span>
                <input value={patientQ} onChange={e=>setPQ(e.target.value)}
                  placeholder="Search by name or medical aid number…"
                  style={{paddingLeft:36}} />
                {ptR.length > 0 && (
                  <div style={{position:'absolute',zIndex:400,top:'calc(100% + 4px)',left:0,right:0,background:'var(--bg-2)',border:'1px solid var(--border-2)',borderRadius:12,boxShadow:'0 8px 28px rgba(10,31,38,.15)',maxHeight:240,overflowY:'auto'}}>
                    {ptR.map(pt => (
                      <div key={pt.id} onMouseDown={() => {
                        setPt(pt); setPQ(''); setPtR([]);
                        // Auto-fill scheme fields from patient's MA data
                        if (pt.has_medical_aid) {
                          setForm(f => ({
                            ...f,
                            scheme_name:   f.scheme_name   || pt.medical_aid_name   || '',
                            membership_no: f.membership_no || pt.medical_aid_number || '',
                          }));
                        }
                      }} style={{padding:'10px 14px',cursor:'pointer',borderBottom:'1px solid var(--border)',fontSize:13,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                        <div>
                          <div style={{fontWeight:600,color:'var(--ink)'}}>{pt.first_name} {pt.last_name}</div>
                          {pt.has_medical_aid
                            ? <div style={{fontSize:11,color:'var(--muted)',marginTop:1}}>{pt.medical_aid_name} · {pt.medical_aid_number}</div>
                            : <div style={{fontSize:11,color:'var(--muted)',marginTop:1}}>Self-pay</div>
                          }
                        </div>
                        {pt.has_medical_aid
                          ? <span style={{fontSize:10,fontWeight:600,color:'var(--sage)',background:'rgba(10,74,92,0.08)',padding:'2px 9px',borderRadius:10,flexShrink:0}}>MA</span>
                          : <span style={{fontSize:10,color:'var(--muted)',background:'var(--bg-3)',padding:'2px 9px',borderRadius:10,flexShrink:0}}>Self-pay</span>
                        }
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}
          </div>
        )}

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:14}}>
          <div className="field"><label>Scheme *</label><input value={form.scheme_name} onChange={sf('scheme_name')} /></div>
          <div className="field"><label>Membership No *</label><input value={form.membership_no} onChange={sf('membership_no')} /></div>
          <div className="field"><label>Date Requested</label><input type="date" value={form.requested_at} onChange={sf('requested_at')} /></div>
          {isEdit && <>
            <div className="field"><label>Status</label>
              <select value={form.status} onChange={sf('status')} style={{width:'100%'}}>
                <option value="requested">Requested</option>
                <option value="granted">Granted</option>
                <option value="declined">Declined</option>
                <option value="expired">Expired</option>
              </select>
            </div>
            <div className="field"><label>Auth Number</label><input value={form.auth_number} onChange={sf('auth_number')} placeholder="Granted auth number" /></div>
            <div className="field"><label>Authorised Amount (R)</label><input type="number" value={form.authorised_amount} onChange={sf('authorised_amount')} placeholder="0.00" /></div>
            <div className="field"><label>Valid From</label><input type="date" value={form.valid_from} onChange={sf('valid_from')} /></div>
            <div className="field"><label>Valid Until</label><input type="date" value={form.valid_until} onChange={sf('valid_until')} /></div>
          </>}
        </div>

        {!isEdit && (
          <div className="field" style={{marginBottom:14}}>
            <label style={{fontSize:11,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'0.08em',fontWeight:600,display:'block',marginBottom:6}}>Procedures to Authorise</label>
            <TariffCodePicker lines={codes} onChange={setCodes} />
          </div>
        )}

        <div className="field" style={{marginBottom:20}}>
          <label>Notes</label>
          <textarea value={form.notes} onChange={sf('notes')} rows={2} placeholder="Optional" style={{resize:'vertical'}} />
        </div>

        <div style={{display:'flex',justifyContent:'flex-end',gap:10}}>
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn" onClick={save} disabled={saving}>{saving?'Saving…':isEdit?'Update':'Submit Request'}</button>
        </div>
      </div>
    </div>
  );
}

/* ── ClaimDetailModal ────────────────────────────────────────────── */
function ClaimDetailModal({ claimId, onClose, onUpdated }) {
  const [claim,       setClaim]     = useState(null);
  const [lines,       setLines]     = useState([]);
  const [remittances, setRemits]    = useState([]);
  const [loading,     setLoading]   = useState(true);
  const [patching,    setPatching]  = useState(false);
  const [showRemit,   setShowRemit] = useState(false);
  const [refInput,    setRefInput]  = useState('');
  const [showRefEdit, setShowRefEdit] = useState(false);

  const load = async () => {
    setLoading(true);
    try {
      const d = await api(`/api/appointments?resource=claims&id=${claimId}`);
      setClaim(d.claim);
      setLines(d.lines || []);
      setRemits(d.remittances || []);
      setRefInput(d.claim?.claim_reference_number || '');
    } catch(e) { showToast(e.message, 'error'); }
    finally { setLoading(false); }
  };

  useEffect(() => { load(); }, [claimId]); // eslint-disable-line

  const updateStatus = async (status) => {
    setPatching(true);
    try {
      await api(`/api/appointments?resource=claims&id=${claimId}`, { method:'PATCH', body: JSON.stringify({ status }) });
      showToast('Status updated');
      await load();
      onUpdated();
    } catch(e) { showToast(e.message, 'error'); }
    finally { setPatching(false); }
  };

  const saveRef = async () => {
    try {
      await api(`/api/appointments?resource=claims&id=${claimId}`, { method:'PATCH', body: JSON.stringify({ claim_reference_number: refInput }) });
      setShowRefEdit(false);
      showToast('Reference saved');
      await load();
    } catch(e) { showToast(e.message, 'error'); }
  };

  const outstanding = claim ? Math.max(0, (claim.total_charged || 0) - (claim.total_received || 0)) : 0;

  const lineStatusBadge = (s) => {
    const c = s==='approved'?'var(--green)':s==='rejected'?'var(--danger)':s==='partial'?'#0d9488':'var(--muted)';
    const bg = s==='approved'?'rgba(22,163,74,0.08)':s==='rejected'?'rgba(186,26,26,0.08)':s==='partial'?'rgba(13,148,136,0.08)':'rgba(133,115,118,0.08)';
    return <span style={{fontSize:10,fontWeight:600,color:c,background:bg,padding:'2px 8px',borderRadius:20,textTransform:'uppercase'}}>{s}</span>;
  };

  return (
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:700,maxHeight:'92vh',overflowY:'auto'}}>
        {loading ? (
          <div style={{textAlign:'center',padding:40,color:'var(--muted)'}}>Loading…</div>
        ) : claim ? (<>
          {/* Header */}
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:18}}>
            <div>
              <div style={{fontSize:18,fontWeight:700,color:'var(--ink)',marginBottom:4}}>
                {claim.patients?.first_name} {claim.patients?.last_name}
              </div>
              <div style={{fontSize:12,color:'var(--muted)',display:'flex',gap:12,flexWrap:'wrap'}}>
                <span>{claim.scheme_name}</span>
                {claim.plan_name && <span>· {claim.plan_name}</span>}
                <span>· Mem: {claim.scheme_membership_no}</span>
                {claim.dependant_code && <span>· Dep: {claim.dependant_code}</span>}
              </div>
              <div style={{fontSize:12,color:'var(--muted)',marginTop:4}}>
                Date of service: <strong>{claim.date_of_service}</strong>
                {claim.auth_number && <span> · Auth: <strong>{claim.auth_number}</strong></span>}
              </div>
            </div>
            <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:8}}>
              <button className="btn btn-ghost btn-sm" onClick={onClose}>✕</button>
              <ClaimStatusChip status={claim.status} />
            </div>
          </div>

          {/* Financial summary */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:18}}>
            {[
              { label:'Charged', val:`R ${Number(claim.total_charged).toFixed(2)}`, color:'var(--ink)' },
              { label:'Received', val:`R ${Number(claim.total_received||0).toFixed(2)}`, color:'var(--green)' },
              { label:'Outstanding', val:`R ${outstanding.toFixed(2)}`, color: outstanding>0?'var(--danger)':'var(--muted)' },
            ].map(({ label, val, color }) => (
              <div key={label} style={{background:'var(--bg-3)',borderRadius:10,padding:'10px 14px',textAlign:'center'}}>
                <div style={{fontSize:10,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:4}}>{label}</div>
                <div style={{fontSize:18,fontWeight:700,color,fontVariantNumeric:'tabular-nums'}}>{val}</div>
              </div>
            ))}
          </div>

          {/* Claim reference */}
          <div style={{marginBottom:14,display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
            <span style={{fontSize:12,color:'var(--muted)'}}>Scheme Ref:</span>
            {showRefEdit ? (<>
              <input value={refInput} onChange={e=>setRefInput(e.target.value)} style={{fontSize:12,padding:'4px 8px',width:180}} placeholder="Enter scheme reference" />
              <button className="btn btn-sm" style={{fontSize:11}} onClick={saveRef}>Save</button>
              <button className="btn btn-ghost btn-sm" style={{fontSize:11}} onClick={()=>setShowRefEdit(false)}>Cancel</button>
            </>) : (<>
              <span style={{fontSize:12,fontWeight:600,color:'var(--ink)'}}>{claim.claim_reference_number || '—'}</span>
              <button className="btn btn-ghost btn-sm" style={{fontSize:11}} onClick={()=>setShowRefEdit(true)}>Edit</button>
            </>)}
          </div>

          {/* Status actions */}
          {!['paid','written_off'].includes(claim.status) && (
            <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:18,padding:'10px 14px',background:'var(--bg-3)',borderRadius:10}}>
              <span style={{fontSize:11,color:'var(--muted)',fontWeight:600,alignSelf:'center',marginRight:4}}>Actions:</span>
              {claim.status === 'draft' && (
                <button className="btn btn-sm" style={{background:'#d97706',color:'#fff',border:'none',fontSize:12}} onClick={()=>updateStatus('submitted')} disabled={patching}>
                  Mark Submitted
                </button>
              )}
              {['submitted','partial'].includes(claim.status) && (
                <button className="btn btn-sm" style={{background:'var(--green)',color:'#fff',border:'none',fontSize:12}} onClick={()=>setShowRemit(true)}>
                  Record Remittance
                </button>
              )}
              {claim.status !== 'rejected' && (
                <button className="btn btn-ghost btn-sm" style={{fontSize:12,color:'var(--danger)'}} onClick={()=>updateStatus('rejected')} disabled={patching}>
                  Mark Rejected
                </button>
              )}
              <button className="btn btn-ghost btn-sm" style={{fontSize:12,color:'var(--muted)'}} onClick={()=>updateStatus('written_off')} disabled={patching}>
                Write Off
              </button>
            </div>
          )}

          {/* Claim lines */}
          <div style={{marginBottom:18}}>
            <div style={{fontSize:11,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'0.08em',fontWeight:600,marginBottom:8}}>Procedure Codes</div>
            <div style={{border:'1px solid var(--border)',borderRadius:10,overflow:'hidden'}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                <thead>
                  <tr style={{background:'var(--bg-3)'}}>
                    {['Code','Procedure','Tooth','Qty','Charged','Approved','Status'].map(h=>(
                      <th key={h} style={{padding:'6px 10px',textAlign:['Charged','Approved'].includes(h)?'right':'left',fontSize:10,color:'var(--muted)',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.06em'}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {lines.map(l => (
                    <tr key={l.id} style={{borderTop:'1px solid var(--border)'}}>
                      <td style={{padding:'7px 10px'}}><span style={{fontFamily:'monospace',fontWeight:700,color:'var(--sage)'}}>{l.code}</span></td>
                      <td style={{padding:'7px 10px',color:'var(--ink)',maxWidth:200,fontSize:11}}>{l.description}</td>
                      <td style={{padding:'7px 8px',color:'var(--ink-soft)'}}>{l.tooth_number || '—'}</td>
                      <td style={{padding:'7px 8px',color:'var(--ink-soft)'}}>{l.qty}</td>
                      <td style={{padding:'7px 10px',textAlign:'right',fontFamily:'monospace',fontWeight:600}}>R {(l.fee_charged*(l.qty||1)).toFixed(2)}</td>
                      <td style={{padding:'7px 10px',textAlign:'right',fontFamily:'monospace',color:'var(--green)'}}>
                        {l.amount_approved != null ? `R ${Number(l.amount_approved).toFixed(2)}` : '—'}
                      </td>
                      <td style={{padding:'7px 10px'}}>{lineStatusBadge(l.status)}</td>
                    </tr>
                  ))}
                </tbody>
                <tfoot>
                  <tr style={{borderTop:'2px solid var(--border-2)',background:'var(--bg-3)'}}>
                    <td colSpan={4} style={{padding:'7px 10px',textAlign:'right',fontSize:11,color:'var(--muted)',fontWeight:600,textTransform:'uppercase'}}>Total</td>
                    <td style={{padding:'7px 10px',textAlign:'right',fontFamily:'monospace',fontWeight:700,color:'var(--ink)'}}>R {Number(claim.total_charged).toFixed(2)}</td>
                    <td style={{padding:'7px 10px',textAlign:'right',fontFamily:'monospace',fontWeight:700,color:'var(--green)'}}>R {Number(claim.total_received||0).toFixed(2)}</td>
                    <td></td>
                  </tr>
                </tfoot>
              </table>
            </div>
            {lines.some(l=>l.status==='rejected') && (
              <div style={{marginTop:8}}>
                {lines.filter(l=>l.status==='rejected').map(l=>(
                  <div key={l.id} style={{fontSize:11,color:'var(--danger)',padding:'4px 0'}}>
                    <strong>{l.code}</strong>{l.rejection_code?' — '+l.rejection_code:''}{l.rejection_reason?' · '+l.rejection_reason:''}
                  </div>
                ))}
              </div>
            )}
          </div>

          {/* Remittances received */}
          {remittances.length > 0 && (
            <div style={{marginBottom:18}}>
              <div style={{fontSize:11,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'0.08em',fontWeight:600,marginBottom:8}}>Remittances Received</div>
              {remittances.map(r => (
                <div key={r.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 12px',background:'rgba(22,163,74,0.06)',border:'1px solid rgba(22,163,74,0.2)',borderRadius:8,marginBottom:6}}>
                  <div>
                    <span style={{fontSize:13,fontWeight:700,color:'var(--green)'}}>R {Number(r.amount_received).toFixed(2)}</span>
                    <span style={{fontSize:11,color:'var(--muted)',marginLeft:10}}>{r.received_at}</span>
                    {r.remittance_ref && <span style={{fontSize:11,color:'var(--muted)',marginLeft:6}}>· Ref: {r.remittance_ref}</span>}
                  </div>
                  {r.notes && <span style={{fontSize:11,color:'var(--ink-soft)'}}>{r.notes}</span>}
                </div>
              ))}
            </div>
          )}

          {/* Linked appointment */}
          {claim.appointments && (
            <div style={{fontSize:11,color:'var(--muted)'}}>
              Linked appointment: {claim.appointments.appointment_date} · {claim.appointments.services?.name}
            </div>
          )}
        </>) : (
          <div style={{padding:40,textAlign:'center',color:'var(--muted)'}}>Claim not found</div>
        )}

        {showRemit && claim && (
          <RemittanceModal claim={claim} lines={lines} onClose={()=>setShowRemit(false)}
            onSaved={async()=>{setShowRemit(false);await load();onUpdated();}} />
        )}
      </div>
    </div>
  );
}

/* ── ClaimsPage ──────────────────────────────────────────────────── */
function ClaimsPage({ onNavigate, initialPayload }) {
  const [tab,     setTab]     = useState('outstanding');
  const [claims,  setClaims]  = useState([]);
  const [summary, setSummary] = useState(null);
  const [preAuths,setPreAuths]= useState([]);
  const [loading, setLoading] = useState(true);
  const [selId,   setSelId]   = useState(null);
  const [showCreate,  setShowCreate]  = useState(false);
  const [createPrefill, setCreatePrefill] = useState(null);
  const [showPreAuth,      setShowPreAuth]      = useState(false);
  const [selPreAuth,       setSelPreAuth]       = useState(null);
  const [preAuthPrefillPt, setPreAuthPrefillPt] = useState(null);

  // Handle navigation payloads from appointment modal
  useEffect(() => {
    if (initialPayload?.openPreAuth) {
      // Navigate: Request Pre-Auth button — open new pre-auth modal prefilled with patient
      setPreAuthPrefillPt(initialPayload.patient || null);
      setSelPreAuth(null);
      setShowPreAuth(true);
    } else if (initialPayload?.openClaim) {
      // Navigate: View Claim button — open specific claim
      setSelId(initialPayload.openClaim);
    } else if (initialPayload?.openPreAuthsTab) {
      // Navigate: View Pre-Auth button (pending) — jump to pre-auths tab
      setTab('preauths');
    } else if (initialPayload?.fromAppointment) {
      // Navigate: Create Claim button (pre-auth granted) — open create modal prefilled
      const appt = initialPayload.fromAppointment;
      const tLines = normTariffLines(appt.tariff_codes || []);
      const icd10  = normIcd10Items(appt.icd10_codes   || []);
      setCreatePrefill({
        patient:              appt.patients,
        appointment_id:       appt.id,
        date_of_service:      appt.appointment_date,
        scheme_name:          appt.patients?.medical_aid_name   || '',
        scheme_membership_no: appt.patients?.medical_aid_number || '',
        dependant_code:       appt.patients?.dependant_code     || '',
        plan_name:            appt.patients?.medical_aid_plan   || '',
        auth_number:          initialPayload.prefillAuth || appt.medical_aid_auth_number || '',
        tariff_lines:         tLines,
        icd10_items:          icd10,
      });
      setShowCreate(true);
    }
  }, []); // eslint-disable-line

  const loadSummary = async () => {
    try { const d = await api('/api/revenue?resource=claims_summary'); setSummary(d); } catch {}
  };

  const loadClaims = async (currentTab) => {
    setLoading(true);
    try {
      const t = currentTab || tab;
      let url = '/api/appointments?resource=claims';
      if (t === 'outstanding') url += '&status=draft,submitted,partial,rejected';
      else if (t === 'submitted') url += '&status=submitted,partial';
      else if (t === 'paid') url += '&status=paid';
      // 'all' — no filter
      const d = await api(url);
      setClaims(d.claims || []);
    } catch(e) { showToast(e.message, 'error'); }
    finally { setLoading(false); }
  };

  const loadPreAuths = async () => {
    try { const d = await api('/api/appointments?resource=pre_auths'); setPreAuths(d.pre_auths || []); } catch {}
  };

  useEffect(() => {
    loadSummary();
    if (tab === 'preauths') loadPreAuths();
    else loadClaims(tab);
  }, [tab]); // eslint-disable-line

  const tabs = [
    { id:'outstanding', label:'Outstanding' },
    { id:'submitted',   label:'Submitted / Partial' },
    { id:'paid',        label:'Paid' },
    { id:'all',         label:'All Claims' },
    { id:'preauths',    label:'Pre-Auths' },
  ];

  const agingBuckets = summary ? [
    { label:'0–30 days',  amount: summary.bucketAmounts?.d0_30,  count: summary.bucketCounts?.d0_30,  color:'var(--green)' },
    { label:'31–60 days', amount: summary.bucketAmounts?.d31_60, count: summary.bucketCounts?.d31_60, color:'#d97706' },
    { label:'61–90 days', amount: summary.bucketAmounts?.d61_90, count: summary.bucketCounts?.d61_90, color:'#ea580c' },
    { label:'90+ days',   amount: summary.bucketAmounts?.d90plus,count: summary.bucketCounts?.d90plus,color:'var(--danger)' },
  ] : [];

  const statusOrder = { rejected:0, submitted:1, partial:2, draft:3, paid:4, written_off:5 };
  const sorted = [...claims].sort((a,b) => (statusOrder[a.status]||9)-(statusOrder[b.status]||9) || new Date(b.date_of_service)-new Date(a.date_of_service));

  const ageLabel = (claim) => {
    if (!claim.submitted_at && claim.status === 'draft') return null;
    const ref = claim.submitted_at || claim.date_of_service;
    const days = Math.floor((new Date() - new Date(ref)) / 86400000);
    const color = days > 90 ? 'var(--danger)' : days > 60 ? '#ea580c' : days > 30 ? '#d97706' : 'var(--muted)';
    return <span style={{fontSize:11,color,fontWeight:days>60?700:400}}>{days}d</span>;
  };

  return (
    <div style={{padding:'24px 28px',maxWidth:1100,margin:'0 auto'}}>
      {/* KPI row */}
      {summary && (
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(140px,1fr))',gap:12,marginBottom:24}}>
          <div style={{background:'var(--card)',borderRadius:'1.5rem',padding:'16px 18px',boxShadow:'0 1px 8px rgba(10,31,38,.07)'}}>
            <div style={{fontSize:10,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:6}}>Total Outstanding</div>
            <div style={{fontSize:22,fontWeight:700,color:'var(--ink)',fontVariantNumeric:'tabular-nums'}}>R {Number(summary.totalOutstanding||0).toLocaleString('en-ZA',{minimumFractionDigits:0,maximumFractionDigits:0})}</div>
          </div>
          <div style={{background:'var(--card)',borderRadius:'1.5rem',padding:'16px 18px',boxShadow:'0 1px 8px rgba(10,31,38,.07)'}}>
            <div style={{fontSize:10,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:6}}>Submitted / Awaiting</div>
            <div style={{fontSize:22,fontWeight:700,color:'#d97706',fontVariantNumeric:'tabular-nums'}}>R {Number(summary.totalSubmitted||0).toLocaleString('en-ZA',{minimumFractionDigits:0,maximumFractionDigits:0})}</div>
          </div>
          <div style={{background:'var(--card)',borderRadius:'1.5rem',padding:'16px 18px',boxShadow:'0 1px 8px rgba(10,31,38,.07)'}}>
            <div style={{fontSize:10,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:6}}>Rejected / Action</div>
            <div style={{fontSize:22,fontWeight:700,color:'var(--danger)'}}>{summary.rejectedCount||0}</div>
          </div>
          <div style={{background:'var(--card)',borderRadius:'1.5rem',padding:'16px 18px',boxShadow:'0 1px 8px rgba(10,31,38,.07)'}}>
            <div style={{fontSize:10,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:6}}>Draft (unsent)</div>
            <div style={{fontSize:22,fontWeight:700,color:'var(--ink-soft)',fontVariantNumeric:'tabular-nums'}}>R {Number(summary.draftTotal||0).toLocaleString('en-ZA',{minimumFractionDigits:0,maximumFractionDigits:0})}</div>
          </div>
        </div>
      )}

      {/* Aging buckets */}
      {agingBuckets.some(b => b.count > 0) && (
        <div style={{display:'flex',gap:10,marginBottom:20,flexWrap:'wrap'}}>
          {agingBuckets.map(b => b.count > 0 && (
            <div key={b.label} style={{background:'var(--card)',borderRadius:12,padding:'10px 16px',border:`1px solid var(--border)`,minWidth:130}}>
              <div style={{fontSize:10,color:'var(--muted)',marginBottom:3}}>{b.label}</div>
              <div style={{fontSize:16,fontWeight:700,color:b.color}}>R {Number(b.amount||0).toLocaleString('en-ZA',{minimumFractionDigits:0,maximumFractionDigits:0})}</div>
              <div style={{fontSize:11,color:'var(--muted)'}}>{b.count} claim{b.count!==1?'s':''}</div>
            </div>
          ))}
        </div>
      )}

      {/* Tab bar + actions */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,flexWrap:'wrap',gap:10}}>
        <div style={{display:'flex',gap:4,background:'var(--bg-3)',borderRadius:12,padding:4}}>
          {tabs.map(t => (
            <button key={t.id} onClick={()=>setTab(t.id)}
              className={tab===t.id ? 'btn btn-sm' : 'btn btn-ghost btn-sm'}
              style={{fontSize:12,borderRadius:8}}>
              {t.label}
            </button>
          ))}
        </div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-ghost btn-sm" style={{fontSize:12,display:'flex',alignItems:'center',gap:5}}
            onClick={()=>{setSelPreAuth(null);setShowPreAuth(true);}}>
            <span className="material-symbols-outlined" style={{fontSize:15}}>verified_user</span>Pre-Auth
          </button>
          <button className="btn btn-sm" style={{fontSize:12,display:'flex',alignItems:'center',gap:5}}
            onClick={()=>{setCreatePrefill(null);setShowCreate(true);}}>
            <span className="material-symbols-outlined" style={{fontSize:15}}>add</span>New Claim
          </button>
        </div>
      </div>

      {/* Main content */}
      {tab === 'preauths' ? (
        /* Pre-Auths table */
        <div className="card" style={{padding:0,overflow:'hidden'}}>
          {preAuths.length === 0 && !loading ? (
            <div style={{padding:32,textAlign:'center',color:'var(--muted)',fontSize:14}}>No pre-authorisation requests yet.</div>
          ) : (
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
              <thead>
                <tr style={{background:'var(--bg-3)'}}>
                  {['Patient','Scheme','Membership No','Requested','Status','Auth #','Valid Until',''].map(h=>(
                    <th key={h} style={{padding:'10px 14px',textAlign:'left',fontSize:10,color:'var(--muted)',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.06em'}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {preAuths.map(pa => {
                  const sm = PA_STATUS_META[pa.status] || PA_STATUS_META.requested;
                  return (
                    <tr key={pa.id} style={{borderTop:'1px solid var(--border)',cursor:'pointer'}} onClick={()=>{setSelPreAuth(pa);setShowPreAuth(true);}}>
                      <td style={{padding:'10px 14px',fontWeight:600}}>{pa.patients?.first_name} {pa.patients?.last_name}</td>
                      <td style={{padding:'10px 14px',color:'var(--ink-soft)'}}>{pa.scheme_name}</td>
                      <td style={{padding:'10px 14px',fontFamily:'monospace'}}>{pa.membership_no}</td>
                      <td style={{padding:'10px 14px',color:'var(--muted)'}}>{pa.requested_at}</td>
                      <td style={{padding:'10px 14px'}}><span style={{display:'inline-block',padding:'2px 10px',borderRadius:20,fontSize:11,fontWeight:600,color:sm.color,background:sm.bg}}>{sm.label}</span></td>
                      <td style={{padding:'10px 14px',fontFamily:'monospace',color:'var(--ink)'}}>{pa.auth_number||'—'}</td>
                      <td style={{padding:'10px 14px',color:'var(--muted)'}}>{pa.valid_until||'—'}</td>
                      <td style={{padding:'10px 10px'}}><span className="material-symbols-outlined" style={{fontSize:16,color:'var(--muted)'}}>chevron_right</span></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          )}
        </div>
      ) : (
        /* Claims table */
        <div className="card" style={{padding:0,overflow:'hidden'}}>
          {loading ? (
            <div style={{padding:32,textAlign:'center',color:'var(--muted)'}}>Loading claims…</div>
          ) : sorted.length === 0 ? (
            <div style={{padding:40,textAlign:'center',color:'var(--muted)',fontSize:14}}>
              {tab==='outstanding' ? 'No outstanding claims — great work!' : 'No claims in this view.'}
            </div>
          ) : (
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
              <thead>
                <tr style={{background:'var(--bg-3)'}}>
                  {['Patient','Scheme','Service Date','Charged','Received','Outstanding','Status','Age',''].map(h=>(
                    <th key={h} style={{padding:'10px 14px',textAlign:['Charged','Received','Outstanding'].includes(h)?'right':'left',fontSize:10,color:'var(--muted)',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.06em'}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {sorted.map(c => {
                  const outstanding = Math.max(0,(c.total_charged||0)-(c.total_received||0));
                  return (
                    <tr key={c.id} style={{borderTop:'1px solid var(--border)',cursor:'pointer'}} onClick={()=>setSelId(c.id)}>
                      <td style={{padding:'10px 14px',fontWeight:600}}>{c.patients?.first_name} {c.patients?.last_name}</td>
                      <td style={{padding:'10px 14px',color:'var(--ink-soft)',maxWidth:140}}>
                        <div>{c.scheme_name}</div>
                        {c.plan_name&&<div style={{fontSize:10,color:'var(--muted)'}}>{c.plan_name}</div>}
                      </td>
                      <td style={{padding:'10px 14px',color:'var(--muted)'}}>{c.date_of_service}</td>
                      <td style={{padding:'10px 14px',textAlign:'right',fontFamily:'monospace'}}>R {Number(c.total_charged).toFixed(2)}</td>
                      <td style={{padding:'10px 14px',textAlign:'right',fontFamily:'monospace',color:'var(--green)'}}>R {Number(c.total_received||0).toFixed(2)}</td>
                      <td style={{padding:'10px 14px',textAlign:'right',fontFamily:'monospace',fontWeight:outstanding>0?700:400,color:outstanding>0?'var(--danger)':'var(--muted)'}}>R {outstanding.toFixed(2)}</td>
                      <td style={{padding:'10px 14px'}}><ClaimStatusChip status={c.status} /></td>
                      <td style={{padding:'10px 8px',textAlign:'center'}}>{ageLabel(c)}</td>
                      <td style={{padding:'10px 10px'}}><span className="material-symbols-outlined" style={{fontSize:16,color:'var(--muted)'}}>chevron_right</span></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          )}
        </div>
      )}

      {/* Modals */}
      {selId && (
        <ClaimDetailModal claimId={selId} onClose={()=>setSelId(null)}
          onUpdated={()=>{loadClaims(tab);loadSummary();}} />
      )}
      {showCreate && (
        <CreateClaimModal show={showCreate} onClose={()=>{setShowCreate(false);setCreatePrefill(null);}} prefill={createPrefill}
          onCreated={(cid)=>{setShowCreate(false);setCreatePrefill(null);loadClaims(tab);loadSummary();setSelId(cid);}} />
      )}
      {showPreAuth && (
        <PreAuthModal preAuth={selPreAuth}
          patient={selPreAuth ? (selPreAuth.patients || null) : preAuthPrefillPt}
          onClose={()=>{setShowPreAuth(false);setSelPreAuth(null);setPreAuthPrefillPt(null);}}
          onSaved={()=>{setShowPreAuth(false);setSelPreAuth(null);setPreAuthPrefillPt(null);loadPreAuths();}} />
      )}
    </div>
  );
}

function SettingsPage({ supabase, session }) {
  const user = session?.user;

  // ── Change my password ──────────────────────────────────────
  const [pwForm,     setPwForm]     = useState({ current:'', next:'', confirm:'' });
  const [pwSaving,   setPwSaving]   = useState(false);
  const [pwErr,      setPwErr]      = useState('');
  const [pwOk,       setPwOk]       = useState(false);

  const savePw = async () => {
    setPwErr(''); setPwOk(false);
    if (!pwForm.next.trim()) { setPwErr('New password is required.'); return; }
    if (pwForm.next.length < 8) { setPwErr('Password must be at least 8 characters.'); return; }
    if (pwForm.next !== pwForm.confirm) { setPwErr('New passwords do not match.'); return; }
    setPwSaving(true);
    try {
      const { error } = await supabase.auth.updateUser({ password: pwForm.next });
      if (error) throw error;
      setPwOk(true);
      setPwForm({ current:'', next:'', confirm:'' });
      showToast('Password updated successfully');
    } catch(e) {
      const msg = e.message || '';
      setPwErr(
        msg.toLowerCase().includes('same') ? 'New password must be different from your current one.'
        : msg.toLowerCase().includes('weak') ? 'Password is too weak — try adding numbers and special characters.'
        : 'Could not update password. Please try again.'
      );
    } finally { setPwSaving(false); }
  };

  // ── Audit log ───────────────────────────────────────────────
  const [auditLogs,    setAuditLogs]    = useState(null);
  const [auditLoading, setAuditLoading] = useState(false);
  const [auditErr,     setAuditErr]     = useState('');
  const [auditRange,   setAuditRange]   = useState('24');

  const loadAuditLogs = async (range) => {
    setAuditLoading(true); setAuditErr(''); setAuditLogs(null);
    try {
      const d = await api(`/api/analytics?resource=audit_log&hours=${range}`);
      setAuditLogs(d.logs || []);
    } catch(e) { setAuditErr(e.message || 'Could not load audit logs.'); }
    finally { setAuditLoading(false); }
  };

  // ── Staff list + invite ─────────────────────────────────────
  const [staff,        setStaff]        = useState([]);
  const [staffLoading, setStaffLoading] = useState(true);
  const [inviteEmail,  setInviteEmail]  = useState('');
  const [inviteName,   setInviteName]   = useState('');
  const [inviting,     setInviting]     = useState(false);
  const [inviteErr,    setInviteErr]    = useState('');
  const [inviteOk,     setInviteOk]     = useState(false);
  const [removing,     setRemoving]     = useState(null);

  useEffect(() => {
    api('/api/staff')
      .then(d => { setStaff(d.staff || []); setStaffLoading(false); })
      .catch(() => setStaffLoading(false));
  }, []);

  const sendInvite = async () => {
    setInviteErr(''); setInviteOk(false);
