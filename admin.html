    background: active ? 'rgba(10,74,92,0.10)' : 'none',
    border:'none', cursor:'pointer', fontSize:13, fontWeight:600,
    padding:'5px 9px', borderRadius:7,
    color: active ? 'var(--sage)' : 'var(--ink)',
    fontFamily:'inherit', transition:'background 0.15s, color 0.15s',
  });
  const chipStyle = sel => ({
    padding:'9px 4px', border:'none', borderRadius:8, fontSize:13,
    background: sel ? 'var(--sage)' : 'var(--bg-3)',
    color: sel ? '#fff' : 'var(--ink)',
    cursor:'pointer', fontWeight: sel ? 700 : 400,
    transition:'background 0.12s, color 0.12s',
  });

  return (
    <div ref={wrapRef} style={{position:'relative'}}>
      <button type="button"
        onClick={() => { setView('days'); setOpen(o => !o); }}
        style={triggerStyle}
      >
        <span style={{flex:1}}>{fmt(parsed) || placeholder}</span>
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" style={{opacity:0.5,flexShrink:0}}>
          <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
      </button>

      {open && (
        <div style={popStyle}>
          {/* Header */}
          <div style={{display:'flex',alignItems:'center',padding:'10px',background:'var(--bg-3)',borderBottom:'1px solid var(--border)'}}>
            <button type="button" onClick={prevNav} style={hBtnStyle}>‹</button>
            <div style={{flex:1,display:'flex',justifyContent:'center',gap:2}}>
              {view !== 'years' && (
                <button type="button"
                  onClick={() => setView(v => v === 'months' ? 'days' : 'months')}
                  style={hLabelStyle(view === 'months')}>
                  {MONTHS[vm]}
                </button>
              )}
              <button type="button"
                onClick={() => setView(v => v === 'years' ? 'days' : 'years')}
                style={hLabelStyle(view === 'years')}>
                {view === 'years' ? `${years[0]}–${years[years.length-1]}` : vy}
              </button>
            </div>
            <button type="button" onClick={nextNav} style={hBtnStyle}>›</button>
          </div>

          {/* Days view */}
          {view === 'days' && (
            <div style={{padding:'8px 10px 12px'}}>
              <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',marginBottom:2}}>
                {WDAYS.map(w => (
                  <div key={w} style={{textAlign:'center',fontSize:10,fontWeight:700,
                    color:'var(--muted)',padding:'3px 0',letterSpacing:'0.04em'}}>
                    {w}
                  </div>
                ))}
              </div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2}}>
                {cells.map((day, i) => {
                  const past = isPast(day);
                  return (
                    <button key={i} type="button" disabled={!day || past}
                      onClick={() => day && !past && pickDay(day)}
                      title={past && day ? 'Cannot book a past date' : undefined}
                      style={{
                        aspectRatio:'1/1', border:'none', borderRadius:6,
                        fontSize:12, cursor: day && !past ? 'pointer' : 'default',
                        background: isSel(day) ? 'var(--sage)'
                          : isToday(day) ? 'rgba(10,74,92,0.10)' : 'transparent',
                        color: !day ? 'transparent'
                          : past ? 'rgba(10,74,92,0.25)'
                          : isSel(day) ? '#fff' : 'var(--ink)',
                        fontWeight: isSel(day) ? 700 : 400,
                        textDecoration: past && day ? 'line-through' : 'none',
                        outline: isToday(day) && !isSel(day) ? '1.5px solid rgba(10,74,92,0.35)' : 'none',
                        transition:'background 0.1s',
                      }}>
                      {day || ''}
                    </button>
                  );
                })}
              </div>
              {/* Today shortcut */}
              <div style={{borderTop:'1px solid var(--border)',marginTop:8,paddingTop:6,display:'flex',gap:6,justifyContent:'center'}}>
                <button type="button"
                  onClick={() => {
                    setVy(today.getFullYear()); setVm(today.getMonth()); setView('days');
                    const pad = n => String(n).padStart(2,'0');
                    onChange(`${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`);
                    setOpen(false);
                  }}
                  style={{fontSize:11,color:'var(--sage)',background:'none',border:'none',cursor:'pointer',fontWeight:600}}>
                  Today
                </button>
                {value && (
                  <>
                    <span style={{color:'var(--border-2)'}}>·</span>
                    <button type="button"
                      onClick={() => { onChange(''); setOpen(false); }}
                      style={{fontSize:11,color:'var(--muted)',background:'none',border:'none',cursor:'pointer'}}>
                      Clear
                    </button>
                  </>
                )}
              </div>
            </div>
          )}

          {/* Months view */}
          {view === 'months' && (
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:5,padding:'12px 10px'}}>
              {MONTHS_S.map((mn, i) => (
                <button key={i} type="button"
                  onClick={() => { setVm(i); setView('days'); }}
                  style={chipStyle(vm === i)}>
                  {mn}
                </button>
              ))}
            </div>
          )}

          {/* Years view — no future restriction for appointments */}
          {view === 'years' && (
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:5,padding:'12px 10px'}}>
              {years.map(yr => (
                <button key={yr} type="button"
                  onClick={() => { setVy(yr); setView('months'); }}
                  style={chipStyle(vy === yr)}>
                  {yr}
                </button>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}


/* ── Appointment time picker ─────────────────────────────────── */
function ApptTimePicker({ value, onChange, placeholder = 'Select time' }) {
  const [open, setOpen] = useState(false);
  const wrapRef = useRef(null);
  const scrollRef = useRef(null);

  // 30-min slots, 07:00 – 17:30
  const SLOTS = useMemo(() => {
    const out = [];
    for (let h = 7; h <= 17; h++) {
      out.push(`${String(h).padStart(2,'0')}:00`);
      out.push(`${String(h).padStart(2,'0')}:30`);
    }
    return out;
  }, []);

  useEffect(() => {
    if (!open) return;
    const h = e => { if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', h);
    return () => document.removeEventListener('mousedown', h);
  }, [open]);

  // Scroll selected slot into view when popup opens
  useEffect(() => {
    if (!open || !value || !scrollRef.current) return;
    const btn = scrollRef.current.querySelector('[data-sel="true"]');
    if (btn) btn.scrollIntoView({ block:'nearest' });
  }, [open, value]);

  const triggerStyle = {
    width:'100%', display:'flex', alignItems:'center', gap:8,
    background:'var(--bg-3)', border:'1px solid var(--border)',
    borderRadius:8, padding:'10px 14px', cursor:'pointer',
    fontSize:14, color: value ? 'var(--ink)' : 'var(--muted)',
    textAlign:'left', fontFamily:'inherit', fontWeight:400,
    transition:'border-color 0.15s',
  };
  const popStyle = {
    position:'absolute', top:'calc(100% + 6px)', left:0, zIndex:400,
    background:'var(--card)', borderRadius:14,
    border:'1px solid var(--border-2)',
    boxShadow:'0 16px 48px rgba(10,31,38,0.18)',
    width:220, overflow:'hidden',
  };

  // Group slots by hour for the header label
  const hourLabel = slot => {
    const [h] = slot.split(':');
    return parseInt(h, 10) < 12 ? 'Morning' : parseInt(h, 10) < 14 ? 'Midday' : 'Afternoon';
  };

  return (
    <div ref={wrapRef} style={{position:'relative'}}>
      <button type="button" onClick={() => setOpen(o => !o)} style={triggerStyle}>
        <span style={{flex:1}}>{value || placeholder}</span>
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" style={{opacity:0.5,flexShrink:0}}>
          <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
        </svg>
      </button>

      {open && (
        <div style={popStyle}>
          <div style={{padding:'8px 8px 4px',background:'var(--bg-3)',borderBottom:'1px solid var(--border)'}}>
            <div style={{fontSize:10,letterSpacing:'0.14em',textTransform:'uppercase',
              color:'var(--muted)',textAlign:'center',fontWeight:600}}>
              Select a time
            </div>
          </div>
          <div ref={scrollRef} style={{padding:'10px 10px 10px', maxHeight:240, overflowY:'auto'}}>
            {/* Group into morning / midday / afternoon */}
            {['Morning','Midday','Afternoon'].map(group => {
              const groupSlots = SLOTS.filter(s => hourLabel(s) === group);
              if (!groupSlots.length) return null;
              return (
                <div key={group} style={{marginBottom:8}}>
                  <div style={{fontSize:9,letterSpacing:'0.14em',textTransform:'uppercase',
                    color:'var(--muted)',fontWeight:700,marginBottom:4,paddingLeft:2}}>
                    {group}
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:4}}>
                    {groupSlots.map(slot => {
                      const sel = slot === value;
                      return (
                        <button key={slot} type="button" data-sel={sel}
                          onClick={() => { onChange(slot); setOpen(false); }}
                          style={{
                            padding:'7px 4px', border:'none', borderRadius:8, fontSize:12,
                            background: sel ? 'var(--sage)' : 'var(--bg-3)',
                            color: sel ? '#fff' : 'var(--ink)',
                            cursor:'pointer', fontWeight: sel ? 700 : 400,
                            transition:'background 0.12s, color 0.12s',
                            fontVariantNumeric:'tabular-nums',
                          }}>
                          {slot}
                        </button>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}


/* ── DOB date picker ─────────────────────────────────────────── */
function DobPicker({ value, onChange, placeholder = 'Date of birth' }) {
  const today = new Date();
  const parsed = value ? new Date(value + 'T12:00:00') : null;

  const [open, setOpen] = useState(false);
  const [view, setView] = useState('days'); // 'days' | 'months' | 'years'
  const [vy,   setVy]   = useState(() => parsed?.getFullYear() ?? today.getFullYear() - 25);
  const [vm,   setVm]   = useState(() => parsed?.getMonth() ?? 0);
  const wrapRef = useRef(null);

  // Sync picker position when value changes (e.g. opening edit form for existing patient)
  useEffect(() => {
    if (parsed) { setVy(parsed.getFullYear()); setVm(parsed.getMonth()); }
  }, [value]);

  // Close on outside click
  useEffect(() => {
    if (!open) return;
    const h = e => { if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', h);
    return () => document.removeEventListener('mousedown', h);
  }, [open]);

  const MONTHS   = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const MONTHS_S = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const WDAYS    = ['Su','Mo','Tu','We','Th','Fr','Sa'];

  const fmt = d => d
    ? `${String(d.getDate()).padStart(2,'0')} ${MONTHS_S[d.getMonth()]} ${d.getFullYear()}`
    : '';

  const prevNav = () => {
    if (view === 'years')  { setVy(y => y - 10); return; }
    if (view === 'months') { setVy(y => y - 1);  return; }
    if (vm === 0) { setVy(y => y - 1); setVm(11); } else setVm(m => m - 1);
  };
  const nextNav = () => {
    if (view === 'years')  { setVy(y => y + 10); return; }
    if (view === 'months') { setVy(y => y + 1);  return; }
    if (vm === 11) { setVy(y => y + 1); setVm(0); } else setVm(m => m + 1);
  };

  // Build day grid
  const firstDow = new Date(vy, vm, 1).getDay();
  const daysInMo = new Date(vy, vm + 1, 0).getDate();
  const cells    = [...Array(firstDow).fill(null), ...Array.from({length: daysInMo}, (_, i) => i + 1)];

  const pickDay = d => {
    onChange(`${vy}-${String(vm + 1).padStart(2,'0')}-${String(d).padStart(2,'0')}`);
    setOpen(false);
  };

  const isSel   = d => parsed && parsed.getFullYear()===vy && parsed.getMonth()===vm && parsed.getDate()===d;
  const isToday = d => today.getFullYear()===vy && today.getMonth()===vm && today.getDate()===d;

  // Year grid — decade-based, 10 per page
  const decadeStart = Math.floor(vy / 10) * 10;
  const years = Array.from({length: 12}, (_, i) => decadeStart - 1 + i);

  const triggerStyle = {
    width:'100%', display:'flex', alignItems:'center', gap:8,
    background:'var(--bg-3)', border:'1px solid var(--border)',
    borderRadius:8, padding:'10px 14px', cursor:'pointer',
    fontSize:14, color: parsed ? 'var(--ink)' : 'var(--muted)',
    textAlign:'left', fontFamily:'inherit', fontWeight:400,
    transition:'border-color 0.15s',
  };
  const popStyle = {
    position:'absolute', top:'calc(100% + 6px)', left:0, zIndex:400,
    background:'var(--card)', borderRadius:14,
    border:'1px solid var(--border-2)',
    boxShadow:'0 16px 48px rgba(10,31,38,0.18)',
    width:272, overflow:'hidden',
  };
  const hBtnStyle = {
    background:'none', border:'none', cursor:'pointer',
    fontSize:18, color:'var(--ink-soft)', padding:'3px 8px',
    borderRadius:6, lineHeight:1, fontFamily:'inherit',
  };
  const hLabelStyle = active => ({
    background: active ? 'rgba(236,72,153,0.10)' : 'none',
    border:'none', cursor:'pointer', fontSize:13, fontWeight:600,
    padding:'5px 9px', borderRadius:7,
    color: active ? 'var(--sage)' : 'var(--ink)',
    fontFamily:'inherit', transition:'background 0.15s, color 0.15s',
  });
  const chipStyle = (sel, disabled) => ({
    padding:'9px 4px', border:'none', borderRadius:8, fontSize:13,
    background: sel ? 'var(--sage)' : 'var(--bg-3)',
    color: sel ? '#fff' : disabled ? 'var(--muted)' : 'var(--ink)',
    cursor: disabled ? 'not-allowed' : 'pointer',
    fontWeight: sel ? 700 : 400, opacity: disabled ? 0.4 : 1,
    transition:'background 0.12s, color 0.12s',
  });

  return (
    <div ref={wrapRef} style={{position:'relative'}}>
      {/* Trigger */}
      <button type="button"
        onClick={() => { setView('days'); setOpen(o => !o); }}
        style={triggerStyle}
      >
        <span style={{flex:1}}>{fmt(parsed) || placeholder}</span>
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" style={{opacity:0.5, flexShrink:0}}>
          <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
      </button>

      {open && (
        <div style={popStyle}>
          {/* Header */}
          <div style={{display:'flex',alignItems:'center',padding:'10px 10px',background:'var(--bg-3)',borderBottom:'1px solid var(--border)'}}>
            <button type="button" onClick={prevNav} style={hBtnStyle}>‹</button>
            <div style={{flex:1, display:'flex', justifyContent:'center', gap:2}}>
              {view !== 'years' && (
                <button type="button"
                  onClick={() => setView(v => v === 'months' ? 'days' : 'months')}
                  style={hLabelStyle(view === 'months')}>
                  {MONTHS[vm]}
                </button>
              )}
              <button type="button"
                onClick={() => setView(v => v === 'years' ? 'days' : 'years')}
                style={hLabelStyle(view === 'years')}>
                {view === 'years' ? `${years[0]}–${years[years.length-1]}` : vy}
              </button>
            </div>
            <button type="button" onClick={nextNav} style={hBtnStyle}>›</button>
          </div>

          {/* Days view */}
          {view === 'days' && (
            <div style={{padding:'8px 10px 12px'}}>
              <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',marginBottom:2}}>
                {WDAYS.map(w => (
                  <div key={w} style={{textAlign:'center',fontSize:10,fontWeight:700,
                    color:'var(--muted)',padding:'3px 0',letterSpacing:'0.04em'}}>
                    {w}
                  </div>
                ))}
              </div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2}}>
                {cells.map((day, i) => (
                  <button key={i} type="button" disabled={!day}
                    onClick={() => day && pickDay(day)}
                    style={{
                      aspectRatio:'1/1', border:'none', borderRadius:6,
                      fontSize:12, cursor: day ? 'pointer' : 'default',
                      background: isSel(day) ? 'var(--sage)'
                        : isToday(day) ? 'rgba(236,72,153,0.10)' : 'transparent',
                      color: !day ? 'transparent' : isSel(day) ? '#fff' : 'var(--ink)',
                      fontWeight: isSel(day) ? 700 : 400,
                      outline: isToday(day) && !isSel(day) ? '1.5px solid rgba(236,72,153,0.35)' : 'none',
                      transition:'background 0.1s',
                    }}>
                    {day || ''}
                  </button>
                ))}
              </div>
            </div>
          )}

          {/* Months view */}
          {view === 'months' && (
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:5,padding:'12px 10px'}}>
              {MONTHS_S.map((mn, i) => (
                <button key={i} type="button"
                  onClick={() => { setVm(i); setView('days'); }}
                  style={chipStyle(vm === i, false)}>
                  {mn}
                </button>
              ))}
            </div>
          )}

          {/* Years view */}
          {view === 'years' && (
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:5,padding:'12px 10px'}}>
              {years.map(yr => {
                const fut = yr > today.getFullYear();
                return (
                  <button key={yr} type="button" disabled={fut}
                    onClick={() => { if (!fut) { setVy(yr); setView('months'); } }}
                    style={chipStyle(vy === yr, fut)}>
                    {yr}
                  </button>
                );
              })}
            </div>
          )}

          {/* Footer — clear */}
          {value && (
            <div style={{borderTop:'1px solid var(--border)',padding:'8px 12px',display:'flex',justifyContent:'flex-end'}}>
              <button type="button"
                onClick={() => { onChange(''); setOpen(false); }}
                style={{fontSize:11,color:'var(--muted)',background:'none',border:'none',cursor:'pointer'}}>
                Clear date
              </button>
            </div>
          )}
        </div>
      )}
    </div>
  );
}


/* ── Add patient — 3-step wizard ────────────────────────────── */
function AddPatientModal({ onClose, onDone, initialForm = {}, initialMmPick = null }) {
  const STEP_LABELS = ['Basic details', 'Medical aid', 'Additional information'];
  const [step,   setStep]   = useState(0);
  const [form,   setForm]   = useState({
    first_name:'', last_name:'', email:'', phone:'',
    date_of_birth:'', gender:'',
    has_medical_aid: false,
    medical_aid_name:'', medical_aid_number:'', medical_aid_plan:'',
    relationship_to_member:'main_member', dependant_code:'',
    main_member_patient_id:'', main_member_name:'',
    home_address:'', suburb:'', city:'', postal_code:'', province:'',
    referral_source:'', referral_detail:'', patient_type:'new',
    ...initialForm,
  });
  const [saving, setSaving] = useState(false);
  const [err,    setErr]    = useState('');
  const [mmPick, setMmPick] = useState(initialMmPick);
  const set = p => setForm(f => ({...f,...p}));

  // Auto-suggest dependant code when launched from a main member's record
  useEffect(() => {
    if (initialMmPick?.id && initialForm.has_medical_aid) {
      api(`/api/patients?main_member_id=${initialMmPick.id}`)
        .then(r => set({ dependant_code: String((r.patients?.length || 0) + 2).padStart(2, '0') }))
        .catch(() => {});
    }
  }, []);

  const isDependent = form.has_medical_aid && form.relationship_to_member && form.relationship_to_member !== 'main_member';
  const dependentUnlinked = isDependent && !form.main_member_patient_id;
  const canSave = form.first_name.trim() && form.last_name.trim();

  const selectMember = p => {
    if (p.relationship_to_member && p.relationship_to_member !== 'main_member') {
      showToast(`${p.first_name} ${p.last_name} is also a dependant — please select the actual main member instead.`, 'error');
      return;
    }
    setMmPick(p);
    set({
      main_member_patient_id: p.id,
      main_member_name:       `${p.first_name} ${p.last_name}`,
      email:              form.email              || p.email              || '',
      phone:              form.phone              || p.phone              || '',
      medical_aid_name:   form.medical_aid_name   || p.medical_aid_name   || '',
      medical_aid_number: form.medical_aid_number || p.medical_aid_number || '',
      medical_aid_plan:   form.medical_aid_plan   || p.medical_aid_plan   || '',
    });
    // Auto-suggest next dependant code (01 = main member, dependants start at 02)
    api(`/api/patients?main_member_id=${p.id}`)
      .then(r => set({ dependant_code: String((r.patients?.length || 0) + 2).padStart(2, '0') }))
      .catch(() => {});
  };

  const submit = async () => {
    if (!canSave) { setErr('First name and last name are required.'); return; }
    setSaving(true); setErr('');
    try {
      const resp = await api('/api/patients', {
        method: 'POST',
        body: JSON.stringify({
          ...form,
          date_of_birth:          form.date_of_birth          || null,
          gender:                 form.gender                 || null,
          referral_source:        form.referral_source        || null,
          relationship_to_member: form.relationship_to_member || null,
          main_member_patient_id: form.main_member_patient_id || null,
        }),
      });
      showToast(`${form.first_name} ${form.last_name} added`);
      // Pass back a minimal patient object so callers (e.g. CreateAppointmentModal) can auto-select it
      onDone({
        id:         resp.patientId,
        first_name: form.first_name.trim(),
        last_name:  form.last_name.trim(),
        email:      form.email.trim(),
        phone:      form.phone.trim(),
      });
    } catch(e) { setErr(e.message); setSaving(false); }
  };

  /* step dots */
  const StepDots = () => (
    <div className="wiz-dots">
      {STEP_LABELS.map((l,i) => (
        <div key={l} className={`wiz-dot ${i < step ? 'done' : i === step ? 'cur' : 'ahead'}`} title={l} />
      ))}
    </div>
  );

  /* shared footer */
  const WizFoot = ({ onBack, onNext, nextLabel='Continue →', saveLabel='Save & exit', showSave=true }) => (
    <div className="modal-foot" style={{marginTop:16}}>
      {onBack
        ? <button type="button" className="btn btn-ghost btn-sm" onClick={onBack}>← Back</button>
        : <button type="button" className="btn btn-ghost btn-sm" onClick={onClose}>Cancel</button>}
      <div style={{display:'flex',gap:8,marginLeft:'auto'}}>
        {showSave && (
          <button type="button" className="btn btn-ghost btn-sm" disabled={!canSave||saving} onClick={submit}>
            {saving ? 'Saving…' : saveLabel}
          </button>
        )}
        {onNext && (
          <button type="button" className="btn btn-primary btn-sm" disabled={!canSave} onClick={onNext}>{nextLabel}</button>
        )}
        {!onNext && (
          <button type="button" className="btn btn-primary btn-sm" disabled={!canSave||saving} onClick={submit}>
            {saving ? 'Saving…' : 'Add patient'}
          </button>
        )}
      </div>
    </div>
  );

  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal" style={{maxWidth:540}} onClick={e=>e.stopPropagation()}>

        {/* header */}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
          <h3 className="modal-title" style={{marginBottom:0}}>
            {step === 0 ? 'New patient' : STEP_LABELS[step]}
          </h3>
          <StepDots />
        </div>
        <p className="modal-sub" style={{marginBottom:20}}>
          {step === 0 && 'Start with the basics — you can always fill in the rest later.'}
          {step === 1 && 'Medical aid details — skip this section if the patient pays themselves.'}
          {step === 2 && 'Optional — helps with practice reporting.'}
        </p>

        {/* ── Step 0: Essentials ── */}
        {step === 0 && (
          <>
            <div className="form-cols">
              <div className="field"><label>First name *</label><input value={form.first_name} onChange={e=>set({first_name:e.target.value})} placeholder="Jane" autoFocus /></div>
              <div className="field"><label>Last name *</label><input value={form.last_name} onChange={e=>set({last_name:e.target.value})} placeholder="Smith" /></div>
            </div>
            <div className="form-cols" style={{marginTop:14}}>
              <div className="field"><label>Phone</label><input value={form.phone} onChange={e=>set({phone:e.target.value})} placeholder="071 000 0000" /></div>
              <div className="field"><label>Email</label><input type="email" value={form.email} onChange={e=>set({email:e.target.value})} placeholder="jane@example.com" /></div>
            </div>
            <div className="form-cols" style={{marginTop:14}}>
              <div className="field"><label>Date of birth</label><DobPicker value={form.date_of_birth} onChange={v => set({date_of_birth: v})} /></div>
              <div className="field">
                <label>Gender</label>
                <select value={form.gender} onChange={e=>set({gender:e.target.value})}>
                  <option value="">Select…</option>
                  <option value="male">Male</option>
                  <option value="female">Female</option>
                  <option value="non_binary">Non-binary</option>
                  <option value="prefer_not_to_say">Prefer not to say</option>
                </select>
              </div>
            </div>
            {err && <div className="alert alert-error" style={{marginTop:12}}>{err}</div>}
            <WizFoot onNext={() => { if (!canSave) { setErr('First name and last name are required.'); return; } setErr(''); setStep(1); }} saveLabel="Save now &amp; continue later" />
          </>
        )}

        {/* ── Step 1: Medical aid ── */}
        {step === 1 && (
          <>
            <div style={{display:'flex',gap:8,marginBottom:20}}>
              {[false,true].map(v => (
                <button key={String(v)} type="button"
                  className={`btn btn-sm ${form.has_medical_aid===v ? 'btn-primary' : 'btn-ghost'}`}
                  onClick={() => {
                    if (!v) { set({ has_medical_aid:false, medical_aid_name:'', medical_aid_number:'', medical_aid_plan:'', relationship_to_member:'main_member', dependant_code:'', main_member_patient_id:'', main_member_name:'' }); setMmPick(null); }
                    else set({ has_medical_aid:true });
                  }}
                >{v ? 'Has medical aid' : 'Self-pay / no MA'}</button>
              ))}
            </div>
            {form.has_medical_aid && (
              <>
                <div className="form-cols">
                  <div className="field"><label>Scheme name</label><input value={form.medical_aid_name} onChange={e=>set({medical_aid_name:e.target.value})} placeholder="e.g. Discovery Health" /></div>
                  <div className="field"><label>Membership number</label><input value={form.medical_aid_number} onChange={e=>set({medical_aid_number:e.target.value})} placeholder="e.g. 12345678" /></div>
                </div>
                <div className="form-cols" style={{marginTop:14}}>
                  <div className="field"><label>Plan / option</label><input value={form.medical_aid_plan} onChange={e=>set({medical_aid_plan:e.target.value})} placeholder="e.g. Classic Comprehensive" /></div>
                  <div className="field">
                    <label>Role on policy</label>
                    <select value={form.relationship_to_member} onChange={e => {
                      const val = e.target.value;
                      if (!val || val === 'main_member') { set({ relationship_to_member:val, main_member_patient_id:'', main_member_name:'', dependant_code:'' }); setMmPick(null); }
                      else set({ relationship_to_member:val });
                    }}>
                      {!form.relationship_to_member && <option value="">Select role…</option>}
                      <option value="main_member">Main member</option>
                      <option value="spouse">Spouse / partner</option>
                      <option value="child">Child</option>
                      <option value="parent">Parent</option>
                      <option value="other">Other dependant</option>
                    </select>
                  </div>
                </div>
                {isDependent && (
                  <div style={{marginTop:14,display:'flex',flexDirection:'column',gap:10}}>
                    <div className="field" style={{maxWidth:160}}>
                      <label>Dependant code</label>
                      <input type="text" inputMode="numeric" value={form.dependant_code} onChange={e=>set({dependant_code:e.target.value})} placeholder="02, 03…" />
                    </div>
                    <MainMemberSearch
                      picked={mmPick}
                      onSelect={selectMember}
                      onClear={() => { setMmPick(null); set({main_member_patient_id:'', main_member_name:'', dependant_code:''}); }}
                    />
                    {dependentUnlinked && (
                      <div style={{background:'#fef3c7',border:'1px solid #fcd34d',borderRadius:8,padding:'10px 14px',fontSize:12,color:'#92400e',lineHeight:1.5}}>
                        <strong>No main member record linked.</strong> Search above to link to an existing patient, or leave unlinked if the main member hasn't been registered yet.
                      </div>
                    )}
                  </div>
                )}
              </>
            )}
            {err && <div className="alert alert-error" style={{marginTop:12}}>{err}</div>}
            <WizFoot onBack={() => setStep(0)} onNext={() => setStep(2)} />
          </>
        )}

        {/* ── Step 2: More info ── */}
        {step === 2 && (
          <>
            <div className="form-cols">
              <div className="field" style={{gridColumn:'1/-1'}}><label>Street address</label><input value={form.home_address} onChange={e=>set({home_address:e.target.value})} placeholder="e.g. 12 Main Road" /></div>
              <div className="field"><label>Suburb</label><input value={form.suburb} onChange={e=>set({suburb:e.target.value})} placeholder="e.g. Krugersdorp North" /></div>
              <div className="field"><label>City / Town</label><input value={form.city} onChange={e=>set({city:e.target.value})} placeholder="e.g. Krugersdorp" /></div>
              <div className="field"><label>Postal code</label><input value={form.postal_code} onChange={e=>set({postal_code:e.target.value})} placeholder="e.g. 1739" /></div>
              <div className="field">
                <label>Province</label>
                <select value={form.province} onChange={e=>set({province:e.target.value})}>
                  <option value="">Select…</option>
                  {PROVINCES.map(p => <option key={p}>{p}</option>)}
                </select>
              </div>
            </div>
            <div className="form-cols" style={{marginTop:14}}>
              <div className="field">
                <label>Referral source</label>
                <select value={form.referral_source} onChange={e=>set({referral_source:e.target.value})}>
                  <option value="">Select…</option>
                  {REFERRALS.map(([v,l]) => <option key={v} value={v}>{l}</option>)}
                </select>
              </div>
              <div className="field"><label>Referral detail</label><input value={form.referral_detail} onChange={e=>set({referral_detail:e.target.value})} placeholder="e.g. Dr Smith" /></div>
            </div>
            <div className="field" style={{marginTop:14,maxWidth:220}}>
              <label>Patient type</label>
              <select value={form.patient_type} onChange={e=>set({patient_type:e.target.value})}>
                <option value="new">New patient</option>
                <option value="returning">Returning patient</option>
              </select>
            </div>
            {err && <div className="alert alert-error" style={{marginTop:12}}>{err}</div>}
            <WizFoot onBack={() => setStep(1)} showSave={false} />
          </>
        )}

      </div>
    </div>
  );
}


/* ════════════════════════════════════════════════════════════
   ANALYTICS PAGE
════════════════════════════════════════════════════════════ */
function AnalyticsPage() {
  const [data,    setData]    = useState(null);
  const [loading, setLoading] = useState(true);
  const [err,     setErr]     = useState(null);
  const bookingsChartRef = useRef(null);
  const revenueChartRef  = useRef(null);
  const paymentChartRef  = useRef(null);
  const bookingsChart    = useRef(null);
  const revenueChart     = useRef(null);
  const paymentChart     = useRef(null);

  useEffect(() => {
    api('/api/analytics')
      .then(d => { setData(d); setLoading(false); })
      .catch(e => { setErr(e.message); setLoading(false); });
  }, []);

  // Build charts after data loads
  useEffect(() => {
    if (!data || loading) return;

    // Bookings chart
    if (bookingsChartRef.current && data.monthly_bookings?.length) {
      if (bookingsChart.current) bookingsChart.current.destroy();
      const sorted = [...data.monthly_bookings].reverse().slice(-12);
      bookingsChart.current = new Chart(bookingsChartRef.current, {
        type: 'bar',
        data: {
          labels: sorted.map(r => r.month?.slice(0,7) || ''),
          datasets: [
            { label:'Completed', data: sorted.map(r=>r.completed||0),  backgroundColor:'rgba(74,222,128,0.7)',  borderRadius:4 },
            { label:'Cancelled', data: sorted.map(r=>r.cancelled||0), backgroundColor:'rgba(248,113,113,0.5)', borderRadius:4 },
            { label:'Pending',   data: sorted.map(r=>(r.total_bookings||0)-(r.completed||0)-(r.cancelled||0)-(r.no_show||0)), backgroundColor:'rgba(251,191,36,0.5)', borderRadius:4 },
          ],
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { labels: { color:'#6B3050', font:{size:11} } } },
          scales: {
            x: { stacked:true, ticks:{color:'#A0709A',font:{size:10}}, grid:{color:'rgba(10,74,92,0.08)'} },
            y: { stacked:true, ticks:{color:'#A0709A',font:{size:10}}, grid:{color:'rgba(10,74,92,0.08)'} },
          },
        },
      });
    }

    // Revenue chart — estimated vs collected
    if (revenueChartRef.current && (data.revenue?.length || data.revenue_collected?.length)) {
      if (revenueChart.current) revenueChart.current.destroy();

      const estimatedByMonth = Object.fromEntries(
        (data.revenue || []).map(r => [r.month?.slice(0,7), r.total_price_from || 0])
      );
      const collectedByMonth = Object.fromEntries(
        (data.revenue_collected || []).map(r => [r.month, r.total_collected || 0])
      );
      const allMonths = [...new Set([
        ...(data.revenue || []).map(r => r.month?.slice(0,7)).filter(Boolean),
        ...(data.revenue_collected || []).map(r => r.month).filter(Boolean),
      ])].sort().slice(-12);

      revenueChart.current = new Chart(revenueChartRef.current, {
        type: 'line',
        data: {
          labels: allMonths,
          datasets: [
            {
              label: 'Estimated (R)',
              data: allMonths.map(m => estimatedByMonth[m] || 0),
              borderColor: 'rgba(236,72,153,0.55)',
              backgroundColor: 'rgba(236,72,153,0.06)',
              borderDash: [5, 4],
              fill: true, tension: 0.35, pointRadius: 3,
            },
            {
              label: 'Collected (R)',
              data: allMonths.map(m => collectedByMonth[m] || 0),
              borderColor: 'rgba(21,128,61,0.9)',
              backgroundColor: 'rgba(21,128,61,0.10)',
              fill: true, tension: 0.35, pointRadius: 4,
              pointBackgroundColor: 'rgba(21,128,61,1)',
            },
          ],
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { labels: { color:'#6B3050', font:{size:11} } } },
          scales: {
            x: { ticks:{color:'#A0709A',font:{size:10}}, grid:{color:'rgba(10,74,92,0.08)'} },
            y: { ticks:{color:'#A0709A',font:{size:10},callback:v=>`R${(v/1000).toFixed(0)}k`}, grid:{color:'rgba(10,74,92,0.08)'} },
          },
        },
      });
    }

    // Payment method breakdown — doughnut
    if (paymentChartRef.current && data.payment_methods) {
      if (paymentChart.current) paymentChart.current.destroy();
      const pm = data.payment_methods;
      const total = (pm.cash || 0) + (pm.card || 0) + (pm.medical_aid || 0);
      if (total > 0) {
        paymentChart.current = new Chart(paymentChartRef.current, {
          type: 'doughnut',
          data: {
            labels: ['Cash', 'Card / EFT', 'Medical aid'],
            datasets: [{
              data: [pm.cash || 0, pm.card || 0, pm.medical_aid || 0],
              backgroundColor: [
                'rgba(21,128,61,0.82)',
                'rgba(14,116,144,0.82)',
                'rgba(236,72,153,0.82)',
              ],
              borderWidth: 0,
              hoverOffset: 6,
            }],
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            cutout: '68%',
            plugins: {
              legend: { position:'bottom', labels:{ color:'#6B3050', font:{size:11}, padding:14 } },
              tooltip: { callbacks: { label: ctx => ` ${ctx.label}: ${ctx.raw} appt${ctx.raw !== 1 ? 's' : ''}` } },
            },
          },
        });
      }
    }

    return () => {
      bookingsChart.current?.destroy();
      revenueChart.current?.destroy();
      paymentChart.current?.destroy();
    };
  }, [data, loading]);

  if (loading) return (
    <div>
      <div className="eyebrow" style={{marginBottom:8}}>Analytics</div>
      <h2 style={{fontFamily:'Plus Jakarta Sans,sans-serif',fontSize:30,marginBottom:28}}>Practice Overview</h2>
      <div className="stat-grid">{[1,2,3,4].map(i => <div key={i} className="stat-card"><div className="skel"/><div className="skel" style={{width:'40%'}}/></div>)}</div>
    </div>
  );

  if (err) return <div className="alert alert-error">{err}</div>;

  // Demographics breakdown
  const demoByReferral = (data.demographics||[]).reduce((acc,p) => {
    const k = p.referral_source || 'unknown';
    acc[k] = (acc[k]||0) + 1;
    return acc;
  }, {});
  const demoBySuburb = (data.demographics||[]).reduce((acc,p) => {
    const k = p.suburb || 'unknown';
    acc[k] = (acc[k]||0) + 1;
    return acc;
  }, {});
  const demoByType = (data.demographics||[]).reduce((acc,p) => {
    const k = p.patient_type || 'unknown';
    acc[k] = (acc[k]||0) + 1;
    return acc;
  }, {});

  const totalPatients = data.demographics?.length || 0;

  const sortedRef   = Object.entries(demoByReferral).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const sortedSub   = Object.entries(demoBySuburb).sort((a,b)=>b[1]-a[1]).slice(0,10);

  const totalCollected = (data.revenue_collected || []).reduce((s, r) => s + (r.total_collected || 0), 0);
  const totalEstimated = (data.revenue || []).reduce((s, r) => s + (r.total_price_from || 0), 0);
  const overallRate    = totalEstimated > 0 ? Math.round(totalCollected / totalEstimated * 100) : null;
  const pmTotal        = (data.payment_methods?.cash || 0) + (data.payment_methods?.card || 0) + (data.payment_methods?.medical_aid || 0);

  // Last 6 months collection table (sorted ascending for readability)
  const collectionHistory = [...(data.revenue_collected || [])]
    .sort((a, b) => a.month.localeCompare(b.month))
    .slice(-6);

  return (
    <div>
      <div style={{marginBottom:28}}>
        <div className="eyebrow">Analytics</div>
        <h2 style={{fontFamily:'Plus Jakarta Sans,sans-serif',fontSize:30,marginTop:4}}>Practice <em>Overview</em></h2>
      </div>

      {/* KPIs */}
      <div className="stat-grid" style={{marginBottom:28}}>
        {[
          { label:'Total patients',    value: totalPatients.toLocaleString() },
          { label:'New vs returning',  value: `${Math.round((demoByType.new||0)/Math.max(totalPatients,1)*100)}%`, sub:'new patients' },
          { label:'Total collected',   value: fmtKPI(totalCollected), sub:'all recorded payments', color:'var(--green)' },
          { label:'Collection rate',   value: overallRate != null ? `${overallRate}%` : '—', sub:'of estimated revenue', color: overallRate != null && overallRate < 80 ? 'var(--amber)' : 'var(--green)' },
          { label:'Low stock items',   value: data.low_stock?.length || 0, danger: (data.low_stock?.length||0)>0, sub: (data.low_stock?.length||0)>0 ? 'need restocking' : 'all stocked' },
          { label:'Months tracked',    value: data.monthly_bookings?.length || 0, sub:'of booking history' },
        ].map(s => (
          <div className="stat-card" key={s.label}>
            <div className="stat-label">{s.label}</div>
            <div className="stat-value" style={{fontSize:22,fontWeight:700,whiteSpace:'nowrap',...(s.danger&&s.value>0?{color:'var(--amber)'}:{}), ...(s.color?{color:s.color}:{})}}>{s.value}</div>
            {s.sub && <div className="stat-sub">{s.sub}</div>}
          </div>
        ))}
      </div>

      {/* Booking volume + Revenue estimated vs collected */}
      <div className="two-col" style={{marginBottom:24}}>
        <div className="card">
          <div className="card-title">Booking volume (12 months)</div>
          <div className="chart-wrap">
            {data.monthly_bookings?.length ? <canvas ref={bookingsChartRef} /> : (
              <div className="empty" style={{paddingTop:40}}>No booking data yet.</div>
            )}
          </div>
        </div>
        <div className="card">
          <div className="card-title">Revenue — estimated vs collected</div>
          <div className="chart-wrap">
            {(data.revenue?.length || data.revenue_collected?.length) ? <canvas ref={revenueChartRef} /> : (
              <div className="empty" style={{paddingTop:40}}>No revenue data yet.</div>
            )}
          </div>
        </div>
      </div>

      {/* Payment breakdown + collection history */}
      <div className="two-col" style={{marginBottom:24}}>
        <div className="card">
          <div className="card-title">Payment method breakdown</div>
          {pmTotal > 0 ? (
            <>
              <div className="chart-wrap" style={{height:200}}>
                <canvas ref={paymentChartRef} />
              </div>
              <div style={{display:'flex',justifyContent:'center',gap:24,marginTop:12}}>
                {[
                  { label:'Cash',        val: data.payment_methods?.cash        || 0, color:'var(--green)' },
                  { label:'Card / EFT',  val: data.payment_methods?.card        || 0, color:'var(--teal)'  },
                  { label:'Medical aid', val: data.payment_methods?.medical_aid || 0, color:'var(--sage)'  },
                ].map(p => (
                  <div key={p.label} style={{textAlign:'center'}}>
                    <div style={{fontSize:18,fontFamily:'Plus Jakarta Sans,sans-serif',color:p.color,fontWeight:500}}>{p.val}</div>
                    <div style={{fontSize:10,letterSpacing:'0.1em',textTransform:'uppercase',color:'var(--muted)',marginTop:2}}>{p.label}</div>
                  </div>
                ))}
              </div>
            </>
          ) : (
            <div className="empty" style={{paddingTop:40}}>No payment data recorded yet.</div>
          )}
        </div>
        <div className="card">
          <div className="card-title">Monthly collection — last 6 months</div>
          {collectionHistory.length > 0 ? (
            <div className="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Month</th>
                    <th>Collected</th>
                    <th>Appointments</th>
                    <th>Cash</th>
                    <th>Card / EFT</th>
                    <th>Medical aid</th>
                  </tr>
                </thead>
                <tbody>
                  {collectionHistory.map(r => (
                    <tr key={r.month}>
                      <td className="td-main">{r.month ? new Date(r.month + '-01T12:00:00').toLocaleDateString('en-GB', {month:'short', year:'numeric'}) : '—'}</td>
                      <td style={{fontWeight:500,color:'var(--green)'}}>{fmtKPI(r.total_collected)}</td>
                      <td className="mono">{r.count}</td>
                      <td className="mono">{r.cash > 0 ? fmtKPI(r.cash) : '—'}</td>
                      <td className="mono">{r.card > 0 ? fmtKPI(r.card) : '—'}</td>
                      <td className="mono">{r.medical_aid > 0 ? fmtKPI(r.medical_aid) : '—'}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          ) : (
            <div className="empty">No payment data recorded yet.</div>
          )}
        </div>
      </div>

      {/* Demographics */}
      <div className="two-col" style={{marginBottom:24}}>
        <div className="card">
          <div className="card-title">Referral sources — targeting insights</div>
          {!sortedRef.length ? <div className="empty">No demographic data yet.</div> : (
            <div>
              {sortedRef.map(([k,v]) => {
                const pct = Math.round(v/totalPatients*100);
                return (
                  <div key={k} style={{marginBottom:12}}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
                      <span style={{fontSize:13,textTransform:'capitalize'}}>{k.replace(/_/g,' ')}</span>
                      <span className="mono" style={{color:'var(--muted)'}}>{v} · {pct}%</span>
                    </div>
                    <div className="stock-bar">
                      <div className="stock-bar-fill stock-ok" style={{width:`${pct}%`,background:'var(--sage)'}} />
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
        <div className="card">
          <div className="card-title">Patient suburbs — geographic spread</div>
          {!sortedSub.length ? <div className="empty">No geographic data yet.</div> : (
            <div className="table-wrap">
              <table>
                <thead><tr><th>Suburb</th><th>Patients</th><th>Share</th></tr></thead>
                <tbody>
                  {sortedSub.map(([k,v]) => (
                    <tr key={k}>
                      <td className="td-main" style={{textTransform:'capitalize'}}>{k}</td>
                      <td>{v}</td>
                      <td className="mono">{Math.round(v/totalPatients*100)}%</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>
      </div>

      {/* Inventory variance */}
      {data.inventory_variance?.length > 0 && (
        <div className="card">
          <div className="card-title">Actual vs expected supply usage per procedure</div>
          <div className="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Supply item</th>
                  <th>Procedure</th>
                  <th>Avg used</th>
                  <th>Avg expected</th>
                  <th>Difference</th>
                  <th>Appointments</th>
                </tr>
              </thead>
              <tbody>
                {data.inventory_variance.map((row, i) => (
                  <tr key={i}>
                    <td className="td-main">{row.item_name}</td>
                    <td>{row.service_name}</td>
                    <td className="mono">{Number(row.avg_actual_qty||0).toFixed(1)}</td>
                    <td className="mono">{Number(row.avg_expected_qty||0).toFixed(1)}</td>
                    <td className="mono" style={{color: Number(row.avg_variance)<0?'var(--danger)':'var(--green)'}}>
                      {Number(row.avg_variance||0).toFixed(2)}
                    </td>
                    <td className="mono">{row.data_points}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}


/* ════════════════════════════════════════════════════════════
   INVENTORY PAGE
════════════════════════════════════════════════════════════ */
function InventoryPage() {
  const [items,    setItems]    = useState([]);
  const [loading,  setLoading]  = useState(true);
  const [selected, setSelected] = useState(null);
  const [detail,   setDetail]   = useState(null);
  const [showAdd,  setShowAdd]  = useState(false);
  const [showTx,   setShowTx]   = useState(null); // item to record transaction for
  const [filter,   setFilter]   = useState('');

  const load = () => {
    setLoading(true);
    api('/api/inventory')
      .then(d => { setItems(d.items || []); setLoading(false); })
      .catch(() => setLoading(false));
  };

  useEffect(() => { load(); }, []);

  const openItem = async (item) => {
    setSelected(item); setDetail(null);
    const d = await api(`/api/inventory?item_id=${item.id}`).catch(()=>null);
    if (d) setDetail(d);
  };

  const filtered = useMemo(() => {
    if (!filter.trim()) return items;
    const q = filter.toLowerCase();
    return items.filter(i => i.name.toLowerCase().includes(q) || i.category?.toLowerCase().includes(q));
  }, [items, filter]);

  const stockClass = (item) => {
    if (!item.reorder_threshold) return '';
    if (item.current_qty === 0) return 'stock-empty';
    if (item.current_qty < item.reorder_threshold) return 'stock-low';
    return 'stock-ok';
  };

  return (
    <div>
      <div style={{marginBottom:24,display:'flex',justifyContent:'space-between',alignItems:'flex-end'}}>
        <div>
          <div className="eyebrow">Supply chain</div>
          <h2 style={{fontFamily:'Plus Jakarta Sans,sans-serif',fontSize:30,marginTop:4}}>Inventory</h2>
        </div>
        <button className="btn btn-primary btn-sm" onClick={() => setShowAdd(true)}>+ Add item</button>
      </div>

      <div className="search-bar">
        <input type="search" placeholder="Filter by name or category…" value={filter} onChange={e=>setFilter(e.target.value)} />
        <span className="mono" style={{color:'var(--muted)'}}>{filtered.length} items</span>
      </div>

      <div className="card" style={{padding:0,overflow:'hidden'}}>
        <div className="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Item</th>
                <th>Category</th>
                <th>In stock</th>
                <th>Level</th>
                <th>Reorder when below</th>
                <th>Cost per unit</th>
                <th>Supplier</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              {loading ? <SkeletonRows n={8} /> : filtered.length === 0 ? (
                <tr><td colSpan="8"><div className="empty"><div className="empty-icon">📦</div>
                  <div style={{marginBottom:8}}>No items found.</div>
                  <div style={{fontSize:12,color:'var(--muted)'}}>Try a different search, or use the "Add item" button to add something new.</div>
                </div></td></tr>
              ) : filtered.map(item => {
                const cls = stockClass(item);
                const pct = item.reorder_threshold
                  ? Math.min(100, (item.current_qty / (item.reorder_threshold * 2)) * 100) : 80;
                return (
                  <tr key={item.id} style={{cursor:'pointer'}} onClick={()=>openItem(item)}>
                    <td className="td-main">{item.name}</td>
                    <td><span className="tag">{item.category}</span></td>
                    <td className={`mono td-main`} style={{color: cls==='stock-empty'?'var(--danger)':cls==='stock-low'?'var(--amber)':''}}>
                      {item.current_qty} {item.unit}
                    </td>
                    <td style={{minWidth:100}}>
                      <div className="stock-bar" style={{margin:0}}>
                        <div className={`stock-bar-fill ${cls||'stock-ok'}`} style={{width:`${Math.max(pct,3)}%`}} />
                      </div>
                    </td>
                    <td className="mono">{item.reorder_threshold ?? '—'}</td>
                    <td>{item.cost_per_unit ? fmtMoney(item.cost_per_unit) : '—'}</td>
                    <td style={{color:'var(--muted)'}}>{item.supplier || '—'}</td>
                    <td>
                      <button className="btn btn-ghost btn-sm" style={{marginRight:6}}
                        onClick={e=>{e.stopPropagation();setShowTx(item);}}>Update stock</button>
                      <button className="btn btn-ghost btn-sm" onClick={e=>{e.stopPropagation();openItem(item);}}>View</button>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      {/* Item detail modal */}
      {selected && (
        <div className="overlay" onClick={()=>{setSelected(null);setDetail(null);}}>
          <div className="modal" style={{maxWidth:620}} onClick={e=>e.stopPropagation()}>
            <h3 className="modal-title">{selected.name}</h3>
            <p className="modal-sub">{selected.category} · {selected.unit}</p>
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:20}}>
              {[
                ['Current stock',          `${selected.current_qty} ${selected.unit}`],
                ['Reorder when below',    selected.reorder_threshold ?? '—'],
                ['Standard reorder qty',  selected.reorder_qty ?? '—'],
                ['Cost per unit',         selected.cost_per_unit ? fmtMoney(selected.cost_per_unit) : '—'],
                ['Supplier',        selected.supplier || '—'],
                ['Storage',         selected.storage_location || '—'],
              ].map(([l,v]) => (
                <div key={l}>
                  <div style={{fontSize:10,letterSpacing:'0.12em',textTransform:'uppercase',color:'var(--muted)',marginBottom:3}}>{l}</div>
                  <div style={{fontSize:13}}>{v}</div>
                </div>
              ))}
            </div>
            {detail?.transactions?.length > 0 && (
              <>
                <div className="eyebrow" style={{marginBottom:10}}>Recent transactions</div>
                <div className="scroll-area" style={{maxHeight:240}}>
                  <table>
                    <thead><tr><th>Date</th><th>Type</th><th>Qty</th><th>After</th><th>Reason</th></tr></thead>
                    <tbody>
                      {detail.transactions.map(tx => (
                        <tr key={tx.id}>
                          <td className="mono">{fmtDateShort(tx.created_at?.slice(0,10))}</td>
                          <td><span className="tag">{{ in:'Received', out:'Used', adjustment:'Correction', write_off:'Discarded', return:'Returned' }[tx.type] || tx.type}</span></td>
                          <td className="mono" style={{color:tx.qty<0?'var(--danger)':'var(--green)'}}>
                            {tx.qty>0?'+':''}{tx.qty}
                          </td>
                          <td className="mono">{tx.qty_after}</td>
                          <td style={{color:'var(--muted)',fontSize:12}}>{tx.reason||'—'}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </>
            )}
            <div className="modal-foot">
              <button className="btn btn-ghost btn-sm" onClick={()=>setShowTx(selected)}>Update stock level</button>
              <button className="btn btn-ghost btn-sm" onClick={()=>{setSelected(null);setDetail(null);}}>Close</button>
            </div>
          </div>
        </div>
      )}

      {/* Record transaction modal */}
      {showTx && <TransactionModal item={showTx} onClose={()=>setShowTx(null)} onDone={()=>{setShowTx(null);load();}} />}

      {/* Add item modal */}
      {showAdd && <AddItemModal onClose={()=>setShowAdd(false)} onDone={()=>{setShowAdd(false);load();}} />}
    </div>
  );
}

function TransactionModal({ item, onClose, onDone }) {
  const [type,   setType]   = useState('in');
  const [qty,    setQty]    = useState('');
  const [reason, setReason] = useState('');
  const [saving, setSaving] = useState(false);
  const [err,    setErr]    = useState('');

  const submit = async (ev) => {
    ev.preventDefault();
    if (!qty || Number(qty) <= 0) return setErr('Enter a positive quantity');
    setSaving(true); setErr('');
    try {
      await api('/api/inventory', {
        method: 'POST',
        body: JSON.stringify({ item_id: item.id, type, qty: Number(qty), reason: reason.trim() || null }),
      });
      showToast('Stock level updated');
      onDone();
    } catch(e) { setErr(e.message); setSaving(false); }
  };

  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal" style={{maxWidth:400}} onClick={e=>e.stopPropagation()}>
        <h3 className="modal-title">Update stock level</h3>
        <p className="modal-sub">{item.name} · currently {item.current_qty} {item.unit} in stock</p>
        <form onSubmit={submit} style={{display:'flex',flexDirection:'column',gap:16}}>
          <div className="field">
            <label>Transaction type</label>
            <select value={type} onChange={e=>setType(e.target.value)}>
              <option value="in">Received — stock came in</option>
              <option value="out">Used — stock went out</option>
              <option value="adjustment">Correction — counted and correcting stock level</option>
              <option value="write_off">Discarded — expired or damaged</option>
              <option value="return">Returned to supplier</option>
            </select>
          </div>
          <div className="field">
            <label>Quantity</label>
            <input type="number" min="0.01" step="any" value={qty} onChange={e=>setQty(e.target.value)} placeholder="e.g. 50" required />
          </div>
          <div className="field">
            <label>Reason / notes (optional)</label>
            <input value={reason} onChange={e=>setReason(e.target.value)} placeholder="e.g. weekly restock" />
          </div>
          {err && <div className="alert alert-error">{err}</div>}
          <div className="modal-foot" style={{marginTop:0}}>
            <button type="button" className="btn btn-ghost btn-sm" onClick={onClose}>Cancel</button>
            <button type="submit" className="btn btn-primary btn-sm" disabled={saving}>{saving?'Saving…':'Record'}</button>
          </div>
        </form>
      </div>
    </div>
  );
}

function AddItemModal({ onClose, onDone }) {
  const [form,   setForm]   = useState({ name:'', category:'consumable', unit:'', reorder_threshold:'', cost_per_unit:'', supplier:'' });
  const [saving, setSaving] = useState(false);
  const [err,    setErr]    = useState('');
  const set = p => setForm(f=>({...f,...p}));

  const submit = async (ev) => {
    ev.preventDefault();
    if (!form.name.trim() || !form.unit.trim()) return setErr('Name and unit are required');
    setSaving(true); setErr('');
    try {
      await api('/api/inventory', {
        method: 'POST',
        body: JSON.stringify({ _action:'create_item', ...form,
          reorder_threshold: form.reorder_threshold ? Number(form.reorder_threshold) : null,
          cost_per_unit: form.cost_per_unit ? Number(form.cost_per_unit) : null,
        }),
      });
      onDone();
    } catch(e) { setErr(e.message); setSaving(false); }
  };

  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal" style={{maxWidth:500}} onClick={e=>e.stopPropagation()}>
        <h3 className="modal-title">Add inventory item</h3>
        <p className="modal-sub" style={{marginBottom:20}}>New item starts at zero stock. Record a stock-in transaction after creating.</p>
        <form onSubmit={submit} style={{display:'flex',flexDirection:'column',gap:14}}>
          <div className="form-cols">
            <div className="field"><label>Item name *</label>
              <input value={form.name} onChange={e=>set({name:e.target.value})} placeholder="Latex gloves (M)" required /></div>
            <div className="field"><label>Unit *</label>
              <input value={form.unit} onChange={e=>set({unit:e.target.value})} placeholder="box / each / ml" required /></div>
          </div>
          <div className="form-cols">
            <div className="field"><label>Category</label>
              <select value={form.category} onChange={e=>set({category:e.target.value})}>
                <option value="consumable">Consumable</option>
                <option value="medication">Medication</option>
                <option value="equipment">Equipment</option>
                <option value="material">Material</option>
                <option value="PPE">PPE</option>
                <option value="other">Other</option>
              </select></div>
            <div className="field"><label>Reorder threshold</label>
              <input type="number" min="0" value={form.reorder_threshold} onChange={e=>set({reorder_threshold:e.target.value})} placeholder="e.g. 10" /></div>
          </div>
          <div className="form-cols">
            <div className="field"><label>Cost per unit (R)</label>
              <input type="number" min="0" step="0.01" value={form.cost_per_unit} onChange={e=>set({cost_per_unit:e.target.value})} placeholder="0.00" /></div>
            <div className="field"><label>Supplier</label>
              <input value={form.supplier} onChange={e=>set({supplier:e.target.value})} placeholder="Dental supply co." /></div>
          </div>
          {err && <div className="alert alert-error">{err}</div>}
          <div className="modal-foot" style={{marginTop:0}}>
            <button type="button" className="btn btn-ghost btn-sm" onClick={onClose}>Cancel</button>
            <button type="submit" className="btn btn-primary btn-sm" disabled={saving}>{saving?'Saving…':'Add item'}</button>
          </div>
        </form>
      </div>
    </div>
  );
}


/* ════════════════════════════════════════════════════════════
   REVENUE PAGE
════════════════════════════════════════════════════════════ */
function RevenuePage() {
  const now = new Date();
  const [year,    setYear]    = useState(now.getFullYear());
  const [month,   setMonth]   = useState(now.getMonth() + 1);
  const [data,    setData]    = useState(null);
  const [loading, setLoading] = useState(true);
  const [payAppt, setPayAppt] = useState(null);

  const monthStr = `${year}-${String(month).padStart(2,'0')}`;

  const load = () => {
    setLoading(true);
    api(`/api/revenue?month=${monthStr}`)
      .then(d => { setData(d); setLoading(false); })
      .catch(() => setLoading(false));
  };

  useEffect(() => { load(); }, [monthStr]);

  const prevMonth = () => {
    if (month === 1) { setYear(y => y - 1); setMonth(12); }
    else setMonth(m => m - 1);
  };
  const nextMonth = () => {
    if (month === 12) { setYear(y => y + 1); setMonth(1); }
    else setMonth(m => m + 1);
  };

  const MONTH_NAMES = ['January','February','March','April','May','June',
                       'July','August','September','October','November','December'];

  const pmLabel = (pm) => ({ cash:'Cash', card:'Card', eft:'EFT', medical_aid:'Medical aid', other:'Other' }[pm] || (pm || '—'));
  const pmColor = (pm) => ({ cash:'var(--green)', card:'var(--teal)', eft:'var(--teal)', medical_aid:'var(--sage)', other:'var(--muted)' }[pm] || 'var(--muted)');

  const { appointments = [], plan_sessions = [], summary = {} } = data || {};

  return (
    <div>
      {/* Header */}
      <div style={{marginBottom:24,display:'flex',justifyContent:'space-between',alignItems:'flex-end'}}>
        <div>
          <div className="eyebrow">Financials</div>
          <h2 style={{fontFamily:'Plus Jakarta Sans,sans-serif',fontSize:30,marginTop:4}}>Revenue</h2>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <button className="btn btn-ghost btn-sm" onClick={prevMonth} style={{fontSize:18,lineHeight:1,padding:'4px 10px'}}>‹</button>
          <span style={{fontSize:14,fontWeight:500,minWidth:110,textAlign:'center'}}>
            {MONTH_NAMES[month-1]} {year}
          </span>
          <button className="btn btn-ghost btn-sm" onClick={nextMonth} style={{fontSize:18,lineHeight:1,padding:'4px 10px'}}>›</button>
        </div>
      </div>

      {/* KPI cards */}
      <div className="stat-grid" style={{marginBottom:24}}>
        {[
          { label:'Estimated revenue', value: loading?'…':fmtKPI(summary.estimated_revenue), sub:`${summary.total_appointments||0} billable appointments` },
          { label:'Collected',         value: loading?'…':fmtKPI(summary.amount_collected),  color:'var(--green)' },
          { label:'Outstanding',       value: loading?'…':fmtKPI(summary.amount_outstanding), color: (summary.amount_outstanding||0)>0?'var(--danger)':'var(--green)' },
          { label:'Inventory cost',    value: loading?'…':fmtKPI(summary.inventory_cost),    color:'var(--danger)' },
          { label:'Net revenue',       value: loading?'…':fmtKPI(summary.net_revenue),       color: (summary.net_revenue||0)>=0?'var(--green)':'var(--danger)' },
        ].map(k => (
          <div className="stat-card" key={k.label}>
            <div className="stat-label">{k.label}</div>
            <div className="stat-value" style={{fontSize:22,fontWeight:700,whiteSpace:'nowrap',color:k.color||'var(--ink)'}}>{k.value}</div>
            {k.sub && <div className="stat-sub">{k.sub}</div>}
          </div>
        ))}
      </div>

      {/* Appointments table */}
      <div className="card" style={{padding:0,overflow:'hidden'}}>
        <div className="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>Patient</th>
                <th>Service</th>
                <th>Estimated</th>
                <th>Supply cost</th>
                <th>Payment method</th>
                <th>Amount paid</th>
                <th>Payment status</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              {loading ? <SkeletonRows n={6} /> : appointments.length === 0 ? (
                <tr><td colSpan="9">
                  <div className="empty">
                    <div className="empty-icon">💳</div>
                    No billable appointments in {MONTH_NAMES[month-1]} {year}.
                  </div>
                </td></tr>
              ) : appointments.map(a => (
                <tr key={a.id}>
                  <td>{fmtDateShort(a.appointment_date)}</td>
                  <td className="td-main">{a.patient?.first_name} {a.patient?.last_name}</td>
                  <td>{a.service_name || '—'}</td>
                  <td>{a.price_from ? fmtMoney(a.price_from) : '—'}</td>
                  <td>
                    {a.inventory_cost > 0
                      ? <span title={a.actuals_recorded ? 'Based on actual supplies used' : 'Estimated — based on standard template for this procedure'}>
                          {fmtMoney(a.inventory_cost)}
                          {!a.actuals_recorded && <span style={{fontSize:9,color:'var(--muted)',marginLeft:3}}>estimate</span>}
                        </span>
                      : <span style={{color:'var(--muted)'}}>—</span>}
                  </td>
                  <td>
                    {a.payment_method
                      ? <span style={{fontSize:11,fontWeight:600,color:pmColor(a.payment_method)}}>{pmLabel(a.payment_method)}</span>
                      : <span style={{color:'var(--muted)'}}>—</span>}
                  </td>
                  <td className="mono">
                    {a.amount_paid != null ? fmtMoney(a.amount_paid) : <span style={{color:'var(--muted)'}}>—</span>}
                  </td>
                  <td>
                    {a.payment_method === 'medical_aid' && a.medical_aid_paid && a.amount_paid != null
                      ? <span style={{fontSize:11,fontWeight:600,color:'var(--green)'}}>Paid</span>
                      : a.payment_method === 'medical_aid'
                        ? <MedAidToggle appt={a} onDone={load} />
                        : a.amount_paid != null
                          ? <span style={{fontSize:11,fontWeight:600,color:'var(--green)'}}>Paid</span>
                          : <span style={{fontSize:11,color:'var(--amber)'}}>Not recorded</span>}
                  </td>
                  <td>
                    <button className="btn btn-ghost btn-sm" onClick={() => setPayAppt(a)}>
                      {a.payment_method ? 'Edit payment' : 'Add payment'}
                    </button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {/* Treatment Plan Session Payments */}
      {(plan_sessions.length > 0 || loading) && (
        <div style={{marginTop:28}}>
          <div style={{fontFamily:'Plus Jakarta Sans,sans-serif',fontSize:16,fontWeight:700,marginBottom:14}}>Treatment Plan Session Payments</div>
          <div className="card" style={{padding:0,overflow:'hidden'}}>
            <div className="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Date</th>
                    <th>Patient</th>
                    <th>Plan</th>
                    <th>Session</th>
                    <th>Charged</th>
                    <th>Paid</th>
                    <th>Method</th>
                    <th>Status</th>
                  </tr>
                </thead>
                <tbody>
                  {loading ? <SkeletonRows n={3} /> : plan_sessions.length === 0 ? (
                    <tr><td colSpan="8">
                      <div className="empty">No treatment plan session payments in {MONTH_NAMES[month-1]} {year}.</div>
                    </td></tr>
                  ) : plan_sessions.map(s => (
                    <tr key={s.id}>
                      <td>{s.session_date ? fmtDateShort(s.session_date) : '—'}</td>
                      <td className="td-main">{s.treatment_plans?.patients?.first_name} {s.treatment_plans?.patients?.last_name}</td>
                      <td>{s.treatment_plans?.title || '—'}</td>
                      <td style={{color:'var(--muted)'}}>Session {s.session_number}</td>
                      <td className="mono">{s.amount_charged != null ? fmtMoney(s.amount_charged) : '—'}</td>
                      <td className="mono">{s.amount_paid != null ? fmtMoney(s.amount_paid) : '—'}</td>
                      <td>
                        {s.payment_method
                          ? <span style={{fontSize:11,fontWeight:600,color:pmColor(s.payment_method)}}>{pmLabel(s.payment_method)}</span>
                          : <span style={{color:'var(--muted)'}}>—</span>}
                      </td>
                      <td>
                        {s.amount_paid > 0
                          ? <span style={{fontSize:11,fontWeight:600,color:'var(--green)'}}>Paid</span>
                          : <span style={{fontSize:11,color:'var(--amber)'}}>Not collected</span>}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      )}

      {payAppt && (
        <PaymentModal
          appt={payAppt}
          onClose={() => setPayAppt(null)}
          onDone={() => { setPayAppt(null); load(); }}
        />
      )}
    </div>
  );
}

function MedAidToggle({ appt, onDone }) {
  const [saving, setSaving] = useState(false);
  const [err,    setErr]    = useState(null);
  const toggle = async () => {
    setSaving(true); setErr(null);
    try {
      await api(`/api/revenue?id=${appt.id}`, {
        method: 'PATCH',
        body: JSON.stringify({ medical_aid_paid: !appt.medical_aid_paid }),
      });
      onDone();
    } catch(e) { setSaving(false); setErr(e.message || 'Update failed'); }
  };
  return (
    <div>
      <button
        className={`btn btn-sm ${err ? 'btn-danger' : appt.medical_aid_paid ? 'btn-primary' : 'btn-ghost'}`}
        style={{fontSize:11}}
        onClick={toggle}
        disabled={saving}
        title={err || undefined}
      >
        {saving ? '…' : err ? 'Retry' : appt.medical_aid_paid ? 'Paid out' : 'Awaiting payment'}
      </button>
      {err && <div style={{fontSize:10,color:'var(--danger)',marginTop:3,maxWidth:120}}>{err}</div>}
    </div>
  );
}

function PaymentModal({ appt, onClose, onDone }) {
  // Simplified: MA is treated the same as cash/EFT — just record what was received.
  // Split-stream fields (ma_amount_charged, ma_amount_received, etc.) preserved in DB
  // for future Healthbridge integration but not used in this UI.
  const isMA = !!appt.patient?.has_medical_aid;
  const schemeName = appt.patient?.medical_aid_name;

  const [form, setForm] = useState({
    payment_method: appt.payment_method || (isMA ? 'medical_aid' : ''),
    amount_paid:    appt.amount_paid != null ? String(appt.amount_paid) : '',
    payment_notes:  appt.payment_notes || '',
  });
  const [saving, setSaving] = useState(false);
  const [err,    setErr]    = useState('');
  const set = p => setForm(f => ({...f,...p}));

  const submit = async ev => {
    ev.preventDefault();
    setSaving(true); setErr('');
    try {
      await api(`/api/revenue?id=${appt.id}`, {
        method: 'PATCH',
        body: JSON.stringify({
          payment_method: form.payment_method || null,
          amount_paid:    form.amount_paid !== '' ? Number(form.amount_paid) : null,
          payment_notes:  form.payment_notes,
        }),
      });
      showToast('Payment recorded');
      onDone();
    } catch(e) { setErr(e.message); setSaving(false); }
  };

  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal" style={{maxWidth:420}} onClick={e=>e.stopPropagation()}>
        <h3 className="modal-title">Record payment</h3>
        <p className="modal-sub">{appt.patient?.first_name} {appt.patient?.last_name} · {appt.service_name} · {fmtDateShort(appt.appointment_date)}</p>
        {isMA && schemeName && (
          <div style={{display:'flex',alignItems:'center',gap:8,padding:'8px 12px',background:'rgba(10,74,92,0.05)',border:'1px solid var(--border)',borderRadius:8,marginBottom:16,fontSize:12,color:'var(--ink-soft)'}}>
            <span className="material-symbols-outlined" style={{fontSize:14,color:'var(--sage)'}}>health_and_safety</span>
            Medical aid patient · <strong>{schemeName}</strong>
          </div>
        )}
        <form onSubmit={submit} style={{display:'flex',flexDirection:'column',gap:0,marginTop:isMA && schemeName ? 0 : 20}}>
          <div style={{display:'flex',flexDirection:'column',gap:14,marginBottom:12}}>
            <div className="field">
              <label>Payment method</label>
              <select value={form.payment_method} onChange={e=>set({payment_method:e.target.value})}>
                <option value="">Select method…</option>
                <option value="cash">Cash</option>
                <option value="card">Bank card</option>
                <option value="eft">EFT</option>
                <option value="medical_aid">Medical aid</option>
              </select>
            </div>
            <div className="field">
              <label>Amount received (R){appt.price_from ? ` · estimated ${fmtMoney(appt.price_from)}` : ''}</label>
              <input type="number" min="0" step="0.01" value={form.amount_paid} onChange={e=>set({amount_paid:e.target.value})} placeholder={appt.price_from ? String(appt.price_from) : '0.00'} />
            </div>
          </div>
          <div className="field" style={{marginBottom:14}}>
            <label>Notes (optional)</label>
            <input value={form.payment_notes} onChange={e=>set({payment_notes:e.target.value})} placeholder="e.g. partial payment, claim ref…" />
          </div>
          {err && <div className="alert alert-error" style={{marginBottom:8}}>{err}</div>}
          <div className="modal-foot" style={{marginTop:4}}>
            <button type="button" className="btn btn-ghost btn-sm" onClick={onClose}>Cancel</button>
            <button type="submit" className="btn btn-primary btn-sm" disabled={saving}>{saving ? 'Saving…' : 'Save payment'}</button>
          </div>
        </form>
      </div>
    </div>
  );
}
