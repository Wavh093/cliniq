<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Leave a Review — Kliniq</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.26.10/babel.min.js"></script>
<style>
  :root {
    --sage: #0a4a5c; --sage-deep: #072e3a; --amber: #f59e0b;
    --ink: #0d2d3e; --ink-soft: #2c5f70; --muted: #4a8090;
    --bg: #f7f0e6; --bg-3: #e8f4f7; --card: #ffffff;
    --border: rgba(10,74,92,0.14); --green: #16a34a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { min-height: 100%; background: var(--bg); color: var(--ink);
    font-family: 'DM Sans', system-ui, sans-serif; font-size: 16px; line-height: 1.5;
    -webkit-font-smoothing: antialiased; }

  .wrap { max-width: 560px; margin: 0 auto; padding: 28px 20px 60px; }

  .header { text-align: center; margin-bottom: 28px; }
  .logo { display: inline-flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .logo-circle { width: 44px; height: 44px; border-radius: 50%; background: var(--bg-3);
    display: flex; align-items: center; justify-content: center; font-size: 22px; }
  .logo-name { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 19px;
    font-weight: 700; color: var(--sage); }
  .header h1 { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 26px;
    font-weight: 700; margin-bottom: 6px; }
  .header p { color: var(--muted); font-size: 14px; }

  .card { background: var(--card); border-radius: 20px; padding: 28px;
    box-shadow: 0 4px 24px rgba(10,74,92,0.06); }

  /* Star rating */
  .stars { display: flex; justify-content: center; gap: 8px; margin: 8px 0 4px; }
  .star { font-size: 48px; cursor: pointer; transition: transform .1s;
    line-height: 1; user-select: none; -webkit-user-select: none; }
  .star:hover { transform: scale(1.15); }
  .star.filled { color: var(--amber); }
  .star.empty  { color: rgba(10,74,92,0.12); }
  .star-label { text-align: center; font-size: 14px; font-weight: 600;
    color: var(--sage); min-height: 22px; margin-bottom: 16px; }

  /* Fields */
  .section-label { font-size: 12px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 10px; margin-top: 20px; }
  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  .field:last-child { margin-bottom: 0; }
  label { font-size: 13px; font-weight: 600; color: var(--ink-soft); }
  input, select, textarea { width: 100%; padding: 13px 14px; border-radius: 12px;
    border: 1.5px solid var(--border); background: var(--bg);
    font-family: inherit; font-size: 15px; color: var(--ink);
    outline: none; transition: border-color .15s; -webkit-appearance: none; resize: vertical; }
  input:focus, select:focus, textarea:focus { border-color: var(--sage); background: #fff; }
  input::placeholder, textarea::placeholder { color: var(--muted); }
  textarea { min-height: 110px; }
  .char-count { font-size: 11px; color: var(--muted); text-align: right; margin-top: 3px; }
  .char-count.near { color: var(--amber); }

  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 480px) { .row { grid-template-columns: 1fr; } .card { padding: 20px 16px; } .star { font-size: 40px; } }

  /* Recommend toggle */
  .rec-row { display: flex; gap: 10px; }
  .rec-btn { flex: 1; padding: 13px; border-radius: 12px; font-size: 14px; font-weight: 600;
    border: 2px solid var(--border); background: var(--bg); color: var(--muted);
    cursor: pointer; transition: all .15s; text-align: center; }
  .rec-btn.yes.sel { border-color: var(--green); background: rgba(22,163,74,0.08); color: var(--green); }
  .rec-btn.no.sel  { border-color: rgba(10,74,92,0.4); background: rgba(10,74,92,0.06); color: var(--sage); }
  .rec-btn:hover:not(.sel) { border-color: var(--sage); color: var(--sage); }

  /* Submit */
  .submit-btn { width: 100%; padding: 16px; border-radius: 9999px; font-family: inherit;
    font-size: 16px; font-weight: 700; border: none; cursor: pointer; margin-top: 24px;
    background: var(--sage); color: #fff; transition: all .15s; }
  .submit-btn:hover:not(:disabled) { background: var(--sage-deep); transform: translateY(-1px); }
  .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .alert-error { padding: 12px 14px; border-radius: 10px; font-size: 13px;
    background: rgba(186,26,26,0.06); border: 1px solid rgba(186,26,26,0.25);
    color: #ba1a1a; margin-top: 14px; }

  /* Success */
  .success { text-align: center; padding: 12px 0 4px; }
  .success-stars { font-size: 32px; letter-spacing: 4px; margin-bottom: 16px; }
  .success h2 { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 26px;
    font-weight: 800; margin-bottom: 10px; }
  .success p { color: var(--muted); font-size: 15px; line-height: 1.6;
    max-width: 380px; margin: 0 auto; }
  .google-btn { display: block; margin: 24px auto 0; padding: 14px 28px;
    border-radius: 9999px; background: #fff; border: 2px solid rgba(10,74,92,0.2);
    font-family: inherit; font-size: 15px; font-weight: 600; color: var(--ink);
    cursor: pointer; text-decoration: none; transition: all .15s; text-align: center; }
  .google-btn:hover { border-color: var(--sage); color: var(--sage); }
  .done-link { display: block; text-align: center; margin-top: 16px;
    font-size: 13px; color: var(--muted); cursor: pointer; text-decoration: underline; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo } = React;

const STAR_LABELS = { 1:'Poor', 2:'Below average', 3:'Good', 4:'Very good', 5:'Excellent!' };
const TREATMENTS = [
  'General check-up / cleaning',
  'Tooth filling',
  'Tooth extraction',
  'Root canal treatment',
  'Teeth whitening',
  'Dental crown or bridge',
  'Braces / orthodontics',
  'Dental implant',
  'Dentures',
  'Emergency treatment',
  'Children\'s dentistry',
  'Other',
];
const GOOGLE_URL = 'https://g.page/r/OH-Dental-Studio-Krugersdorp/review';

function StarRating({ value, onChange, hover, onHover, onLeave }) {
  return (
    <div className="stars" role="radiogroup" aria-label="Star rating">
      {[1,2,3,4,5].map(n => (
        <button key={n}
          type="button"
          role="radio"
          aria-checked={value === n}
          aria-label={`Rate ${n} star${n !== 1 ? 's' : ''}`}
          className={`star ${(hover || value) >= n ? 'filled' : 'empty'}`}
          onClick={() => onChange(n)}
          onMouseEnter={() => onHover(n)}
          onMouseLeave={onLeave}
          onKeyDown={e => {
            if (e.key === 'ArrowRight' || e.key === 'ArrowUp') { e.preventDefault(); onChange(Math.min(5, n + 1)); }
            if (e.key === 'ArrowLeft'  || e.key === 'ArrowDown') { e.preventDefault(); onChange(Math.max(1, n - 1)); }
          }}
          style={{background:'none',border:'none',padding:0,cursor:'pointer'}}
        >★</button>
      ))}
    </div>
  );
}

function ReviewApp() {
  const [rating,    setRating]    = useState(0);
  const [hover,     setHover]     = useState(0);
  const [treatment, setTreatment] = useState('');
  const [text,      setText]      = useState('');
  const [recommend, setRecommend] = useState(null);
  const [name,      setName]      = useState('');
  const [email,     setEmail]     = useState('');
  const [saving,    setSaving]    = useState(false);
  const [error,     setError]     = useState('');
  const [done,      setDone]      = useState(false);

  const MAX = 1000;
  const nearLimit = text.length > MAX * 0.85;

  const submit = async () => {
    if (!rating) { setError('Please select a star rating to continue.'); return; }
    if (!text.trim() || text.trim().length < 5) {
      setError('Please write a few words about your visit.'); return;
    }
    setError('');
    setSaving(true);
    try {
      const res = await fetch('/api/reviews', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: name.trim() || null,
          email: email.trim() || null,
          rating,
          text: text.trim(),
          treatment: treatment || null,
          would_recommend: recommend,
        }),
      });
      const json = await res.json();
      if (!res.ok) throw new Error(json.error || 'Something went wrong. Please try again.');
      setDone(true);
    } catch (err) {
      setError(err.message);
    } finally {
      setSaving(false);
    }
  };

  if (done) {
    return (
      <div className="wrap">
        <div className="header">
          <div className="logo">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="40" height="40" style={{flexShrink:0}}>
              <circle cx="40" cy="40" r="40" fill="#0a4a5c"/>
              <path d="M40 57 C35 52 18 42 18 30 C18 24 23 19 29 19 C33 19 36.5 21.5 40 25.5 C43.5 21.5 47 19 51 19 C57 19 62 24 62 30 C62 42 45 52 40 57Z" fill="none" stroke="white" strokeWidth="2.2" strokeLinejoin="round" strokeLinecap="round"/>
              <line x1="40" y1="26.5" x2="40" y2="35.5" stroke="white" strokeWidth="2.2" strokeLinecap="round"/>
              <line x1="35.5" y1="31" x2="44.5" y2="31" stroke="white" strokeWidth="2.2" strokeLinecap="round"/>
              <path d="M14 62 L14 54 C14 51 16 49 18.5 49 L18.5 43 C18.5 41.5 20.5 41 21 42.5 L21.5 48.5 C22.5 48 24 49 24 50.5 L24 53.5 C54 54.5 53.5 57 54.5 59 L54.5 62 Z" fill="none" stroke="white" strokeWidth="1.8" strokeLinejoin="round" strokeLinecap="round"/>
              <path d="M66 62 L66 54 C66 51 64 49 61.5 49 L61.5 43 C61.5 41.5 59.5 41 59 42.5 L58.5 48.5 C57.5 48 56 49 56 50.5 L56 53.5 C54 54.5 53.5 57 54.5 59 L54.5 62 Z" fill="none" stroke="white" strokeWidth="1.8" strokeLinejoin="round" strokeLinecap="round"/>
            </svg>
            <span className="logo-name">Kliniq</span>
          </div>
        </div>
        <div className="card">
          <div className="success">
            <div className="success-stars">{'★'.repeat(rating)}</div>
            <h2>Thank you so much!</h2>
            <p>Your review means a lot to us. We read every single one and use them to keep improving for you and future patients.</p>
            <a href={GOOGLE_URL} target="_blank" rel="noopener" className="google-btn">
              🌐 &nbsp;Share on Google Reviews too →
            </a>
            <a href="/" className="done-link">Back to Kliniq</a>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="wrap">
      <div className="header">
        <div className="logo">
          <div className="logo-circle">🦷</div>
          <span className="logo-name">Kliniq</span>
        </div>
        <h1>How was your visit today?</h1>
        <p>Your feedback helps us keep smiles looking great.</p>
      </div>

      <div className="card">

        {/* Star rating */}
        <div style={{textAlign:'center',marginBottom:8}}>
          <div style={{fontSize:13,fontWeight:600,color:'var(--ink-soft)',marginBottom:10}}>
            Tap a star to rate your experience
          </div>
          <StarRating
            value={rating} onChange={setRating}
            hover={hover} onHover={setHover} onLeave={() => setHover(0)}
          />
          <div className="star-label">
            {hover ? STAR_LABELS[hover] : rating ? STAR_LABELS[rating] : ''}
          </div>
        </div>

        {/* Treatment */}
        <div className="field">
          <label>What did you come in for? <span style={{fontWeight:400,color:'var(--muted)'}}>(optional)</span></label>
          <select value={treatment} onChange={e => setTreatment(e.target.value)}
            style={{color: treatment ? 'var(--ink)' : 'var(--muted)'}}>
            <option value="">Select treatment type…</option>
            {TREATMENTS.map(t => <option key={t} value={t}>{t}</option>)}
          </select>
        </div>

        {/* Review text */}
        <div className="field">
          <label>Tell us about your visit <span style={{color:'var(--sage)',marginLeft:2}}>*</span></label>
          <textarea
            value={text}
            onChange={e => setText(e.target.value.slice(0, MAX))}
            placeholder="What did you think of the team, the experience, or anything else you would like to share…"
            rows={5}
          />
          <div className={`char-count${nearLimit ? ' near' : ''}`}>
            {text.length} / {MAX}
          </div>
        </div>

        {/* Recommend */}
        <div className="field">
          <label>Would you recommend us to a friend or family member?</label>
          <div className="rec-row">
            <button className={`rec-btn yes${recommend === true ? ' sel' : ''}`}
              onClick={() => setRecommend(recommend === true ? null : true)}>
              👍 &nbsp;Yes, I would
            </button>
            <button className={`rec-btn no${recommend === false ? ' sel' : ''}`}
              onClick={() => setRecommend(recommend === false ? null : false)}>
              Not sure / No
            </button>
          </div>
        </div>

        {/* Optional name / email */}
        <div className="section-label">About you (optional)</div>
        <div className="row">
          <div className="field">
            <label>Your name</label>
            <input value={name} onChange={e => setName(e.target.value)}
              placeholder="e.g. Thandi N." autoComplete="name" />
          </div>
          <div className="field">
            <label>Email address</label>
            <input type="email" value={email} onChange={e => setEmail(e.target.value)}
              placeholder="We will not share this" autoComplete="email" />
          </div>
        </div>

        {error && <div className="alert-error" role="alert">{error}</div>}

        <button className="submit-btn" onClick={submit} disabled={saving || !rating}>
          {saving ? 'Sending your review…' : 'Submit my review'}
        </button>

        <p style={{textAlign:'center',fontSize:12,color:'var(--muted)',marginTop:14}}>
          Your details are never shared or sold. Reviews may be displayed anonymously on our website.
        </p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<ReviewApp />);
</script>
</body>
</html>
