<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kliniq — Krugersdorp</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

  <!-- Tailwind config — Serene Blush design system -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#0a4a5c",
            "primary-container": "#b0e8f6",
            "on-primary": "#ffffff",
            "on-primary-fixed": "#0d2d3e",
            "primary-fixed": "#b0e8f6",
            "primary-fixed-dim": "#86d2e6",
            secondary: "#4a8090",
            "secondary-container": "#dff0f5",
            "on-secondary": "#ffffff",
            "on-secondary-fixed-variant": "#2c5f70",
            "secondary-fixed": "#e8f7f6",
            "secondary-fixed-dim": "#b8d8e4",
            tertiary: "#5a8090",
            "tertiary-fixed": "#ddeef5",
            "tertiary-fixed-dim": "#c1d8e2",
            "on-tertiary": "#ffffff",
            "on-tertiary-container": "#0d2d3e",
            surface: "#f7f0e6",
            "surface-bright": "#fdf8f2",
            "surface-cream": "#f7f0e6",
            "surface-dim": "#e8ddd0",
            "surface-variant": "#eddfd0",
            "surface-container": "#f0e8da",
            "surface-container-low": "#f7f0e6",
            "surface-container-high": "#e8ddd0",
            "surface-container-highest": "#dfd4c4",
            "surface-container-lowest": "#ffffff",
            "on-surface": "#0d2d3e",
            "on-surface-variant": "#3a5a65",
            background: "#f7f0e6",
            outline: "#4a8090",
            "outline-variant": "#b0d2dc",
            "soft-blush": "#e8f4f7",
            "deep-plum": "#0d2d3e",
            "inverse-surface": "#072e3a",
            "inverse-primary": "#86d2e6",
            error: "#ba1a1a",
            "error-container": "#ffdad6",
            "on-error": "#ffffff",
          },
          fontFamily: {
            headline: ['"Plus Jakarta Sans"', "system-ui", "sans-serif"],
            sans: ['"DM Sans"', "system-ui", "sans-serif"],
          },
          fontSize: {
            "headline-xl": ["48px", { lineHeight: "56px", letterSpacing: "-0.02em", fontWeight: "700" }],
            "headline-lg": ["32px", { lineHeight: "40px", letterSpacing: "-0.01em", fontWeight: "600" }],
            "headline-md": ["24px", { lineHeight: "32px", fontWeight: "600" }],
            "body-lg": ["18px", { lineHeight: "28px" }],
            "body-md": ["16px", { lineHeight: "24px" }],
            "label-sm": ["14px", { lineHeight: "20px", letterSpacing: "0.05em", fontWeight: "500" }],
          },
          spacing: {
            "section-gap": "120px",
            "margin-desktop": "64px",
            "margin-mobile": "20px",
            "container-max": "1280px",
            gutter: "24px",
          },
          borderRadius: {
            DEFAULT: "0.5rem",
            lg: "0.75rem",
            xl: "1rem",
            "2xl": "1.5rem",
            "3xl": "2rem",
            "4xl": "3rem",
            full: "9999px",
          },
        },
      },
    };
  </script>

  <style>
    body { background-color: #f7f0e6; color: #0d2d3e; -webkit-font-smoothing: antialiased; }
    * { box-sizing: border-box; }
    p { margin: 0; }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      display: inline-block;
      vertical-align: middle;
    }
    .glass-nav { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
    section[id] { scroll-margin-top: 80px; }

    /* ── Booking calendar ── */
    .booking-cal { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
    .cal-head { font-size: 10px; letter-spacing: 0.08em; color: #567a85; text-align: center; padding: 4px 0; text-transform: uppercase; }
    .cal-day {
      aspect-ratio: 1; border: 1px solid #b0d2dc; background: white; border-radius: 10px;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px;
      cursor: pointer; color: #0d2d3e; transition: all .15s ease; padding: 2px; font-family: inherit;
    }
    .cal-day:hover:not(:disabled) { border-color: #0a4a5c; background: #e8f4f7; }
    .cal-day:disabled { opacity: 0.3; cursor: not-allowed; }
    .cal-day.muted { background: transparent; border-color: transparent; cursor: default; }
    .cal-day.selected { background: #0a4a5c; color: white; border-color: #0a4a5c; }
    .cal-num { font-size: 14px; font-weight: 500; line-height: 1; }
    .cal-m { font-size: 9px; opacity: 0.6; }

    /* ── Time slots ── */
    .slot-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; margin-top: 14px; }
    @media (max-width: 480px) { .slot-grid { grid-template-columns: repeat(3, 1fr); } }
    .slot {
      padding: 10px 6px; border: 1px solid #b0d2dc; background: white;
      font-family: 'DM Sans', sans-serif; font-size: 13px; color: #0d2d3e;
      border-radius: 10px; cursor: pointer; transition: all .15s ease; text-align: center;
    }
    .slot:hover:not(:disabled) { border-color: #0a4a5c; background: #e8f4f7; }
    .slot:disabled { opacity: 0.35; cursor: not-allowed; text-decoration: line-through; }
    .slot.selected { background: #0a4a5c; color: white; border-color: #0a4a5c; }

    /* ── Mobile responsive helpers ── */
    @media (max-width: 640px) {
      .hero-stats { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 768px) {
      .booking-sidebar { display: none; }
    }
  </style>
</head>
<body class="font-sans text-on-surface selection:bg-primary/20">
  <div id="app"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel">

    /* ─── Data ─────────────────────────────────────────────────────────────── */

    const SERVICES = [
      { id: 'checkup',   name: 'Checkup & Clean',     meta: '45 min · From R650',          apiName: 'Checkup & Clean',    duration: 45 },
      { id: 'whitening', name: 'Teeth Whitening',      meta: '60 min · From R3 200',        apiName: 'Teeth Whitening',    duration: 60 },
      { id: 'veneers',   name: 'Porcelain Veneers',    meta: 'Consult · From R5 800/tooth', apiName: 'Porcelain Veneers',  duration: 90 },
      { id: 'crowns',    name: 'Crown & Bridge',        meta: 'Consult · 2 visits',          apiName: 'Crown & Bridge',     duration: 90 },
      { id: 'root',      name: 'Root Canal Therapy',   meta: '90 min · From R3 900',        apiName: 'Root Canal',         duration: 90 },
      { id: 'pediatric', name: 'Paediatric Dentistry', meta: '30 min · From R450',          apiName: 'Paediatric',         duration: 30 },
      { id: 'dentures',  name: 'Removable Dentures',   meta: 'Consult · Custom fit',        apiName: 'Removable Dentures', duration: 60 },
      { id: 'emergency', name: 'Emergency Visit',       meta: 'Same-day · See terms',        apiName: 'Emergency Visit',    duration: 30 },
    ];

    const PATIENT_TYPES = [
      { id: 'new',       name: 'New patient',       meta: 'First visit with us — welcome.' },
      { id: 'returning', name: 'Returning patient', meta: 'Already on file with Kliniq.' },
    ];

    const STEP_LABELS = ['Service', 'Patient', 'Date & time', 'Your details', 'Confirm'];

    /* ─── Helpers ──────────────────────────────────────────────────────────── */

    function toDateStr(d) {
      const pad = n => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
    }

    function formatDate(d) {
      if (!d) return '—';
      return d.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });
    }

    const PROFANITY = ['fuck','shit','cunt','bitch','asshole','bastard','dick','cock','pussy','wank','twat','piss','arse','poes','doos','naai'];
    function hasProfanity(str) {
      return PROFANITY.some(w => new RegExp('\\b' + w + '\\b', 'i').test(str));
    }
    function isValidPhone(p) { const d = p.replace(/\D/g,''); return d.length >= 9 && d.length <= 12; }
    function sanitisePhone(v) { return v.replace(/[^\d\s+()\-]/g,''); }

    /* ─── CalendarPicker ───────────────────────────────────────────────────── */

    function CalendarPicker({ value, onChange, emergency = false }) {
      const today = React.useMemo(() => { const t = new Date(); t.setHours(0,0,0,0); return t; }, []);
      const tomorrow = React.useMemo(() => { const t = new Date(today); t.setDate(today.getDate()+1); return t; }, [today]);

      const dayOfWeek = (today.getDay() + 6) % 7;
      const cells = [];
      for (let i = 0; i < dayOfWeek; i++) cells.push(null);
      for (let i = 0; i < 28; i++) { const d = new Date(today); d.setDate(today.getDate()+i); cells.push(d); }
      while (cells.length % 7 !== 0) cells.push(null);

      const heads = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
      const mon = d => d.toLocaleString('en-GB', { month: 'short' });

      return (
        <div>
          {emergency && (
            <div className="mb-4 p-3 rounded-xl bg-red-50 border border-red-200 text-sm text-red-700 leading-relaxed">
              Emergency slots available <strong>today and tomorrow only</strong>. Life-threatening: call <strong>011 660 2400</strong>.
            </div>
          )}
          <div className="booking-cal">
            {heads.map(h => <div key={h} className="cal-head">{h}</div>)}
            {cells.map((d, i) => {
              if (!d) return <div key={i} className="cal-day muted" aria-hidden="true" />;
              const isSel = value && d.getTime() === value.getTime();
              const isSun = d.getDay() === 0;
              const isBlocked = emergency && d.getTime() > tomorrow.getTime();
              return (
                <button key={i} className={`cal-day ${isSel ? 'selected' : ''}`} disabled={isSun || isBlocked} onClick={() => onChange(d)}>
                  <span className="cal-num">{d.getDate()}</span>
                  <span className="cal-m">{mon(d)}</span>
                </button>
              );
            })}
          </div>
        </div>
      );
    }

    /* ─── SlotPicker ───────────────────────────────────────────────────────── */

    function SlotPicker({ value, onChange, date, duration = 30 }) {
      const [slots, setSlots] = React.useState([]);
      const [loading, setLoading] = React.useState(false);
      const [err, setErr] = React.useState(null);

      React.useEffect(() => {
        if (!date) return;
        setLoading(true); setErr(null); setSlots([]);
        fetch(`/api/bookings?date=${toDateStr(date)}&duration=${duration}`)
          .then(r => r.json())
          .then(b => { setSlots(b.slots || []); setLoading(false); })
          .catch(() => { setErr('Could not load available times — please check your connection and try again.'); setLoading(false); });
      }, [date, duration]);

      if (loading) return (
        <div className="flex items-center gap-2 py-4">
          <svg className="animate-spin w-4 h-4 text-primary" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/>
            <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
          </svg>
          <p className="text-on-surface-variant text-sm">Checking live availability…</p>
        </div>
      );
      if (err) return (
        <div className="p-3 rounded-xl bg-red-50 border border-red-200 text-sm text-red-700">{err}</div>
      );
      // Filter out past slots when booking for today
      const todayStr = toDateStr(new Date());
      const isToday  = date && toDateStr(date) === todayStr;
      const now      = new Date();
      const nowHHMM  = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
      // Add a small buffer: don't allow booking within 30 min of current time
      const nowPlusBuf = (() => {
        const d = new Date(now.getTime() + 30 * 60 * 1000);
        return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
      })();
      const visibleSlots = isToday ? slots.filter(t => t > nowPlusBuf) : slots;

      if (!visibleSlots.length) return (
        <div className="p-3 rounded-xl bg-amber-50 border border-amber-200 text-sm text-amber-800">
          {isToday
            ? 'No more available times for today — please choose a different date.'
            : 'No available times for this day — please choose a different date.'}
        </div>
      );
      return (
        <div>
          <div className="flex items-center gap-1.5 mb-3">
            <span className="inline-block w-1.5 h-1.5 rounded-full bg-green-500"></span>
            <span className="text-xs text-on-surface-variant">Live availability — {visibleSlots.length} slot{visibleSlots.length !== 1 ? 's' : ''} open</span>
          </div>
          <div className="slot-grid">
            {visibleSlots.map(t => (
              <button key={t} className={`slot ${value === t ? 'selected' : ''}`} onClick={() => onChange(t)}>{t}</button>
            ))}
          </div>
        </div>
      );
    }

    /* ─── BookingFlow ──────────────────────────────────────────────────────── */

    function BookingFlow() {
      const [step, setStep] = React.useState(0);
      const [data, setData] = React.useState({ service:null, patientType:null, date:null, time:null, firstName:'', lastName:'', email:'', phone:'', notes:'' });
      const [errors, setErrors] = React.useState({});
      const [submitting, setSubmitting] = React.useState(false);
      const [submitErr, setSubmitErr] = React.useState(null);

      const set = patch => setData(d => ({ ...d, ...patch }));

      const validateDetails = (silent = false) => {
        const e = {};
        const fn = data.firstName.trim();
        if (!fn) e.firstName = 'Required';
        else if (fn.length < 2) e.firstName = 'Too short';
        else if (fn.length > 50) e.firstName = 'Name is too long';
        else if (!/^[a-zA-ZÀ-ÿ\s\-'.]+$/.test(fn)) e.firstName = 'Letters only please';
        else if (hasProfanity(fn)) e.firstName = 'Please use appropriate language';

        const ln = data.lastName.trim();
        if (!ln) e.lastName = 'Required';
        else if (ln.length < 2) e.lastName = 'Too short';
        else if (ln.length > 50) e.lastName = 'Name is too long';
        else if (!/^[a-zA-ZÀ-ÿ\s\-'.]+$/.test(ln)) e.lastName = 'Letters only please';
        else if (hasProfanity(ln)) e.lastName = 'Please use appropriate language';

        if (!data.email.trim()) e.email = 'Required';
        else if (data.email.trim().length > 100) e.email = 'Email is too long';
        else if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(data.email)) e.email = 'Enter a valid email';

        if (!data.phone.trim()) e.phone = 'Required';
        else if (!isValidPhone(data.phone)) e.phone = 'Enter a valid SA number (e.g. 082 555 0123)';

        if (data.notes && hasProfanity(data.notes)) e.notes = 'Please use appropriate language';

        if (!silent) setErrors(e);
        return Object.keys(e).length === 0 ? null : e;
      };

      const canAdvance = () => {
        if (step === 0) return !!data.service;
        if (step === 1) return !!data.patientType;
        if (step === 2) return !!data.date && !!data.time;
        if (step === 3) return validateDetails(true) === null;
        return true;
      };

      const next = async () => {
        if (step === 3 && validateDetails()) return;
        if (step === STEP_LABELS.length - 1) {
          setSubmitting(true); setSubmitErr(null);
          try {
            const svc = SERVICES.find(s => s.id === data.service);
            const res = await fetch('/api/bookings', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                service: svc?.apiName || svc?.name,
                patientType: data.patientType,
                date: toDateStr(data.date),
                time: data.time,
                firstName: data.firstName.trim(),
                lastName: data.lastName.trim(),
                email: data.email.trim(),
                phone: data.phone.trim(),
                notes: data.notes?.trim() || null,
              }),
            });
            const json = await res.json();
            if (!res.ok) throw new Error(json.error || 'Booking failed. Please try again.');
            setStep(STEP_LABELS.length);
          } catch (err) {
            setSubmitErr(err.message);
          } finally {
            setSubmitting(false);
          }
          return;
        }
        setStep(s => Math.min(s + 1, STEP_LABELS.length));
      };

      const back = () => { setSubmitErr(null); setStep(s => Math.max(s - 1, 0)); };
      const reset = () => {
        setStep(0);
        setData({ service:null, patientType:null, date:null, time:null, firstName:'', lastName:'', email:'', phone:'', notes:'' });
        setErrors({}); setSubmitErr(null);
      };

      const isConfirmed = step === STEP_LABELS.length;
      const activeStep = isConfirmed ? STEP_LABELS.length - 1 : step;
      const selectedService = SERVICES.find(s => s.id === data.service);
      const selectedPatient = PATIENT_TYPES.find(p => p.id === data.patientType);

      const stageTitle = s => ['What brings you in?', 'Have we met before?', 'Pick a day that suits you', 'A few details', 'Looks good?'][s];

      const inputCls = (err) =>
        `w-full bg-soft-blush border-none rounded-xl p-3.5 text-sm text-on-surface outline-none transition-all focus:bg-white focus:ring-2 focus:ring-primary/30 ${err ? 'ring-2 ring-error' : ''}`;

      return (
        <div className="bg-white rounded-3xl shadow-[0_4px_30px_rgba(10,74,92,0.07)] border border-soft-blush overflow-hidden grid grid-cols-1 lg:grid-cols-[290px_1fr]">

          {/* Sidebar */}
          <aside className="booking-sidebar bg-deep-plum text-white p-10 flex flex-col gap-6">
            <span className="text-xs font-medium uppercase tracking-widest text-primary-fixed-dim">Book your visit</span>
            <h3 className="font-headline text-2xl font-semibold leading-snug">
              A calm, <span className="italic text-primary-fixed-dim">unhurried</span> appointment.
            </h3>
            <div className="flex flex-col gap-0.5 mt-2">
              {STEP_LABELS.map((label, i) => {
                const isDone = i < activeStep || isConfirmed;
                const isActive = i === activeStep && !isConfirmed;
                return (
                  <div key={label} className={`flex items-center gap-3 py-2.5 text-sm transition-colors ${isActive ? 'text-white' : isDone ? 'text-white/70' : 'text-white/35'}`}>
                    <span className={`w-6 h-6 rounded-full border flex items-center justify-center text-xs flex-shrink-0 transition-all font-medium ${isActive ? 'border-primary-fixed-dim bg-primary-fixed-dim text-deep-plum' : isDone ? 'border-white/50' : 'border-white/20'}`}>
                      {isDone ? '✓' : String(i + 1).padStart(2, '0')}
                    </span>
                    {label}
                  </div>
                );
              })}
            </div>
            <div className="mt-auto pt-6 border-t border-white/10 text-xs text-white/45 leading-relaxed">
              Open Mon–Fri 08:00–17:00 · Sat 09:00–13:00<br />
              Dental emergencies: <strong className="text-white/70">011 660 2400</strong>
            </div>
          </aside>

          {/* Stage */}
          <div className="p-8 md:p-12 flex flex-col min-h-[520px]">
            {isConfirmed ? (
              <div className="flex flex-col items-center justify-center flex-1 text-center gap-5 py-8">
                <div className="w-16 h-16 rounded-full bg-primary flex items-center justify-center text-white text-2xl">✓</div>
                <h4 className="font-headline text-3xl font-semibold">You're <span className="italic text-primary">booked</span>.</h4>
                <p className="text-on-surface-variant max-w-sm text-sm leading-relaxed">
                  We'll see you on <strong>{formatDate(data.date)}</strong> at <strong>{data.time}</strong>.
                  A confirmation has been sent to <strong>{data.email}</strong>.
                </p>
                <button onClick={reset} className="mt-2 border-2 border-primary text-primary px-8 py-3 rounded-full font-semibold text-sm hover:bg-primary hover:text-white transition-all">
                  Book another visit
                </button>
              </div>
            ) : (
              <>
                <div className="mb-7">
                  <span className="text-xs font-medium text-on-surface-variant uppercase tracking-widest">Step {step + 1} of {STEP_LABELS.length}</span>
                  <h4 className="font-headline text-2xl font-semibold text-on-surface mt-1">{stageTitle(step)}</h4>
                </div>

                <div className="flex-1">

                  {/* Step 0: Service */}
                  {step === 0 && (
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                      {SERVICES.map(s => (
                        <button key={s.id} onClick={() => set({ service: s.id, date: null, time: null })}
                          className={`text-left p-4 border rounded-2xl transition-all hover:-translate-y-0.5 ${data.service === s.id ? 'border-primary bg-soft-blush shadow-sm shadow-primary/10' : 'border-outline-variant bg-white hover:border-primary/50'}`}>
                          <div className="font-headline font-semibold text-on-surface text-sm">{s.name}</div>
                          <div className="text-xs text-on-surface-variant mt-1">{s.meta}</div>
                        </button>
                      ))}
                    </div>
                  )}

                  {/* Step 1: Patient type */}
                  {step === 1 && (
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                      {PATIENT_TYPES.map(p => (
                        <button key={p.id} onClick={() => set({ patientType: p.id })}
                          className={`text-left p-6 border rounded-2xl transition-all hover:-translate-y-0.5 ${data.patientType === p.id ? 'border-primary bg-soft-blush shadow-sm shadow-primary/10' : 'border-outline-variant bg-white hover:border-primary/50'}`}>
                          <div className="font-headline font-semibold text-on-surface text-lg">{p.name}</div>
                          <div className="text-sm text-on-surface-variant mt-1">{p.meta}</div>
                        </button>
                      ))}
                    </div>
                  )}

                  {/* Step 2: Date + time */}
                  {step === 2 && (
                    <div>
                      <CalendarPicker value={data.date} onChange={d => set({ date: d, time: null })} emergency={data.service === 'emergency'} />
                      {data.date ? (
                        <div className="mt-6">
                          <div className="flex justify-between items-baseline mb-3">
                            <span className="font-headline font-semibold text-on-surface">{formatDate(data.date)}</span>
                            <span className="text-xs text-on-surface-variant">SAST</span>
                          </div>
                          <SlotPicker value={data.time} onChange={t => set({ time: t })} date={data.date}
                            duration={SERVICES.find(s => s.id === data.service)?.duration || 30} />
                        </div>
                      ) : (
                        <p className="text-on-surface-variant text-sm mt-4">← Select a date above to see available times.</p>
                      )}
                    </div>
                  )}

                  {/* Step 3: Details */}
                  {step === 3 && (
                    <div className="space-y-4">
                      {data.patientType === 'returning' && (
                        <div className="p-3 bg-secondary-container/60 border border-outline-variant rounded-xl text-sm text-on-surface-variant leading-relaxed">
                          Our team will call to confirm your existing record before the appointment — no extra details needed here.
                        </div>
                      )}
                      <div className="grid grid-cols-2 gap-4">
                        <div className="space-y-1.5">
                          <label className="text-xs font-medium text-on-surface-variant uppercase tracking-wide">First name</label>
                          <input value={data.firstName} onChange={e => set({ firstName: e.target.value })} placeholder="Lerato" maxLength={50} className={inputCls(errors.firstName)} />
                          {errors.firstName && <span className="text-xs text-error">{errors.firstName}</span>}
                        </div>
                        <div className="space-y-1.5">
                          <label className="text-xs font-medium text-on-surface-variant uppercase tracking-wide">Last name</label>
                          <input value={data.lastName} onChange={e => set({ lastName: e.target.value })} placeholder="Mokoena" maxLength={50} className={inputCls(errors.lastName)} />
                          {errors.lastName && <span className="text-xs text-error">{errors.lastName}</span>}
                        </div>
                      </div>
                      <div className="grid grid-cols-2 gap-4">
                        <div className="space-y-1.5">
                          <label className="text-xs font-medium text-on-surface-variant uppercase tracking-wide">Email</label>
                          <input type="email" value={data.email} onChange={e => set({ email: e.target.value })} placeholder="you@email.com" maxLength={100} className={inputCls(errors.email)} />
                          {errors.email && <span className="text-xs text-error">{errors.email}</span>}
                        </div>
                        <div className="space-y-1.5">
                          <label className="text-xs font-medium text-on-surface-variant uppercase tracking-wide">Phone</label>
                          <input type="tel" value={data.phone} onChange={e => set({ phone: sanitisePhone(e.target.value) })} placeholder="082 555 0123" maxLength={15} className={inputCls(errors.phone)} />
                          {errors.phone && <span className="text-xs text-error">{errors.phone}</span>}
                        </div>
                      </div>
                      <div className="space-y-1.5">
                        <label className="text-xs font-medium text-on-surface-variant uppercase tracking-wide">Anything we should know? (optional)</label>
                        <textarea rows="3" value={data.notes} onChange={e => set({ notes: e.target.value })} placeholder="Sensitivity, anxiety, medication, etc." maxLength={500} className={`${inputCls(errors.notes)} resize-none`} />
                        {errors.notes && <span className="text-xs text-error">{errors.notes}</span>}
                      </div>
                    </div>
                  )}

                  {/* Step 4: Confirm */}
                  {step === 4 && (
                    <div className="bg-soft-blush border border-outline-variant/50 rounded-2xl p-6 grid grid-cols-2 gap-x-8 gap-y-5">
                      {[
                        ['Service', selectedService?.name],
                        ['Patient type', selectedPatient?.name],
                        ['Date', formatDate(data.date)],
                        ['Time', data.time],
                        ['Name', `${data.firstName} ${data.lastName}`],
                        ['Contact', `${data.email}`],
                      ].map(([label, val]) => (
                        <div key={label}>
                          <div className="text-xs font-medium text-on-surface-variant uppercase tracking-wide mb-1">{label}</div>
                          <div className="text-sm font-medium text-on-surface">{val}</div>
                        </div>
                      ))}
                      {data.notes && (
                        <div className="col-span-2">
                          <div className="text-xs font-medium text-on-surface-variant uppercase tracking-wide mb-1">Notes</div>
                          <div className="text-sm text-on-surface">{data.notes}</div>
                        </div>
                      )}
                    </div>
                  )}
                </div>

                {submitErr && (
                  <div className="mt-4 p-3 bg-red-50 border border-red-200 rounded-xl text-sm text-error">{submitErr}</div>
                )}

                <div className="mt-6 flex items-center justify-between">
                  <button onClick={back} disabled={submitting || step === 0}
                    className={`text-on-surface-variant text-sm flex items-center gap-2 hover:text-on-surface transition-colors ${step === 0 ? 'invisible' : ''}`}>
                    <span className="material-symbols-outlined text-base">arrow_back</span> Back
                  </button>
                  <button onClick={next} disabled={!canAdvance() || submitting}
                    className="bg-primary text-white px-8 py-3 rounded-full font-semibold text-sm hover:bg-primary-container transition-all shadow-lg shadow-primary/20 disabled:opacity-50 disabled:pointer-events-none">
                    {submitting ? 'Booking…' : step === STEP_LABELS.length - 1 ? 'Confirm booking' : 'Continue'}
                  </button>
                </div>
              </>
            )}
          </div>
        </div>
      );
    }

    /* ─── ContactSection ───────────────────────────────────────────────────── */

    const TOPIC_PLACEHOLDERS = {
      general:     "Hi, I was wondering about…",
      appointment: "I'd like to book a time for… (preferred days/times work too)",
      cosmetic:    "I'm interested in… (whitening / veneers / smile makeover)",
      emergency:   "I'm experiencing pain / a broken tooth / swelling in…",
      medical:     "My medical aid is… and I'd like to know about cover for…",
    };

    const TOPIC_LABELS = {
      general:     "General question",
      appointment: "An appointment",
      cosmetic:    "Cosmetic consult",
      emergency:   "Dental emergency",
      medical:     "Medical aid / billing",
    };

    const MSG_MAX = 1000;

    function ContactSection() {
      const [form, setForm] = React.useState({ name:'', email:'', phone:'', topic:'general', message:'' });
      const [errors, setErrors] = React.useState({});
      const [sent, setSent] = React.useState(false);
      const [sentName, setSentName] = React.useState('');
      const [submitting, setSubmitting] = React.useState(false);
      const [submitErr, setSubmitErr] = React.useState(null);

      const set = patch => setForm(f => ({ ...f, ...patch }));
      const msgLen = form.message.length;
      const msgNearLimit = msgLen > MSG_MAX * 0.85;

      const validate = () => {
        const e = {};
        const n = form.name.trim();
        if (!n) e.name = 'Required';
        else if (n.length < 2) e.name = 'Too short';
        else if (n.length > 100) e.name = 'Name is too long';
        else if (hasProfanity(n)) e.name = 'Please use appropriate language';

        if (!form.email.trim()) e.email = 'Required';
        else if (form.email.trim().length > 100) e.email = 'Email is too long';
        else if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(form.email)) e.email = 'Enter a valid email';

        if (form.phone.trim() && !isValidPhone(form.phone)) e.phone = 'Enter a valid SA number (e.g. 082 555 0123)';

        if (!form.message.trim()) e.message = 'Tell us how we can help';
        else if (form.message.trim().length < 10) e.message = 'A little more detail, please';
        else if (form.message.trim().length > MSG_MAX) e.message = `Please keep your message under ${MSG_MAX} characters`;
        else if (hasProfanity(form.message)) e.message = 'Please use appropriate language';

        setErrors(e);
        return Object.keys(e).length === 0;
      };

      const submit = async ev => {
        ev.preventDefault();
        if (!validate()) return;
        setSubmitting(true); setSubmitErr(null);
        try {
          const res = await fetch('/api/contact', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              name: form.name.trim(), email: form.email.trim(),
              phone: form.phone.trim() || null, topic: form.topic,
              message: form.message.trim(),
            }),
          });
          const json = await res.json();
          if (!res.ok) throw new Error(json.error || 'Could not send message. Please try again.');
          setSentName(form.name.trim().split(' ')[0]);
          setSent(true);
          setForm({ name:'', email:'', phone:'', topic:'general', message:'' });
          setErrors({});
        } catch (err) {
          setSubmitErr(err.message);
        } finally {
          setSubmitting(false);
        }
      };

      const inputCls = err =>
        `w-full bg-soft-blush border-none rounded-xl p-3.5 text-sm text-on-surface outline-none transition-all focus:bg-white focus:ring-2 focus:ring-primary/30 ${err ? 'ring-2 ring-error' : ''}`;

      return (
        <section id="contact" className="py-section-gap bg-surface-container-low">
          <div className="max-w-container-max mx-auto px-margin-desktop">
            <div className="text-center mb-16">
              <span className="inline-block px-4 py-1.5 rounded-full bg-secondary-container text-on-secondary-fixed-variant text-xs font-medium uppercase tracking-widest mb-4">Visit us</span>
              <h2 className="font-headline text-headline-lg text-on-surface mb-4">Find us in <span className="italic text-primary">Krugersdorp</span>.</h2>
              <p className="text-on-surface-variant max-w-xl mx-auto text-body-md">
                Pop in for a coffee and a consult, send us a question, or call ahead — whichever feels easiest. We answer every message ourselves.
              </p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-12 gap-gutter">
              {/* Map + info */}
              <div className="lg:col-span-7 space-y-gutter">
                <div className="rounded-3xl overflow-hidden shadow-[0_4px_20px_rgba(10,74,92,0.06)] border border-soft-blush bg-white">
                  <div className="relative" style={{ aspectRatio: '16/10' }}>
                    <iframe
                      src="https://maps.google.com/maps?q=23+Voortrekker+Road,+Krugersdorp+North,+1739,+South+Africa&t=&z=16&ie=UTF8&iwloc=&output=embed"
                      title="Kliniq on Google Maps"
                      style={{ position:'absolute', top:0, left:0, width:'100%', height:'100%', border:0 }}
                      allowFullScreen loading="lazy" referrerPolicy="no-referrer-when-downgrade"
                    />
                    <a
                      href="https://www.google.com/maps/dir/?api=1&destination=23+Voortrekker+Road,+Krugersdorp+North,+1739,+South+Africa"
                      target="_blank" rel="noopener noreferrer"
                      className="absolute top-3 right-3 bg-white border border-outline-variant rounded-xl px-4 py-2 text-xs font-medium text-on-surface flex items-center gap-2 shadow-md hover:bg-soft-blush transition-all z-10"
                    >
                      Get directions <span className="material-symbols-outlined text-sm">open_in_new</span>
                    </a>
                  </div>
                  <div className="p-6 grid grid-cols-3 gap-4 border-t border-outline-variant/30">
                    <div>
                      <div className="text-xs font-medium text-on-surface-variant uppercase tracking-wider mb-2">Address</div>
                      <div className="text-sm text-on-surface leading-relaxed">23 Voortrekker Road<br />Krugersdorp North, 1739</div>
                    </div>
                    <div>
                      <div className="text-xs font-medium text-on-surface-variant uppercase tracking-wider mb-2">Hours</div>
                      <div className="text-sm text-on-surface leading-relaxed">Mon–Fri 08:00–17:00<br />Sat 09:00–13:00<br />Sun — Closed</div>
                    </div>
                    <div>
                      <div className="text-xs font-medium text-on-surface-variant uppercase tracking-wider mb-2">Reach us</div>
                      <div className="text-sm leading-relaxed">
                        <a href="tel:+27116602400" className="text-primary hover:underline block">011 660 2400</a>
                        <a href="https://wa.me/27116602400" target="_blank" rel="noopener" className="text-primary hover:underline flex items-center gap-1">
                          <span className="material-symbols-outlined" style={{fontSize:14}}>chat</span> WhatsApp us
                        </a>
                        <a href="mailto:hello@kliniq.co.za" className="text-primary hover:underline block">hello@kliniq.co.za</a>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              {/* Contact form / confirmation card */}
              <div className="lg:col-span-5">
                {sent ? (
                  /* ── Success confirmation card ── */
                  <div className="bg-white rounded-3xl p-8 shadow-[0_4px_30px_rgba(10,74,92,0.06)] border border-soft-blush flex flex-col items-center text-center gap-6">
                    <div className="w-16 h-16 rounded-full bg-secondary-container flex items-center justify-center">
                      <span className="material-symbols-outlined text-primary" style={{ fontSize:36, fontVariationSettings:"'FILL' 1" }}>mark_email_read</span>
                    </div>
                    <div>
                      <h3 className="font-headline text-2xl font-bold text-on-surface mb-2">
                        Got it, {sentName}!
                      </h3>
                      <p className="text-sm text-on-surface-variant leading-relaxed max-w-xs mx-auto">
                        Your message is safely with us. We read every note personally and reply within one working day.
                      </p>
                    </div>
                    <div className="w-full space-y-3 pt-2 border-t border-outline-variant/30">
                      <div className="flex items-center gap-3 text-sm text-on-surface-variant">
                        <span className="material-symbols-outlined text-primary" style={{fontSize:18}}>schedule</span>
                        Response within 1 working day
                      </div>
                      <div className="flex items-center gap-3 text-sm text-on-surface-variant">
                        <span className="material-symbols-outlined text-primary" style={{fontSize:18}}>phone_enabled</span>
                        Urgent? Call <a href="tel:+27116602400" className="text-primary font-medium hover:underline">011 660 2400</a>
                      </div>
                      <div className="flex items-center gap-3 text-sm text-on-surface-variant">
                        <span className="material-symbols-outlined text-primary" style={{fontSize:18}}>chat</span>
                        Or <a href="https://wa.me/27116602400" target="_blank" rel="noopener" className="text-primary font-medium hover:underline">WhatsApp us</a> for a faster reply
                      </div>
                    </div>
                    <button
                      onClick={() => setSent(false)}
                      className="text-sm text-on-surface-variant hover:text-primary transition-colors underline underline-offset-2">
                      Send another message
                    </button>
                  </div>
                ) : (
                  /* ── Contact form ── */
                  <form onSubmit={submit} noValidate className="bg-white rounded-3xl p-8 shadow-[0_4px_30px_rgba(10,74,92,0.06)] border border-soft-blush space-y-5">
                    <div>
                      <h3 className="font-headline text-2xl font-semibold text-on-surface">Send us a <span className="italic text-primary">note</span>.</h3>
                      <p className="text-sm text-on-surface-variant mt-1">We reply within one working day.</p>
                    </div>

                    <div className="space-y-1.5">
                      <label className="text-xs font-medium text-on-surface-variant uppercase tracking-wide">Your name</label>
                      <input value={form.name} onChange={e => set({ name: e.target.value })} placeholder="Lerato Mokoena" maxLength={100} className={inputCls(errors.name)} />
                      {errors.name && <span className="text-xs text-error">{errors.name}</span>}
                    </div>

                    <div className="grid grid-cols-2 gap-4">
                      <div className="space-y-1.5">
                        <label className="text-xs font-medium text-on-surface-variant uppercase tracking-wide">Email</label>
                        <input type="email" value={form.email} onChange={e => set({ email: e.target.value })} placeholder="you@email.com" maxLength={100} className={inputCls(errors.email)} />
                        {errors.email && <span className="text-xs text-error">{errors.email}</span>}
                      </div>
                      <div className="space-y-1.5">
                        <label className="text-xs font-medium text-on-surface-variant uppercase tracking-wide">Phone (optional)</label>
                        <input type="tel" value={form.phone} onChange={e => set({ phone: sanitisePhone(e.target.value) })} placeholder="082 555 0123" maxLength={15} className={inputCls(errors.phone)} />
                        {errors.phone && <span className="text-xs text-error">{errors.phone}</span>}
                      </div>
                    </div>

                    <div className="space-y-1.5">
                      <label className="text-xs font-medium text-on-surface-variant uppercase tracking-wide">I'm asking about</label>
                      <div className="flex flex-wrap gap-2">
                        {Object.entries(TOPIC_LABELS).map(([val, label]) => (
                          <button
                            key={val}
                            type="button"
                            onClick={() => set({ topic: val })}
                            className={`px-3.5 py-2 rounded-full text-xs font-medium transition-all border ${
                              form.topic === val
                                ? 'bg-primary text-white border-primary shadow-sm'
                                : 'bg-soft-blush text-on-surface-variant border-transparent hover:border-outline-variant'
                            }`}
                          >
                            {label}
                          </button>
                        ))}
                      </div>
                    </div>

                    <div className="space-y-1.5">
                      <div className="flex justify-between items-baseline">
                        <label className="text-xs font-medium text-on-surface-variant uppercase tracking-wide">Message</label>
                        <span className={`text-xs tabular-nums transition-colors ${msgNearLimit ? (msgLen >= MSG_MAX ? 'text-error font-semibold' : 'text-amber-500') : 'text-on-surface-variant/50'}`}>
                          {msgLen}/{MSG_MAX}
                        </span>
                      </div>
                      <textarea
                        rows="4"
                        value={form.message}
                        onChange={e => set({ message: e.target.value })}
                        placeholder={TOPIC_PLACEHOLDERS[form.topic]}
                        maxLength={MSG_MAX}
                        className={`${inputCls(errors.message)} resize-none`}
                      />
                      {errors.message && <span className="text-xs text-error">{errors.message}</span>}
                    </div>

                    <button type="submit" disabled={submitting || msgLen > MSG_MAX}
                      className="w-full bg-primary text-white py-4 rounded-full font-headline font-semibold hover:bg-primary-container transition-all shadow-lg shadow-primary/20 disabled:opacity-55 flex items-center justify-center gap-2">
                      {submitting
                        ? <><span className="material-symbols-outlined animate-spin" style={{fontSize:18}}>progress_activity</span> Sending…</>
                        : <><span className="material-symbols-outlined" style={{fontSize:18}}>send</span> Send message</>
                      }
                    </button>

                    {submitErr && (
                      <div className="p-3 bg-red-50 border border-red-200 rounded-xl text-sm text-error flex items-start gap-2">
                        <span className="material-symbols-outlined text-error flex-shrink-0" style={{fontSize:16,marginTop:1}}>error</span>
                        {submitErr}
                      </div>
                    )}

                    <p className="text-xs text-on-surface-variant/60 text-center">
                      By sending, you agree to our{' '}
                      <a href="#" className="underline hover:text-primary transition-colors">Privacy Policy</a>.
                      Your info is never shared.
                    </p>
                  </form>
                )}
              </div>
            </div>
          </div>
        </section>
      );
    }

    /* ─── Nav ──────────────────────────────────────────────────────────────── */

    function Nav({ onBook }) {
      const [scrolled,  setScrolled]  = React.useState(false);
      const [active,    setActive]    = React.useState('home');
      const [menuOpen,  setMenuOpen]  = React.useState(false);

      React.useEffect(() => {
        const onScroll = () => {
          setScrolled(window.scrollY > 40);
          const ids = ['home', 'about', 'services', 'reviews', 'book', 'contact'];
          let cur = 'home';
          for (const id of ids) {
            const el = document.getElementById(id);
            if (el && el.getBoundingClientRect().top <= 110) cur = id;
          }
          setActive(cur);
        };
        onScroll();
        window.addEventListener('scroll', onScroll, { passive: true });
        return () => window.removeEventListener('scroll', onScroll);
      }, []);

      const links = [
        { id: 'home', label: 'Home' },
        { id: 'about', label: 'About' },
        { id: 'services', label: 'Services' },
        { id: 'reviews', label: 'Reviews' },
        { id: 'faq', label: 'FAQs' },
        { id: 'contact', label: 'Contact' },
      ];

      return (
        <>
          <nav className={`fixed top-0 w-full z-50 transition-all duration-300 ${scrolled ? 'bg-surface-bright/85 glass-nav shadow-[0_4px_20px_rgba(10,74,92,0.06)]' : 'bg-transparent'}`}>
            <div className="flex justify-between items-center h-20 px-margin-desktop max-w-container-max mx-auto">
              <a href="#home" className="flex items-center gap-2 font-headline text-xl font-bold text-primary tracking-tight">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="32" height="32">
                  <circle cx="40" cy="40" r="40" fill="#0a4a5c"/>
                  <path d="M40 57 C35 52 18 42 18 30 C18 24 23 19 29 19 C33 19 36.5 21.5 40 25.5 C43.5 21.5 47 19 51 19 C57 19 62 24 62 30 C62 42 45 52 40 57Z" fill="none" stroke="white" strokeWidth="2.2" strokeLinejoin="round" strokeLinecap="round"/>
                  <line x1="40" y1="26.5" x2="40" y2="35.5" stroke="white" strokeWidth="2.2" strokeLinecap="round"/>
                  <line x1="35.5" y1="31" x2="44.5" y2="31" stroke="white" strokeWidth="2.2" strokeLinecap="round"/>
                  <path d="M14 62 L14 54 C14 51 16 49 18.5 49 L18.5 43 C18.5 41.5 20.5 41 21 42.5 L21.5 48.5 C22.5 48 24 49 24 50.5 L24 53.5 C26 54.5 26.5 57 25.5 59 L25.5 62 Z" fill="none" stroke="white" strokeWidth="1.8" strokeLinejoin="round" strokeLinecap="round"/>
                  <path d="M66 62 L66 54 C66 51 64 49 61.5 49 L61.5 43 C61.5 41.5 59.5 41 59 42.5 L58.5 48.5 C57.5 48 56 49 56 50.5 L56 53.5 C54 54.5 53.5 57 54.5 59 L54.5 62 Z" fill="none" stroke="white" strokeWidth="1.8" strokeLinejoin="round" strokeLinecap="round"/>
                </svg>
                Kliniq
              </a>
              <div className="hidden md:flex items-center gap-8">
                {links.map(l => (
                  <a key={l.id} href={`#${l.id}`}
                    className={`text-sm font-medium transition-colors duration-200 ${active === l.id ? 'text-primary border-b-2 border-primary pb-0.5' : 'text-on-surface-variant hover:text-primary'}`}>
                    {l.label}
                  </a>
                ))}
              </div>
              <div className="flex items-center gap-2">
                <button onClick={onBook}
                  className="bg-primary text-white px-5 sm:px-6 py-2.5 rounded-full font-semibold text-sm hover:scale-105 transition-transform shadow-lg shadow-primary/20">
                  Book Now
                </button>
                <button
                  className="md:hidden flex items-center justify-center w-10 h-10 rounded-xl text-on-surface hover:bg-secondary-container transition-colors"
                  onClick={() => setMenuOpen(o => !o)}
                  aria-label={menuOpen ? 'Close menu' : 'Open menu'}
                >
                  <span className="material-symbols-outlined" style={{fontSize:22}}>
                    {menuOpen ? 'close' : 'menu'}
                  </span>
                </button>
              </div>
            </div>
          </nav>

          {/* Mobile dropdown menu */}
          {menuOpen && (
            <>
              <div className="fixed inset-0 z-40 md:hidden" onClick={() => setMenuOpen(false)} />
              <div className="fixed top-20 left-0 right-0 z-50 md:hidden bg-surface-bright/96 backdrop-blur-xl border-b border-outline-variant/30 shadow-xl">
                <div className="max-w-container-max mx-auto px-6 py-4 flex flex-col gap-1">
                  {links.map(l => (
                    <a key={l.id} href={`#${l.id}`}
                      className={`block px-4 py-3 rounded-xl font-medium text-sm transition-colors ${active === l.id ? 'bg-primary/10 text-primary' : 'text-on-surface hover:bg-secondary-container'}`}
                      onClick={() => setMenuOpen(false)}
                    >
                      {l.label}
                    </a>
                  ))}
                  <button onClick={() => { onBook(); setMenuOpen(false); }}
                    className="mt-2 bg-primary text-white px-6 py-3 rounded-full font-semibold text-sm w-full">
                    Book an appointment
                  </button>
                </div>
              </div>
            </>
          )}
        </>
      );
    }

    /* ─── Hero ─────────────────────────────────────────────────────────────── */

    function Hero({ onBook }) {
      return (
        <section id="home" className="relative min-h-screen flex items-center overflow-hidden">
          <div className="absolute inset-0 z-0">
            <img

    /* ─── App ──────────────────────────────────────────────────────────────── */

    function App() {
      const goToBook = () => {
        const el = document.getElementById('book');
        if (el) window.scrollTo({ top: el.offsetTop - 60, behavior: 'smooth' });
      };

      React.useEffect(() => {
        const observer = new IntersectionObserver(entries => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              entry.target.style.opacity = '1';
              entry.target.style.transform = 'translateY(0)';
            }
          });
        }, { threshold: 0.08 });

        document.querySelectorAll('section').forEach(s => {
          if (s.id === 'home') return;
          s.style.opacity = '0';
          s.style.transform = 'translateY(24px)';
          s.style.transition = 'opacity 0.7s ease, transform 0.7s ease';
          observer.observe(s);
        });

        return () => observer.disconnect();
      }, []);

      return (
        <>
          <Nav onBook={goToBook} />
          <main>
            <Hero onBook={goToBook} />
            <About />
            <Services onBook={goToBook} />
            <ComfortSection onBook={goToBook} />
            <ReviewsSection />
            <FAQSection />
            <BookingSection />
            <ContactSection />
          </main>
          <Footer />
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('app'));
    root.render(<App />);

  </script>
